<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CREO — Explorar Creadores</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a0a3e">
  <meta property="og:title" content="CREO — Explorar Creadores">
  <meta property="og:description" content="Descubre y apoya a creadores con tips, metas y suscripciones mensuales">
  <meta property="og:image" content="https://fullnessmindset.github.io/creo/assets/logo-icon.png">
  <meta property="og:url" content="https://fullnessmindset.github.io/creo/explore.html">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { creo: { purple: '#1a0a3e', light: '#2d1b69', mint: '#33f0b0', mintDark: '#28c48e' } } } }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen transition-colors duration-300">
  <script src="shared.js"></script>

  <!-- Header -->
  <div class="fixed top-0 left-0 right-0 z-40 bg-white/90 backdrop-blur-sm border-b border-gray-200 dark-aware-header">
    <div class="max-w-lg mx-auto px-4 py-3 space-y-3">
      <div class="flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2 no-underline">
          <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center flex-shrink-0"><img src="assets/logo-icon.png" alt="CREO" class="w-6 h-6 rounded-full object-contain"></div>
          <h1 class="text-lg font-bold tracking-[0.15em]">EXPLORAR</h1>
        </a>
      </div>
      <!-- Search -->
      <div class="relative">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input id="search-input" type="text" placeholder="Buscar creadores..." class="w-full pl-10 pr-4 py-2.5 bg-gray-100 border border-gray-200 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-creo-mint text-gray-900 placeholder-gray-400 dark-aware-input">
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="max-w-lg mx-auto pt-32 pb-20 px-4">
    <!-- Explore Tabs -->
    <div class="flex rounded-xl overflow-hidden border border-gray-200 mb-5 text-sm font-semibold">
      <button onclick="switchExploreTab('creators')" id="exp-tab-creators" class="flex-1 py-2.5 text-center transition bg-creo-purple text-white">Creadores</button>
      <button onclick="switchExploreTab('cocreators')" id="exp-tab-cocreators" class="flex-1 py-2.5 text-center transition bg-white text-gray-500 hover:bg-gray-50">Co-creadores</button>
      <button onclick="switchExploreTab('deals')" id="exp-tab-deals" class="flex-1 py-2.5 text-center transition bg-white text-gray-500 hover:bg-gray-50 hidden">Brand Deals</button>
    </div>

    <!-- Panel: Creators -->
    <div id="exp-panel-creators">
      <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-3">Creadores Verificados</h2>
      <div id="verified-creators" class="space-y-3 mb-8"></div>
      <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-3">Todos los Creadores</h2>
      <div id="all-creators" class="space-y-3"></div>
    </div>

    <!-- Panel: Co-creators -->
    <div id="exp-panel-cocreators" class="hidden">
      <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-3">Co-Creadores</h2>
      <div id="cocreator-list" class="space-y-3"></div>
    </div>

    <!-- Panel: Brand Deals (only visible to creators) -->
    <div id="exp-panel-deals" class="hidden">
      <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-3">Brand Deals Disponibles</h2>
      <div id="brand-deals-list" class="space-y-3"></div>
      <div id="no-deals" class="hidden text-center py-12">
        <svg class="w-12 h-12 text-gray-300 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 13.255A23.193 23.193 0 0112 15c-3.183 0-6.22-.64-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        <p class="text-gray-400 text-sm">No hay brand deals disponibles</p>
      </div>
    </div>

    <!-- Empty -->
    <div id="no-results" class="hidden text-center py-12">
      <svg class="w-12 h-12 text-gray-300 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <p class="text-gray-400 text-sm">No se encontraron creadores</p>
    </div>

    <!-- Loading -->
    <div id="explore-loading" class="text-center py-12">
      <div class="inline-block w-8 h-8 border-2 border-creo-mint border-t-transparent rounded-full animate-spin"></div>
    </div>
  </div>

  <script>
    let allCreators = [];
    let allCocreators = [];
    let allDeals = [];
    let currentExploreTab = 'creators';
    let exploreUser = null;
    let exploreProfile = null;

    function renderCreatorCard(p) {
      const avatar = p.avatar_url
        ? `<img src="${esc(p.avatar_url)}" class="w-12 h-12 rounded-full object-cover border-2 border-creo-mint">`
        : `<div class="w-12 h-12 rounded-full bg-creo-mint/20 flex items-center justify-center border-2 border-creo-mint"><span class="text-creo-mint font-bold">${esc((p.display_name || p.username || '?')[0].toUpperCase())}</span></div>`;
      const verified = p.verification_status === 'approved' ? '<svg class="w-4 h-4 text-green-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>' : '';
      const socials = p.social_links || {};
      const socialCount = Object.values(socials).filter(v => v).length;
      const typeLabel = p.account_type === 'co-creator' ? '<span class="text-[9px] bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded-full font-semibold">Co-creador</span>' : '';

      const dk = isDark();
      return `<a href="profile.html?u=${esc(p.username)}" class="flex items-center gap-3 p-3 ${dk ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'} rounded-xl border hover:border-creo-mint transition group">
        ${avatar}
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-1.5">
            <span class="font-bold text-sm truncate">${esc(p.display_name || p.username)}</span>
            ${verified} ${typeLabel}
          </div>
          <p class="text-xs text-gray-400">@${esc(p.username)}</p>
          ${p.bio ? `<p class="text-xs text-gray-500 mt-0.5 line-clamp-1">${esc(p.bio)}</p>` : ''}
        </div>
        <div class="flex flex-col items-end gap-1">
          ${socialCount > 0 ? `<span class="text-[10px] text-gray-400">${socialCount} redes</span>` : ''}
          <svg class="w-4 h-4 text-gray-300 group-hover:text-creo-mint transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </div>
      </a>`;
    }

    function renderDealCard(deal) {
      const dk = isDark();
      const budgetUsd = (deal.budget_per_creator_cents / 100).toFixed(2);
      const brandName = deal.brand?.display_name || deal.brand?.username || 'Marca';
      const brandAvatar = deal.brand?.avatar_url
        ? `<img src="${esc(deal.brand.avatar_url)}" class="w-10 h-10 rounded-full object-cover border-2 border-amber-400">`
        : `<div class="w-10 h-10 rounded-full bg-amber-100 flex items-center justify-center border-2 border-amber-400"><span class="text-amber-600 font-bold text-sm">${esc(brandName[0].toUpperCase())}</span></div>`;

      return `<div class="p-4 ${dk ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'} rounded-xl border space-y-3">
        <div class="flex items-center gap-3">
          ${brandAvatar}
          <div class="flex-1 min-w-0">
            <p class="font-bold text-sm truncate">${esc(deal.title)}</p>
            <p class="text-xs text-gray-400">por ${esc(brandName)}</p>
          </div>
          <span class="text-sm font-bold text-green-600">$${budgetUsd}</span>
        </div>
        ${deal.description ? `<p class="text-xs text-gray-500 line-clamp-2">${esc(deal.description)}</p>` : ''}
        <div class="flex items-center justify-between">
          <span class="text-[10px] text-gray-400">${deal.max_creators} creador(es) max</span>
          <button onclick="viewDealDetails('${deal.id}')" class="px-4 py-1.5 bg-creo-purple text-white text-xs font-semibold rounded-lg hover:opacity-90 transition">Ver Detalles</button>
        </div>
      </div>`;
    }

    function switchExploreTab(tab) {
      currentExploreTab = tab;
      ['creators', 'cocreators', 'deals'].forEach(t => {
        document.getElementById('exp-panel-' + t).classList.toggle('hidden', t !== tab);
        const btn = document.getElementById('exp-tab-' + t);
        if (t === tab) { btn.classList.add('bg-creo-purple', 'text-white'); btn.classList.remove('bg-white', 'text-gray-500'); }
        else { btn.classList.remove('bg-creo-purple', 'text-white'); btn.classList.add('bg-white', 'text-gray-500'); }
      });
      if (tab === 'cocreators' && allCocreators.length === 0) loadCocreators();
      if (tab === 'deals' && allDeals.length === 0) loadBrandDeals();
    }

    async function loadCreators() {
      const { data, error } = await sb
        .from('profiles')
        .select('username, display_name, avatar_url, bio, social_links, verification_status, stripe_connect_id, account_type')
        .not('username', 'is', null)
        .or('account_type.is.null,account_type.eq.creator')
        .order('created_at', { ascending: false });

      document.getElementById('explore-loading').classList.add('hidden');
      if (error || !data) return;

      allCreators = data;
      renderCreatorList(data);
    }

    async function loadCocreators() {
      const { data, error } = await sb
        .from('profiles')
        .select('username, display_name, avatar_url, bio, social_links, verification_status, account_type')
        .eq('account_type', 'co-creator')
        .not('username', 'is', null)
        .order('created_at', { ascending: false });

      if (error || !data) return;
      allCocreators = data;
      const el = document.getElementById('cocreator-list');
      el.innerHTML = data.length ? data.map(renderCreatorCard).join('') : '<p class="text-xs text-gray-400 text-center py-8">No hay co-creadores aún</p>';
    }

    async function loadBrandDeals() {
      const { data, error } = await sb
        .from('brand_deals')
        .select('*, brand:brand_id(username, display_name, avatar_url)')
        .eq('status', 'active')
        .order('created_at', { ascending: false });

      if (error || !data) { document.getElementById('no-deals').classList.remove('hidden'); return; }
      allDeals = data;
      const el = document.getElementById('brand-deals-list');
      if (!data.length) { document.getElementById('no-deals').classList.remove('hidden'); return; }
      el.innerHTML = data.map(renderDealCard).join('');
    }

    function renderCreatorList(creators) {
      const verified = creators.filter(c => c.verification_status === 'approved');
      const rest = creators.filter(c => c.verification_status !== 'approved');

      document.getElementById('verified-creators').innerHTML = verified.length
        ? verified.map(renderCreatorCard).join('')
        : '<p class="text-xs text-gray-400 text-center py-4">No hay creadores verificados aún</p>';

      document.getElementById('all-creators').innerHTML = rest.length
        ? rest.map(renderCreatorCard).join('')
        : '';

      document.getElementById('no-results').classList.toggle('hidden', creators.length > 0);
    }

    function viewDealDetails(dealId) {
      const deal = allDeals.find(d => d.id === dealId);
      if (!deal) return;
      const budgetUsd = (deal.budget_per_creator_cents / 100).toFixed(2);
      const brandName = deal.brand?.display_name || deal.brand?.username || 'Marca';

      const overlay = document.createElement('div');
      overlay.className = 'fixed inset-0 z-50 flex items-center justify-center p-4';
      overlay.innerHTML = `
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="this.parentElement.remove()"></div>
        <div class="relative bg-white rounded-2xl shadow-2xl max-w-sm w-full p-6 space-y-4 max-h-[80vh] overflow-y-auto">
          <div class="flex items-center justify-between">
            <h3 class="font-bold text-lg text-gray-900">${esc(deal.title)}</h3>
            <button onclick="this.closest('.fixed').remove()" class="text-gray-400 hover:text-gray-600">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
          <p class="text-xs text-gray-500">por <strong>${esc(brandName)}</strong></p>
          <div class="bg-green-50 border border-green-200 rounded-lg p-3">
            <p class="text-green-700 font-bold text-lg">$${budgetUsd} USD</p>
            <p class="text-xs text-green-600">Pago por completar el deal</p>
          </div>
          ${deal.description ? `<div><p class="text-xs font-semibold text-gray-700 mb-1">Descripción:</p><p class="text-xs text-gray-600">${esc(deal.description)}</p></div>` : ''}
          <div><p class="text-xs font-semibold text-gray-700 mb-1">Requisitos:</p><p class="text-xs text-gray-600 whitespace-pre-line">${esc(deal.requirements)}</p></div>
          <div><p class="text-xs font-semibold text-gray-700 mb-1">Términos y Condiciones:</p><p class="text-xs text-gray-500 whitespace-pre-line max-h-32 overflow-y-auto border border-gray-100 rounded p-2">${esc(deal.terms_conditions)}</p></div>
          <p class="text-[10px] text-gray-400">${deal.max_creators} creador(es) máximo</p>
          ${exploreProfile?.stripe_connect_id
            ? `<button onclick="applyToDeal('${deal.id}');this.closest('.fixed').remove()" class="w-full bg-creo-purple text-white py-3 rounded-xl font-bold hover:opacity-90 transition">Aceptar Deal</button>`
            : `<p class="text-xs text-amber-600 text-center bg-amber-50 p-3 rounded-lg">Debes conectar Stripe para aceptar Brand Deals. <a href="index.html" class="underline font-semibold">Ir al Panel</a></p>`
          }
          <p class="text-[10px] text-gray-400 text-center">Al aceptar, la marca te enviará la solicitud formal con contrato</p>
        </div>`;
      document.body.appendChild(overlay);
    }

    async function applyToDeal(dealId) {
      if (!exploreUser) { showToast('Debes iniciar sesión', 'error'); return; }
      if (!exploreProfile?.stripe_connect_id) { showToast('Conecta Stripe primero', 'error'); return; }

      const deal = allDeals.find(d => d.id === dealId);
      if (!deal) return;

      const { error } = await sb.from('brand_deal_requests').insert([{
        deal_id: dealId,
        creator_id: exploreUser.id,
        brand_id: deal.brand_id,
        status: 'pending'
      }]);

      if (error) {
        if (error.code === '23505') showToast('Ya aplicaste a este deal', 'error');
        else showToast('Error al aplicar: ' + error.message, 'error');
        return;
      }
      showToast('Solicitud enviada. La marca revisará tu perfil.', 'success');
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase().trim();
      if (currentExploreTab === 'deals') return;
      const list = currentExploreTab === 'cocreators' ? allCocreators : allCreators;
      if (!q) { if (currentExploreTab === 'creators') renderCreatorList(allCreators); else document.getElementById('cocreator-list').innerHTML = list.map(renderCreatorCard).join(''); return; }
      const scored = list.map(c => {
        const name = (c.display_name || '').toLowerCase();
        const user = (c.username || '').toLowerCase();
        const bio = (c.bio || '').toLowerCase();
        let score = 0;
        if (name === q || user === q) score = 100;
        else if (name.startsWith(q) || user.startsWith(q)) score = 80;
        else if (name.includes(q) || user.includes(q)) score = 60;
        else if (bio.includes(q)) score = 30;
        return { ...c, score };
      }).filter(c => c.score > 0).sort((a, b) => b.score - a.score);
      if (currentExploreTab === 'creators') renderCreatorList(scored);
      else document.getElementById('cocreator-list').innerHTML = scored.length ? scored.map(renderCreatorCard).join('') : '<p class="text-xs text-gray-400 text-center py-4">No se encontraron resultados</p>';
    });

    document.getElementById('search-input').addEventListener('focus', () => {
      if (!document.getElementById('search-input').value.trim()) {
        if (currentExploreTab === 'creators') renderCreatorList(allCreators);
      }
    });

    async function initExplore() {
      const { data: { user } } = await sb.auth.getUser();
      if (user) {
        exploreUser = user;
        const { data: prof } = await sb.from('profiles').select('account_type, stripe_connect_id').eq('id', user.id).single();
        exploreProfile = prof;
        if (prof && (prof.account_type === 'creator' || !prof.account_type)) {
          document.getElementById('exp-tab-deals').classList.remove('hidden');
        }
      }
    }

    window.onload = () => {
      loadCreators();
      initExplore();
      renderBottomNav('explore');
      updateNavAuth();
      loadNotificationBell();
    };
  </script>
</body>
</html>
