<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a0a3e">
  <meta property="og:title" content="CREO â€” Explorar Creadores">
  <meta property="og:description" content="Descubre y apoya a creadores con tips, metas y suscripciones mensuales">
  <meta property="og:image" content="https://fullnessmindset.github.io/creo/assets/logo-icon.png">
  <meta property="og:url" content="https://fullnessmindset.github.io/creo/explore.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="CREO â€” Explorar Creadores">
  <meta name="twitter:description" content="Descubre y apoya a creadores con tips, metas y suscripciones mensuales">
  <meta name="twitter:image" content="https://fullnessmindset.github.io/creo/assets/logo-icon.png">
  <link rel="canonical" href="https://fullnessmindset.github.io/creo/explore.html">
  <link rel="stylesheet" href="tailwind.min.css?v=20260719">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { overscroll-behavior: contain; }
    input, select, textarea { font-size: max(16px, 1em) !important; }
    .glass { background: rgba(255,255,255,0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.3); }
    .story-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
    @media (min-width: 640px) { .story-grid { grid-template-columns: repeat(4, 1fr); } }
    .story-grid-item { position: relative; aspect-ratio: 9/16; overflow: hidden; background: #111; }
    .story-grid-item > img, .story-grid-item > video { width: 100%; height: 100%; object-fit: cover; }
    .story-grid-item .overlay { position: absolute; inset: 0; background: linear-gradient(transparent 50%, rgba(0,0,0,0.7)); pointer-events: none; }
    .story-grid-item:hover .overlay { background: linear-gradient(transparent 30%, rgba(0,0,0,0.8)); }
    #story-scroll-container { scrollbar-width: none; -ms-overflow-style: none; }
    #story-scroll-container::-webkit-scrollbar { display: none; }
    @keyframes slide-up { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .animate-slide-up { animation: slide-up 0.3s ease-out; }
  </style>
</head>
<body class="bg-white text-gray-900 min-h-screen transition-colors duration-300">
  <script src="shared.js?v=2"></script>

  <!-- Sticky Header (below mobile header, beside desktop sidebar) -->
  <div class="fixed top-[60px] lg:top-0 left-0 lg:left-[220px] right-0 z-30 bg-white/90 backdrop-blur-sm border-b border-gray-200 dark-aware-header">
    <div class="max-w-2xl mx-auto px-4 py-3 space-y-3">
      <div class="flex items-center justify-between">
        <h1 class="text-lg font-bold tracking-[0.15em] text-creo-purple" data-i18n="explorarHeader"><span aria-label="brujula">ðŸ§­</span> EXPLORAR</h1>
      </div>
      <!-- Search -->
      <div class="relative">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input id="search-input" type="text" data-i18n-placeholder="buscarCreadoresHistorias" placeholder="Buscar creadores, historias..." class="w-full pl-10 pr-4 py-2.5 bg-gray-100 border border-gray-200 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-creo-mint text-gray-900 placeholder-gray-400 dark-aware-input" oninput="handleSearch(this.value)">
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="max-w-2xl mx-auto pt-24 pb-20 px-0">
    <!-- Stories grid (Instagram-style) -->
    <div class="story-grid" id="stories-grid"></div>
    <div id="stories-loading" class="text-center py-8">
      <div class="inline-block w-6 h-6 border-2 border-creo-mint border-t-transparent rounded-full animate-spin"></div>
    </div>
    <p id="no-stories" class="hidden text-center text-gray-400 text-xs py-8" data-i18n="sinHistoriasPublicadas"><span aria-label="libro">ðŸ“–</span> AÃºn no hay historias publicadas</p>

    <!-- Search results -->
    <div id="search-results" class="hidden px-4 space-y-3">
      <h2 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3" data-i18n="resultados">Resultados</h2>
      <div id="search-results-list" class="space-y-3"></div>
      <p id="no-search" class="hidden text-center text-gray-400 text-xs py-8" data-i18n="sinResultadosBusqueda"><span aria-label="buscar">ðŸ”</span> No se encontraron resultados</p>
    </div>
  </div>

  <!-- Story viewer modal â€” TikTok-style vertical scroll -->
  <div id="story-viewer" class="fixed inset-0 z-[35] hidden bg-black">
    <button onclick="closeStoryViewer()" class="fixed top-4 right-4 z-[120] text-white/70 hover:text-white">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <div id="story-scroll-container" class="w-full h-full overflow-y-scroll snap-y snap-mandatory"></div>
    <!-- Comment panel (slides up) -->
    <div id="story-comments-panel" class="fixed bottom-0 left-0 right-0 z-[110] hidden transform translate-y-full transition-transform duration-300" style="max-height:60vh">
      <div class="bg-gray-900 rounded-t-2xl border-t border-gray-700 flex flex-col" style="max-height:60vh">
        <div class="flex items-center justify-between px-4 py-3 border-b border-gray-700">
          <h3 class="text-white font-bold text-sm" data-i18n="comentarios"><span aria-label="comentarios">ðŸ’¬</span> Comentarios</h3>
          <button onclick="closeStoryComments()" class="text-gray-400 hover:text-white"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
        </div>
        <div id="story-comments-list" class="flex-1 overflow-y-auto px-4 py-3 space-y-3" style="max-height:40vh"></div>
        <div class="px-4 py-3 border-t border-gray-700">
          <div class="flex gap-2">
            <input id="story-comment-input" type="text" data-i18n-placeholder="escribirComentarioPlaceholder" placeholder="Escribe un comentario..." class="flex-1 bg-gray-800 text-white text-sm rounded-full px-4 py-2 focus:outline-none focus:ring-1 focus:ring-creo-mint placeholder-gray-500">
            <button onclick="submitStoryComment()" class="bg-creo-mint text-creo-purple px-4 py-2 rounded-full text-sm font-bold hover:opacity-90 transition" data-i18n="enviar">Enviar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let allCreators = [];
    let allStories = [];
    let exploreUser = null;
    let exploreProfile = null;
    let currentStoryIdx = -1;
    let storyLiked = false;

    // ===== SEARCH =====
    let searchTimer = null;
    function handleSearch(q) {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        q = q.trim().toLowerCase();
        if (!q) {
          document.getElementById('search-results').classList.add('hidden');
          document.getElementById('stories-grid').classList.remove('hidden');
          document.getElementById('stories-loading').classList.add('hidden');
          return;
        }
        document.getElementById('stories-grid').classList.add('hidden');
        document.getElementById('search-results').classList.remove('hidden');

        const results = allCreators.filter(c => {
          const name = (c.display_name || '').toLowerCase();
          const user = (c.username || '').toLowerCase();
          const bio = (c.bio || '').toLowerCase();
          return name.includes(q) || user.includes(q) || bio.includes(q);
        });

        const list = document.getElementById('search-results-list');
        document.getElementById('no-search').classList.toggle('hidden', results.length > 0);
        list.innerHTML = results.map(renderCreatorCard).join('');
      }, 250);
    }

    // ===== STORIES GRID =====
    async function loadStories() {
      try {
        const { data, error } = await sb.from('creator_stories')
          .select('*, profile:creator_id(id, username, display_name, avatar_url, verification_status)')
          .order('created_at', { ascending: false })
          .limit(60);

        document.getElementById('stories-loading').classList.add('hidden');
        if (error || !data || data.length === 0) {
          document.getElementById('no-stories').classList.remove('hidden');
          return;
        }

        allStories = data;
        renderStoriesGrid(data);
      } catch(e) {
        document.getElementById('stories-loading').classList.add('hidden');
        document.getElementById('no-stories').classList.remove('hidden');
      }
    }

    function renderStoriesGrid(stories) {
      const grid = document.getElementById('stories-grid');
      grid.innerHTML = stories.map((s, i) => {
        const p = s.profile;
        const name = p?.display_name || p?.username || '?';
        const verified = p?.verification_status === 'approved';
        const avatar = p?.avatar_url
          ? `<img src="${esc(p.avatar_url)}" class="w-7 h-7 rounded-full object-cover ring-1 ring-white">`
          : `<div class="w-7 h-7 rounded-full bg-white/30 flex items-center justify-center ring-1 ring-white"><span class="text-white text-[10px] font-bold">${esc(name[0])}</span></div>`;

        let thumb = '';
        if (s.main_video_url) {
          const isYT = /youtube|youtu\.be/.test(s.main_video_url);
          if (isYT) {
            const vid = s.main_video_url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);
            thumb = vid ? `<img src="https://img.youtube.com/vi/${vid[1]}/mqdefault.jpg" class="w-full h-full object-cover">` : '';
          } else {
            thumb = `<video src="${esc(s.main_video_url)}" class="w-full h-full object-cover" autoplay muted loop playsinline></video>`;
          }
        } else if (s.media_urls && s.media_urls.length > 0) {
          const first = s.media_urls[0];
          const isVid = /\.(mp4|webm|mov)$/i.test(first);
          thumb = isVid
            ? `<video src="${esc(first)}" class="w-full h-full object-cover" autoplay muted loop playsinline></video>`
            : `<img src="${esc(first)}" class="w-full h-full object-cover">`;
        } else {
          thumb = `<div class="w-full h-full bg-gradient-to-br from-creo-purple to-creo-light flex items-center justify-center">
            <svg class="w-8 h-8 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
          </div>`;
        }

        return `<div class="story-grid-item cursor-pointer" onclick="openStoryViewer(${i})">
          ${thumb}
          <div class="overlay"></div>
          <div class="absolute top-2 left-2 flex items-center gap-1">
            ${avatar}
            ${verified ? '<svg class="w-3.5 h-3.5 text-creo-mint" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>' : ''}
          </div>
          <div class="absolute bottom-2 left-2 right-2">
            <p class="text-white text-[10px] font-bold truncate">${esc(s.title || name)}</p>
          </div>
        </div>`;
      }).join('');
    }

    // ===== STORY VIEWER (TikTok-style vertical scroll) =====
    let storyObserver = null;

    function buildStorySlide(s, i) {
      const p = s.profile;
      const name = p?.display_name || p?.username || '?';
      const avatar = p?.avatar_url
        ? `<img src="${esc(p.avatar_url)}" class="w-10 h-10 rounded-full object-cover">`
        : `<div class="w-10 h-10 rounded-full bg-white/30 flex items-center justify-center"><span class="text-white font-bold">${esc(name[0])}</span></div>`;

      let media = '';
      if (s.main_video_url) {
        const isYT = /youtube|youtu\.be/.test(s.main_video_url);
        if (isYT) {
          const vid = s.main_video_url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);
          media = vid ? `<iframe data-src="https://www.youtube.com/embed/${vid[1]}?rel=0" class="w-full h-full" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>` : '';
        } else {
          media = `<video data-src="${esc(s.main_video_url)}" autoplay muted loop playsinline class="w-full h-full object-contain"></video>`;
        }
      } else if (s.media_urls && s.media_urls.length > 0) {
        const first = s.media_urls[0];
        const isVid = /\.(mp4|webm|mov)$/i.test(first);
        media = isVid
          ? `<video data-src="${esc(first)}" autoplay muted loop playsinline class="w-full h-full object-contain"></video>`
          : `<img src="${esc(first)}" class="w-full h-full object-contain">`;
      } else {
        media = `<div class="w-full h-full flex items-center justify-center"><div class="max-w-md p-8 text-center text-white space-y-4">
          <h3 class="text-xl font-bold">${esc(s.title || t('miHistoria'))}</h3>
          <p class="text-sm text-white/80 leading-relaxed">${esc(s.description || s.content || '')}</p>
        </div></div>`;
      }

      const verified = p?.verification_status === 'approved';
      const badge = verified ? '<svg class="w-4 h-4 text-creo-mint" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>' : '';

      return `<div class="story-slide snap-start w-full flex-shrink-0 relative bg-black" data-story-idx="${i}" data-story-id="${s.id}" style="height:100vh;height:100dvh">
        <div class="w-full h-full flex items-center justify-center">${media}</div>
        <div class="absolute right-3 bottom-32 flex flex-col items-center gap-5 z-10">
          <button onclick="toggleStoryLike(${i})" class="sv-like-btn flex flex-col items-center gap-1 text-white/80 hover:text-red-500 transition" data-idx="${i}">
            <svg class="sv-like-icon w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
            <span class="sv-like-count text-[10px] font-bold">0</span>
          </button>
          <button onclick="openStoryComments()" class="flex flex-col items-center gap-1 text-white/80 hover:text-creo-mint transition">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
            <span class="sv-comment-count text-[10px] font-bold">0</span>
          </button>
          <button onclick="shareStory()" class="flex flex-col items-center gap-1 text-white/80 hover:text-creo-mint transition">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
            <span class="text-[10px] font-bold">${t('compartir')}</span>
          </button>
        </div>
        <div class="absolute bottom-0 left-0 right-16 p-4 bg-gradient-to-t from-black/80 to-transparent">
          <div class="max-w-lg mx-auto">
            <div class="flex items-center gap-3 mb-2">
              <a href="profile.html?u=${esc(p?.username || '')}">${avatar}</a>
              <div class="flex items-center gap-1">
                <p class="font-bold text-white text-sm">${esc(name)}</p>
                ${badge}
              </div>
              <span class="text-white/60 text-xs">@${esc(p?.username || '')}</span>
            </div>
            <p class="text-white font-bold text-sm mb-1">${esc(s.title || '')}</p>
            <p class="text-white/80 text-xs line-clamp-2">${esc(s.description || s.content || '')}</p>
          </div>
        </div>
      </div>`;
    }

    function openStoryViewer(idx) {
      const viewer = document.getElementById('story-viewer');
      const container = document.getElementById('story-scroll-container');
      container.innerHTML = allStories.map((s, i) => buildStorySlide(s, i)).join('');
      viewer.classList.remove('hidden');
      document.body.style.overflow = 'hidden';

      const targetSlide = container.children[idx];
      if (targetSlide) targetSlide.scrollIntoView({ behavior: 'instant' });

      currentStoryIdx = idx;
      storyLiked = false;
      setupStoryObserver();
    }

    function setupStoryObserver() {
      if (storyObserver) storyObserver.disconnect();
      const container = document.getElementById('story-scroll-container');
      storyObserver = new IntersectionObserver((entries) => {
        for (const entry of entries) {
          if (entry.isIntersecting && entry.intersectionRatio > 0.5) {
            const idx = parseInt(entry.target.dataset.storyIdx);
            if (idx !== currentStoryIdx) {
              pauseSlideMedia(currentStoryIdx);
              currentStoryIdx = idx;
              storyLiked = false;
            }
            activateSlide(entry.target, idx);
          }
        }
      }, { root: container, threshold: 0.5 });

      for (const slide of container.children) {
        storyObserver.observe(slide);
      }
    }

    function activateSlide(slide, idx) {
      const s = allStories[idx];
      if (!s) return;
      const vid = slide.querySelector('video[data-src]');
      if (vid) { vid.src = vid.dataset.src; vid.removeAttribute('data-src'); vid.play().catch(()=>{}); }
      const iframe = slide.querySelector('iframe[data-src]');
      if (iframe) { iframe.src = iframe.dataset.src; iframe.removeAttribute('data-src'); }
      loadSlideInteractions(slide, s.id);
    }

    function pauseSlideMedia(idx) {
      const container = document.getElementById('story-scroll-container');
      const slide = container.children[idx];
      if (!slide) return;
      const vid = slide.querySelector('video');
      if (vid) vid.pause();
      const iframe = slide.querySelector('iframe[src]');
      if (iframe && iframe.src) { iframe.dataset.src = iframe.src; iframe.src = ''; }
    }

    async function loadSlideInteractions(slide, storyId) {
      const { count: likeCount } = await sb.from('story_likes').select('*', { count: 'exact', head: true }).eq('story_id', storyId);
      slide.querySelector('.sv-like-count').textContent = likeCount || 0;

      const { count: commentCount } = await sb.from('story_comments').select('*', { count: 'exact', head: true }).eq('story_id', storyId);
      slide.querySelector('.sv-comment-count').textContent = commentCount || 0;

      if (exploreUser) {
        const { data: myLike } = await sb.from('story_likes').select('id').eq('story_id', storyId).eq('user_id', exploreUser.id).maybeSingle();
        storyLiked = !!myLike;
        updateSlideLikeBtn(slide, storyLiked);
      }
    }

    function updateSlideLikeBtn(slide, liked) {
      const icon = slide.querySelector('.sv-like-icon');
      const btn = slide.querySelector('.sv-like-btn');
      if (liked) {
        icon.setAttribute('fill', 'currentColor');
        btn.classList.add('text-red-500');
        btn.classList.remove('text-white/80');
      } else {
        icon.setAttribute('fill', 'none');
        btn.classList.remove('text-red-500');
        btn.classList.add('text-white/80');
      }
    }

    async function toggleStoryLike(idx) {
      if (!exploreUser) { showToast(t('iniciarSesionParaCreo'), 'error'); return; }
      const s = allStories[idx != null ? idx : currentStoryIdx];
      if (!s) return;
      const container = document.getElementById('story-scroll-container');
      const slide = container.children[idx != null ? idx : currentStoryIdx];

      if (storyLiked) {
        await sb.from('story_likes').delete().eq('story_id', s.id).eq('user_id', exploreUser.id);
        storyLiked = false;
        const el = slide.querySelector('.sv-like-count');
        el.textContent = Math.max(0, parseInt(el.textContent) - 1);
      } else {
        await sb.from('story_likes').insert([{ story_id: s.id, user_id: exploreUser.id }]);
        storyLiked = true;
        const el = slide.querySelector('.sv-like-count');
        el.textContent = parseInt(el.textContent) + 1;
      }
      updateSlideLikeBtn(slide, storyLiked);
    }

    function openStoryComments() {
      const panel = document.getElementById('story-comments-panel');
      panel.classList.remove('hidden');
      setTimeout(() => panel.style.transform = 'translateY(0)', 10);
      loadStoryCommentsList();
    }

    function closeStoryComments() {
      const panel = document.getElementById('story-comments-panel');
      panel.style.transform = 'translateY(100%)';
      setTimeout(() => panel.classList.add('hidden'), 300);
    }

    async function loadStoryCommentsList() {
      const s = allStories[currentStoryIdx];
      if (!s) return;
      const list = document.getElementById('story-comments-list');
      list.innerHTML = '<div class="text-center py-4"><div class="inline-block w-5 h-5 border-2 border-creo-mint border-t-transparent rounded-full animate-spin"></div></div>';

      const { data } = await sb.from('story_comments')
        .select('*, profile:user_id(username, display_name, avatar_url)')
        .eq('story_id', s.id)
        .order('created_at', { ascending: true });

      if (!data || data.length === 0) {
        list.innerHTML = '<p class="text-gray-500 text-xs text-center py-4">' + t('sinComentarios') + '</p>';
        return;
      }

      list.innerHTML = data.map(c => {
        const cp = c.profile;
        const cName = cp?.display_name || cp?.username || '?';
        const cAvatar = cp?.avatar_url
          ? `<img src="${esc(cp.avatar_url)}" class="w-8 h-8 rounded-full object-cover">`
          : `<div class="w-8 h-8 rounded-full bg-creo-purple/30 flex items-center justify-center"><span class="text-white text-xs font-bold">${esc(cName[0])}</span></div>`;
        const isOwner = exploreUser && c.user_id === exploreUser.id;
        return `<div class="flex gap-2">
          ${cAvatar}
          <div class="flex-1 min-w-0">
            <p class="text-white text-xs font-bold">${esc(cName)}</p>
            <p class="text-gray-300 text-xs">${esc(c.body)}</p>
          </div>
          ${isOwner ? `<button onclick="deleteStoryComment('${c.id}')" class="text-gray-500 hover:text-red-400 flex-shrink-0"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>` : ''}
        </div>`;
      }).join('');
    }

    async function submitStoryComment() {
      if (!exploreUser) { showToast(t('iniciarSesionParaComentar'), 'error'); return; }
      const s = allStories[currentStoryIdx];
      if (!s) return;
      const input = document.getElementById('story-comment-input');
      const body = input.value.trim();
      if (!body) return;

      await sb.from('story_comments').insert([{ story_id: s.id, user_id: exploreUser.id, body }]);
      input.value = '';
      loadStoryCommentsList();
      const el = document.getElementById('sv-comment-count');
      el.textContent = parseInt(el.textContent) + 1;
    }

    async function deleteStoryComment(commentId) {
      if (!confirm(t('confirmarEliminar'))) return;
      await sb.from('story_comments').delete().eq('id', commentId);
      loadStoryCommentsList();
      const el = document.getElementById('sv-comment-count');
      el.textContent = Math.max(0, parseInt(el.textContent) - 1);
    }

    async function shareStory() {
      const s = allStories[currentStoryIdx];
      if (!s) return;
      const url = window.location.origin + window.location.pathname;
      const name = s.profile?.display_name || s.profile?.username || t('creador');
      if (navigator.share) {
        try { await navigator.share({ title: s.title || t('historiaDe') + name, url }); } catch(e) {}
      } else {
        await navigator.clipboard.writeText(url);
        showToast(t('linkCopiado'), 'success');
      }
    }

    function closeStoryViewer() {
      if (storyObserver) { storyObserver.disconnect(); storyObserver = null; }
      pauseSlideMedia(currentStoryIdx);
      document.getElementById('story-viewer').classList.add('hidden');
      document.getElementById('story-scroll-container').innerHTML = '';
      closeStoryComments();
      document.body.style.overflow = '';
      currentStoryIdx = -1;
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeStoryViewer(); });

    // ===== CREATOR CARDS (for search) =====
    function renderCreatorCard(p) {
      const name = p.display_name || p.username || '?';
      const avatar = p.avatar_url
        ? `<img src="${esc(p.avatar_url)}" class="w-12 h-12 rounded-full object-cover border-2 border-creo-mint">`
        : `<div class="w-12 h-12 rounded-full bg-creo-mint/20 flex items-center justify-center border-2 border-creo-mint"><span class="text-creo-mint font-bold">${esc(name[0].toUpperCase())}</span></div>`;
      const verified = p.verification_status === 'approved' ? '<svg class="w-4 h-4 text-creo-mint flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>' : '';
      const dk = isDark();
      const isAdm = exploreUser && exploreUser.email === ADMIN_EMAIL;
      const impBtn = isAdm ? `<button onclick="event.preventDefault();event.stopPropagation();sessionStorage.setItem('creo-impersonate',JSON.stringify({id:'${p.id}',username:'${esc(p.username)}',display_name:'${esc(p.display_name||p.username)}'}));window.location='index.html'" class="hidden group-hover:flex items-center gap-1 text-[9px] bg-amber-100 text-amber-700 px-2 py-1 rounded-full font-semibold whitespace-nowrap">ðŸ”‘ Admin</button>` : '';

      return `<a href="profile.html?u=${esc(p.username)}" class="flex items-center gap-3 p-3 ${dk ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'} rounded-xl border hover:border-creo-mint transition group">
        ${avatar}
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-1.5">
            <span class="font-bold text-sm truncate">${esc(name)}</span>
            ${verified}
          </div>
          <p class="text-xs text-gray-400">@${esc(p.username)}</p>
          ${p.bio ? `<p class="text-xs text-gray-500 mt-0.5 line-clamp-1">${esc(p.bio)}</p>` : ''}
        </div>
        <div class="flex flex-col items-end gap-1">
          ${impBtn}
          <svg class="w-4 h-4 text-gray-300 group-hover:text-creo-mint transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </div>
      </a>`;
    }

    // ===== INIT =====
    async function init() {
      const { data: { user } } = await sb.auth.getUser();
      if (user) {
        exploreUser = user;
        const { data: prof } = await sb.from('profiles').select('account_type, stripe_connect_id').eq('id', user.id).single();
        exploreProfile = prof;
      }

      const { data: creators } = await sb.from('profiles')
        .select('id, username, display_name, avatar_url, bio, social_links, verification_status, account_type')
        .not('username', 'is', null)
        .or('account_type.is.null,account_type.eq.creator')
        .order('created_at', { ascending: false });

      if (creators) allCreators = creators;

      loadStories();
      renderBottomNav('explore');
      updateNavAuth();
      loadNotificationBell();
      translatePage();
    }

    init();
  </script>
</body>
</html>
