<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CREO — Explorar Creadores</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a0a3e">
  <meta property="og:title" content="CREO — Explorar Creadores">
  <meta property="og:description" content="Descubre y apoya a creadores con tips, metas y suscripciones mensuales">
  <meta property="og:image" content="https://fullnessmindset.github.io/creo/assets/logo-icon.png">
  <meta property="og:url" content="https://fullnessmindset.github.io/creo/explore.html">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { creo: { purple: '#1a0a3e', light: '#2d1b69', mint: '#33f0b0', mintDark: '#28c48e' } } } }
    }
  </script>
  <style>
    body { overscroll-behavior: contain; }
    .glass { background: rgba(255,255,255,0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.3); }
    .featured-scroll { display: flex; gap: 14px; overflow-x: auto; scrollbar-width: none; padding: 4px 0; }
    .featured-scroll::-webkit-scrollbar { display: none; }
    .story-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
    @media (min-width: 640px) { .story-grid { grid-template-columns: repeat(4, 1fr); } }
    .story-grid-item { position: relative; aspect-ratio: 9/16; overflow: hidden; background: #111; }
    .story-grid-item img, .story-grid-item video { width: 100%; height: 100%; object-fit: cover; }
    .story-grid-item .overlay { position: absolute; inset: 0; background: linear-gradient(transparent 50%, rgba(0,0,0,0.7)); pointer-events: none; }
    .story-grid-item:hover .overlay { background: linear-gradient(transparent 30%, rgba(0,0,0,0.8)); }
    .pill-active { background-color: #1a0a3e; color: white; }
    .pill-inactive { background-color: rgba(255,255,255,0.8); color: #6b7280; border: 1px solid #e5e7eb; }
    .pill-inactive:hover { background-color: #f3f4f6; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen transition-colors duration-300">
  <script src="shared.js"></script>

  <!-- Sticky Header -->
  <div class="fixed top-0 left-0 right-0 z-40 bg-white/90 backdrop-blur-sm border-b border-gray-200 dark-aware-header">
    <div class="max-w-2xl mx-auto px-4 py-3 space-y-3">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center flex-shrink-0"><img src="assets/logo-icon.png" alt="CREO" class="w-6 h-6 rounded-full object-contain"></div>
          <h1 class="text-lg font-bold tracking-[0.15em] text-creo-purple">EXPLORAR</h1>
        </div>
        <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-gray-100 transition">
          <svg class="w-5 h-5 text-gray-500 theme-icon-sun" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          <svg class="w-5 h-5 text-gray-300 theme-icon-moon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
      </div>
      <!-- Search -->
      <div class="relative">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input id="search-input" type="text" placeholder="Buscar creadores, historias..." class="w-full pl-10 pr-4 py-2.5 bg-gray-100 border border-gray-200 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-creo-mint text-gray-900 placeholder-gray-400 dark-aware-input" oninput="handleSearch(this.value)">
      </div>
      <!-- Pills -->
      <div class="flex gap-2">
        <button onclick="switchTab('creators')" id="pill-creators" class="px-4 py-1.5 rounded-full text-xs font-semibold transition pill-active">Creadores</button>
        <button onclick="switchTab('cocreators')" id="pill-cocreators" class="px-4 py-1.5 rounded-full text-xs font-semibold transition pill-inactive">Co-creadores</button>
        <button onclick="switchTab('deals')" id="pill-deals" class="px-4 py-1.5 rounded-full text-xs font-semibold transition pill-inactive hidden">Brand Deals</button>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="max-w-2xl mx-auto pt-40 pb-20 px-4 space-y-5">

    <!-- PANEL: Creators (default) -->
    <div id="panel-creators">
      <!-- Featured creators row -->
      <div class="mb-5">
        <h2 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Creadores Destacados</h2>
        <div class="featured-scroll" id="featured-creators"></div>
      </div>

      <!-- Stories grid (Instagram-style) -->
      <div>
        <h2 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Historias de Creadores</h2>
        <div class="story-grid" id="stories-grid"></div>
        <div id="stories-loading" class="text-center py-8">
          <div class="inline-block w-6 h-6 border-2 border-creo-mint border-t-transparent rounded-full animate-spin"></div>
        </div>
        <p id="no-stories" class="hidden text-center text-gray-400 text-xs py-8">Aún no hay historias publicadas</p>
      </div>
    </div>

    <!-- PANEL: Co-creators -->
    <div id="panel-cocreators" class="hidden space-y-3">
      <h2 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Co-Creadores</h2>
      <div id="cocreator-list" class="space-y-3"></div>
      <p id="no-cocreators" class="hidden text-center text-gray-400 text-xs py-8">No hay co-creadores aún</p>
    </div>

    <!-- PANEL: Brand Deals -->
    <div id="panel-deals" class="hidden space-y-3">
      <h2 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Brand Deals Disponibles</h2>
      <div id="deals-list" class="space-y-3"></div>
      <p id="no-deals" class="hidden text-center text-gray-400 text-xs py-8">No hay brand deals disponibles</p>
    </div>

    <!-- Search results -->
    <div id="search-results" class="hidden space-y-3">
      <h2 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Resultados</h2>
      <div id="search-results-list" class="space-y-3"></div>
      <p id="no-search" class="hidden text-center text-gray-400 text-xs py-8">No se encontraron resultados</p>
    </div>
  </div>

  <!-- Story viewer modal -->
  <div id="story-viewer" class="fixed inset-0 z-[100] hidden bg-black">
    <button onclick="closeStoryViewer()" class="absolute top-4 right-4 z-10 text-white/70 hover:text-white">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <div id="story-viewer-content" class="w-full h-full flex items-center justify-center"></div>
    <div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black/80 to-transparent">
      <div class="max-w-lg mx-auto">
        <div class="flex items-center gap-3 mb-2">
          <div id="sv-avatar" class="w-10 h-10 rounded-full overflow-hidden bg-white/20"></div>
          <div>
            <p id="sv-name" class="font-bold text-white text-sm"></p>
            <p id="sv-username" class="text-white/60 text-xs"></p>
          </div>
          <a id="sv-profile-link" href="#" class="ml-auto text-creo-mint text-xs font-bold hover:underline">Ver perfil →</a>
        </div>
        <p id="sv-title" class="text-white font-bold text-sm mb-1"></p>
        <p id="sv-description" class="text-white/80 text-xs line-clamp-3"></p>
      </div>
    </div>
  </div>

  <script>
    let allCreators = [];
    let allStories = [];
    let exploreUser = null;
    let exploreProfile = null;
    let currentTab = 'creators';

    // ===== TABS =====
    function switchTab(tab) {
      currentTab = tab;
      ['creators', 'cocreators', 'deals'].forEach(t => {
        document.getElementById('panel-' + t).classList.toggle('hidden', t !== tab);
        const pill = document.getElementById('pill-' + t);
        if (t === tab) { pill.className = pill.className.replace('pill-inactive', 'pill-active'); }
        else { pill.className = pill.className.replace('pill-active', 'pill-inactive'); }
      });
      document.getElementById('search-results').classList.add('hidden');
      document.getElementById('search-input').value = '';
      if (tab === 'cocreators') loadCocreators();
      if (tab === 'deals') loadDeals();
    }

    // ===== SEARCH =====
    let searchTimer = null;
    function handleSearch(q) {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        q = q.trim().toLowerCase();
        if (!q) {
          document.getElementById('search-results').classList.add('hidden');
          document.getElementById('panel-' + currentTab).classList.remove('hidden');
          return;
        }
        document.getElementById('panel-' + currentTab).classList.add('hidden');
        document.getElementById('search-results').classList.remove('hidden');

        const results = allCreators.filter(c => {
          const name = (c.display_name || '').toLowerCase();
          const user = (c.username || '').toLowerCase();
          const bio = (c.bio || '').toLowerCase();
          return name.includes(q) || user.includes(q) || bio.includes(q);
        });

        const list = document.getElementById('search-results-list');
        document.getElementById('no-search').classList.toggle('hidden', results.length > 0);
        list.innerHTML = results.map(renderCreatorCard).join('');
      }, 250);
    }

    // ===== FEATURED CREATORS =====
    function renderFeaturedCreators(creators) {
      const featured = creators.filter(c => c.verification_status === 'approved').slice(0, 15);
      const all = featured.length > 0 ? featured : creators.slice(0, 15);
      const container = document.getElementById('featured-creators');
      container.innerHTML = all.map(c => {
        const name = c.display_name || c.username || '?';
        const verified = c.verification_status === 'approved';
        const avatar = c.avatar_url
          ? `<img src="${esc(c.avatar_url)}" class="w-16 h-16 rounded-full object-cover ${verified ? 'ring-2 ring-creo-mint ring-offset-2' : 'ring-1 ring-gray-200'}">`
          : `<div class="w-16 h-16 rounded-full ${verified ? 'bg-creo-mint/20 ring-2 ring-creo-mint ring-offset-2' : 'bg-gray-200 ring-1 ring-gray-200'} flex items-center justify-center"><span class="font-bold text-lg ${verified ? 'text-creo-mint' : 'text-gray-400'}">${esc(name[0].toUpperCase())}</span></div>`;
        return `<a href="profile.html?u=${esc(c.username)}" class="flex flex-col items-center gap-1 flex-shrink-0 w-[72px] group">
          <div class="relative">
            ${avatar}
            ${verified ? '<div class="absolute -bottom-0.5 -right-0.5 w-5 h-5 bg-white rounded-full flex items-center justify-center shadow-sm"><svg class="w-4 h-4 text-creo-mint" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg></div>' : ''}
          </div>
          <span class="text-[10px] text-gray-600 truncate w-full text-center group-hover:text-creo-purple transition">${esc(name)}</span>
        </a>`;
      }).join('');
    }

    // ===== STORIES GRID =====
    async function loadStories() {
      try {
        const { data, error } = await sb.from('creator_stories')
          .select('*, profile:creator_id(id, username, display_name, avatar_url, verification_status)')
          .order('created_at', { ascending: false })
          .limit(60);

        document.getElementById('stories-loading').classList.add('hidden');
        if (error || !data || data.length === 0) {
          document.getElementById('no-stories').classList.remove('hidden');
          return;
        }

        allStories = data;
        renderStoriesGrid(data);
      } catch(e) {
        document.getElementById('stories-loading').classList.add('hidden');
        document.getElementById('no-stories').classList.remove('hidden');
      }
    }

    function renderStoriesGrid(stories) {
      const grid = document.getElementById('stories-grid');
      grid.innerHTML = stories.map((s, i) => {
        const p = s.profile;
        const name = p?.display_name || p?.username || '?';
        const verified = p?.verification_status === 'approved';
        const avatar = p?.avatar_url
          ? `<img src="${esc(p.avatar_url)}" class="w-7 h-7 rounded-full object-cover ring-1 ring-white">`
          : `<div class="w-7 h-7 rounded-full bg-white/30 flex items-center justify-center ring-1 ring-white"><span class="text-white text-[10px] font-bold">${esc(name[0])}</span></div>`;

        let thumb = '';
        if (s.main_video_url) {
          const isYT = /youtube|youtu\.be/.test(s.main_video_url);
          if (isYT) {
            const vid = s.main_video_url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);
            thumb = vid ? `<img src="https://img.youtube.com/vi/${vid[1]}/mqdefault.jpg" class="w-full h-full object-cover">` : '';
          } else {
            thumb = `<video src="${esc(s.main_video_url)}" class="w-full h-full object-cover" preload="metadata" muted></video>`;
          }
        } else if (s.media_urls && s.media_urls.length > 0) {
          const first = s.media_urls[0];
          const isVid = /\.(mp4|webm|mov)$/i.test(first);
          thumb = isVid
            ? `<video src="${esc(first)}" class="w-full h-full object-cover" preload="metadata" muted></video>`
            : `<img src="${esc(first)}" class="w-full h-full object-cover">`;
        } else {
          thumb = `<div class="w-full h-full bg-gradient-to-br from-creo-purple to-creo-light flex items-center justify-center">
            <svg class="w-8 h-8 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
          </div>`;
        }

        return `<div class="story-grid-item cursor-pointer" onclick="openStoryViewer(${i})">
          ${thumb}
          <div class="overlay"></div>
          <div class="absolute top-2 left-2 flex items-center gap-1">
            ${avatar}
            ${verified ? '<svg class="w-3.5 h-3.5 text-creo-mint" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>' : ''}
          </div>
          <div class="absolute bottom-2 left-2 right-2">
            <p class="text-white text-[10px] font-bold truncate">${esc(s.title || name)}</p>
          </div>
        </div>`;
      }).join('');
    }

    // ===== STORY VIEWER =====
    function openStoryViewer(idx) {
      const s = allStories[idx];
      if (!s) return;
      const p = s.profile;
      const viewer = document.getElementById('story-viewer');

      const name = p?.display_name || p?.username || '?';
      const avatar = p?.avatar_url
        ? `<img src="${esc(p.avatar_url)}" class="w-full h-full object-cover">`
        : `<div class="w-full h-full bg-creo-purple/30 flex items-center justify-center"><span class="text-white font-bold">${esc(name[0])}</span></div>`;

      document.getElementById('sv-avatar').innerHTML = avatar;
      document.getElementById('sv-name').textContent = name;
      document.getElementById('sv-username').textContent = '@' + (p?.username || '');
      document.getElementById('sv-profile-link').href = 'profile.html?u=' + (p?.username || '');
      document.getElementById('sv-title').textContent = s.title || '';
      document.getElementById('sv-description').textContent = s.description || s.content || '';

      const content = document.getElementById('story-viewer-content');
      if (s.main_video_url) {
        const isYT = /youtube|youtu\.be/.test(s.main_video_url);
        if (isYT) {
          const vid = s.main_video_url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);
          content.innerHTML = vid ? `<iframe src="https://www.youtube.com/embed/${vid[1]}?autoplay=1&rel=0" class="w-full h-full max-w-lg max-h-[80vh] rounded-xl" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>` : '';
        } else {
          content.innerHTML = `<video src="${esc(s.main_video_url)}" controls autoplay class="max-w-full max-h-[80vh] rounded-xl"></video>`;
        }
      } else if (s.media_urls && s.media_urls.length > 0) {
        const first = s.media_urls[0];
        const isVid = /\.(mp4|webm|mov)$/i.test(first);
        content.innerHTML = isVid
          ? `<video src="${esc(first)}" controls autoplay class="max-w-full max-h-[80vh] rounded-xl"></video>`
          : `<img src="${esc(first)}" class="max-w-full max-h-[80vh] object-contain rounded-xl">`;
      } else {
        content.innerHTML = `<div class="max-w-md mx-auto p-8 text-center text-white space-y-4">
          <h3 class="text-xl font-bold">${esc(s.title || 'Mi Historia')}</h3>
          <p class="text-sm text-white/80 leading-relaxed">${esc(s.description || s.content || '')}</p>
        </div>`;
      }

      viewer.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeStoryViewer() {
      document.getElementById('story-viewer').classList.add('hidden');
      document.getElementById('story-viewer-content').innerHTML = '';
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeStoryViewer(); });

    // ===== CREATOR CARDS (for search / co-creators) =====
    function renderCreatorCard(p) {
      const name = p.display_name || p.username || '?';
      const avatar = p.avatar_url
        ? `<img src="${esc(p.avatar_url)}" class="w-12 h-12 rounded-full object-cover border-2 border-creo-mint">`
        : `<div class="w-12 h-12 rounded-full bg-creo-mint/20 flex items-center justify-center border-2 border-creo-mint"><span class="text-creo-mint font-bold">${esc(name[0].toUpperCase())}</span></div>`;
      const verified = p.verification_status === 'approved' ? '<svg class="w-4 h-4 text-creo-mint flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>' : '';
      const dk = isDark();
      const isAdm = exploreUser && exploreUser.email === ADMIN_EMAIL;
      const impBtn = isAdm ? `<button onclick="event.preventDefault();event.stopPropagation();sessionStorage.setItem('creo-impersonate',JSON.stringify({id:'${p.id}',username:'${esc(p.username)}',display_name:'${esc(p.display_name||p.username)}'}));window.location='index.html'" class="hidden group-hover:flex items-center gap-1 text-[9px] bg-amber-100 text-amber-700 px-2 py-1 rounded-full font-semibold whitespace-nowrap">🔑 Admin</button>` : '';

      return `<a href="profile.html?u=${esc(p.username)}" class="flex items-center gap-3 p-3 ${dk ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'} rounded-xl border hover:border-creo-mint transition group">
        ${avatar}
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-1.5">
            <span class="font-bold text-sm truncate">${esc(name)}</span>
            ${verified}
          </div>
          <p class="text-xs text-gray-400">@${esc(p.username)}</p>
          ${p.bio ? `<p class="text-xs text-gray-500 mt-0.5 line-clamp-1">${esc(p.bio)}</p>` : ''}
        </div>
        <div class="flex flex-col items-end gap-1">
          ${impBtn}
          <svg class="w-4 h-4 text-gray-300 group-hover:text-creo-mint transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </div>
      </a>`;
    }

    // ===== CO-CREATORS =====
    async function loadCocreators() {
      const list = document.getElementById('cocreator-list');
      if (list.innerHTML) return;
      const { data } = await sb.from('profiles')
        .select('id, username, display_name, avatar_url, bio, verification_status')
        .eq('account_type', 'co-creator')
        .not('username', 'is', null)
        .order('created_at', { ascending: false });
      if (!data || data.length === 0) { document.getElementById('no-cocreators').classList.remove('hidden'); return; }
      list.innerHTML = data.map(renderCreatorCard).join('');
    }

    // ===== BRAND DEALS =====
    async function loadDeals() {
      const list = document.getElementById('deals-list');
      if (list.innerHTML) return;
      const { data } = await sb.from('brand_deals')
        .select('*, brand:brand_id(username, display_name, avatar_url)')
        .eq('status', 'active')
        .order('created_at', { ascending: false });
      if (!data || data.length === 0) { document.getElementById('no-deals').classList.remove('hidden'); return; }
      list.innerHTML = data.map(deal => {
        const budgetUsd = (deal.budget_per_creator_cents / 100).toFixed(2);
        const brandName = deal.brand?.display_name || deal.brand?.username || 'Marca';
        const brandAvatar = deal.brand?.avatar_url
          ? `<img src="${esc(deal.brand.avatar_url)}" class="w-10 h-10 rounded-full object-cover border-2 border-amber-400">`
          : `<div class="w-10 h-10 rounded-full bg-amber-100 flex items-center justify-center border-2 border-amber-400"><span class="text-amber-600 font-bold text-sm">${esc(brandName[0])}</span></div>`;
        const dk = isDark();
        return `<div class="p-4 ${dk ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'} rounded-xl border space-y-3">
          <div class="flex items-center gap-3">
            ${brandAvatar}
            <div class="flex-1 min-w-0">
              <p class="font-bold text-sm truncate">${esc(deal.title)}</p>
              <p class="text-xs text-gray-400">por ${esc(brandName)}</p>
            </div>
            <span class="text-sm font-bold text-green-600">$${budgetUsd}</span>
          </div>
          ${deal.description ? `<p class="text-xs text-gray-500 line-clamp-2">${esc(deal.description)}</p>` : ''}
          <div class="flex items-center justify-between">
            <span class="text-[10px] text-gray-400">${deal.max_creators} creador(es) max</span>
            <button onclick="event.stopPropagation()" class="px-4 py-1.5 bg-creo-purple text-white text-xs font-semibold rounded-lg hover:opacity-90 transition">Ver Detalles</button>
          </div>
        </div>`;
      }).join('');
    }

    // ===== INIT =====
    async function init() {
      const { data: { user } } = await sb.auth.getUser();
      if (user) {
        exploreUser = user;
        const { data: prof } = await sb.from('profiles').select('account_type, stripe_connect_id').eq('id', user.id).single();
        exploreProfile = prof;
        if (prof && (prof.account_type === 'creator' || !prof.account_type)) {
          document.getElementById('pill-deals').classList.remove('hidden');
        }
      }

      const { data: creators } = await sb.from('profiles')
        .select('id, username, display_name, avatar_url, bio, social_links, verification_status, account_type')
        .not('username', 'is', null)
        .or('account_type.is.null,account_type.eq.creator')
        .order('created_at', { ascending: false });

      if (creators) {
        allCreators = creators;
        renderFeaturedCreators(creators);
      }

      loadStories();
      renderBottomNav('explore');
      updateNavAuth();
      loadNotificationBell();
    }

    init();
  </script>
</body>
</html>
