<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CREO — Comunidad</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a0a3e">
  <meta name="description" content="CREO — Comunidad de creadores">
  <meta property="og:title" content="CREO — Comunidad">
  <meta property="og:image" content="https://fullnessmindset.github.io/creo/assets/logo-icon.png">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <link rel="icon" href="assets/logo-icon.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/logo-icon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { creo: { purple: '#1a0a3e', light: '#2d1b69', mint: '#33f0b0', mintDark: '#28c48e' } } } }
    }
  </script>
  <style>
    .glass { background: rgba(255,255,255,0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.3); }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen transition-colors duration-300">
  <script src="shared.js"></script>

  <div class="max-w-2xl mx-auto px-4 pt-6 pb-24 space-y-4">

    <!-- Header -->
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="assets/logo-icon.png" class="w-8 h-8 rounded-full" alt="CREO">
        <h1 class="text-xl font-bold text-gray-900">Comunidad</h1>
      </div>
      <div id="notification-bell-area"></div>
    </div>

    <!-- Compose Post -->
    <div id="compose-section" class="hidden">
      <div class="bg-white p-4 rounded-xl shadow border border-gray-200 space-y-3">
        <div class="flex items-start gap-3">
          <div id="comunidad-avatar" class="w-10 h-10 rounded-full bg-creo-purple/10 flex items-center justify-center overflow-hidden flex-shrink-0">
            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          </div>
          <div class="flex-1 space-y-2">
            <textarea id="comunidad-compose" rows="2" placeholder="¿Qué quieres compartir con la comunidad?" class="w-full border border-gray-300 bg-gray-50 p-3 rounded-lg text-sm text-gray-900 outline-none focus:ring-2 focus:ring-creo-purple resize-none"></textarea>
            <div class="flex items-center justify-between">
              <div class="flex gap-2">
                <label class="cursor-pointer p-2 rounded-lg hover:bg-gray-100 transition text-gray-400 hover:text-creo-purple">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                  <input type="file" id="comunidad-media" accept="image/*,video/*" multiple class="hidden" onchange="previewComunidadMedia()">
                </label>
              </div>
              <button onclick="publishComunidadPost()" id="comunidad-publish-btn" class="px-5 py-2 bg-creo-purple text-white text-xs font-bold rounded-lg hover:bg-creo-light transition">Publicar</button>
            </div>
            <div id="comunidad-media-preview" class="flex gap-2 overflow-x-auto hidden"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Sort toggle -->
    <div class="flex gap-1 bg-gray-100 rounded-xl p-1">
      <button onclick="setComunidadSort('trending')" id="comunidad-sort-trending" class="flex-1 py-2 text-xs font-semibold rounded-lg transition bg-white text-gray-900 shadow-sm">🔥 Tendencias</button>
      <button onclick="setComunidadSort('recent')" id="comunidad-sort-recent" class="flex-1 py-2 text-xs font-semibold rounded-lg transition text-gray-500">🕐 Recientes</button>
    </div>

    <!-- Feed -->
    <div id="comunidad-feed" class="space-y-4"></div>
    <div id="comunidad-loading" class="hidden text-center py-4">
      <div class="inline-block w-6 h-6 border-2 border-creo-purple border-t-transparent rounded-full animate-spin"></div>
    </div>
    <div id="comunidad-empty" class="hidden text-center py-8">
      <svg class="w-16 h-16 text-gray-200 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg>
      <p class="text-sm font-semibold text-gray-500">La comunidad está esperando tu primer post</p>
      <p class="text-xs text-gray-400 mt-1">Comparte algo con los demás creadores</p>
    </div>
    <div id="comunidad-end" class="hidden text-center py-4">
      <p class="text-xs text-gray-400">No hay más publicaciones</p>
    </div>
    <button onclick="loadComunidadFeed()" id="comunidad-load-more" class="hidden w-full py-3 text-xs font-semibold text-creo-purple bg-creo-purple/5 rounded-xl hover:bg-creo-purple/10 transition">Cargar más</button>
  </div>

  <script>
    let currentUser = null;
    let comunidadPage = 0;
    let comunidadDone = false;
    let comunidadLoading = false;
    let comunidadSort = 'trending';
    let comunidadMediaFiles = [];
    const COMUNIDAD_PAGE_SIZE = 10;

    function setComunidadSort(mode) {
      comunidadSort = mode;
      document.getElementById('comunidad-sort-trending').className = mode === 'trending'
        ? 'flex-1 py-2 text-xs font-semibold rounded-lg transition bg-white text-gray-900 shadow-sm'
        : 'flex-1 py-2 text-xs font-semibold rounded-lg transition text-gray-500';
      document.getElementById('comunidad-sort-recent').className = mode === 'recent'
        ? 'flex-1 py-2 text-xs font-semibold rounded-lg transition bg-white text-gray-900 shadow-sm'
        : 'flex-1 py-2 text-xs font-semibold rounded-lg transition text-gray-500';
      comunidadPage = 0;
      comunidadDone = false;
      document.getElementById('comunidad-feed').innerHTML = '';
      document.getElementById('comunidad-empty').classList.add('hidden');
      document.getElementById('comunidad-end').classList.add('hidden');
      document.getElementById('comunidad-load-more').classList.add('hidden');
      loadComunidadFeed();
    }

    async function loadComunidadFeed() {
      if (comunidadLoading || comunidadDone) return;
      comunidadLoading = true;
      document.getElementById('comunidad-loading').classList.remove('hidden');
      document.getElementById('comunidad-load-more').classList.add('hidden');

      try {
        let query = sb.from('community_posts')
          .select('*, author:author_id(id, username, display_name, avatar_url, verification_status)')
          .or('profile_only.is.null,profile_only.eq.false');

        if (comunidadSort === 'trending') {
          query = query
            .order('like_count', { ascending: false })
            .order('comment_count', { ascending: false })
            .order('share_count', { ascending: false })
            .order('created_at', { ascending: false });
        } else {
          query = query.order('created_at', { ascending: false });
        }

        const { data, error } = await query.range(
          comunidadPage * COMUNIDAD_PAGE_SIZE,
          (comunidadPage + 1) * COMUNIDAD_PAGE_SIZE - 1
        );

        if (error) throw error;
        if (!data || data.length < COMUNIDAD_PAGE_SIZE) comunidadDone = true;

        if (comunidadPage === 0 && (!data || data.length === 0)) {
          document.getElementById('comunidad-empty').classList.remove('hidden');
        }

        if (data && data.length > 0) {
          document.getElementById('comunidad-empty').classList.add('hidden');

          const likesMap = {};
          const sharesMap = {};
          if (currentUser) {
            const postIds = data.map(p => p.id);
            const [likesRes, sharesRes] = await Promise.all([
              sb.from('community_likes').select('post_id').eq('user_id', currentUser.id).in('post_id', postIds),
              sb.from('community_shares').select('post_id').eq('user_id', currentUser.id).in('post_id', postIds)
            ]);
            (likesRes.data || []).forEach(l => likesMap[l.post_id] = true);
            (sharesRes.data || []).forEach(s => sharesMap[s.post_id] = true);
          }

          const feed = document.getElementById('comunidad-feed');
          data.forEach(post => {
            feed.insertAdjacentHTML('beforeend', renderComunidadPost(post, likesMap[post.id], sharesMap[post.id]));
          });
          comunidadPage++;
        }

        if (comunidadDone) {
          document.getElementById('comunidad-end').classList.remove('hidden');
        } else {
          document.getElementById('comunidad-load-more').classList.remove('hidden');
        }
      } catch (e) {
        console.error('Comunidad feed error:', e);
        if (comunidadPage === 0) document.getElementById('comunidad-empty').classList.remove('hidden');
      }

      comunidadLoading = false;
      document.getElementById('comunidad-loading').classList.add('hidden');
    }

    function renderComunidadPost(post, liked, shared) {
      const a = post.author;
      if (!a) return '';
      const name = a.display_name || a.username || 'Usuario';
      const avatar = a.avatar_url
        ? `<img src="${esc(a.avatar_url)}" class="w-full h-full object-cover">`
        : `<span class="text-creo-purple font-bold text-sm">${esc(name[0].toUpperCase())}</span>`;
      const verified = a.verification_status === 'approved' ? '<svg class="w-4 h-4 text-creo-mint flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>' : '';
      const isOwner = currentUser && currentUser.id === post.author_id;
      const timeAgo = getTimeAgo(post.created_at);

      let mediaHtml = '';
      const media = post.media_urls || [];
      if (media.length > 0) {
        mediaHtml = `<div class="rounded-xl overflow-hidden mt-2">${media.slice(0, 4).map(m => {
          const isVideo = /\.(mp4|webm|mov)$/i.test(m);
          if (isVideo) return `<video src="${esc(m)}" class="w-full max-h-80 object-cover rounded-xl" controls preload="metadata"></video>`;
          return `<img src="${esc(m)}" class="w-full max-h-80 object-cover rounded-xl">`;
        }).join('')}</div>`;
      }

      const likeColor = liked ? 'text-red-500' : 'text-gray-400';
      const likeFill = liked ? 'fill="currentColor"' : 'fill="none"';
      const shareColor = shared ? 'text-creo-mint' : 'text-gray-400';

      return `<div class="bg-white rounded-xl shadow border border-gray-200 overflow-hidden" id="cp-${post.id}">
        <div class="p-4">
          <div class="flex items-center gap-3 mb-3">
            <a href="profile.html?u=${esc(a.username || '')}" class="w-10 h-10 rounded-full bg-creo-purple/10 flex items-center justify-center overflow-hidden flex-shrink-0">${avatar}</a>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-1">
                <a href="profile.html?u=${esc(a.username || '')}" class="font-bold text-sm text-gray-900 hover:underline truncate">${esc(name)}</a>
                ${verified}
              </div>
              <p class="text-[10px] text-gray-400">@${esc(a.username || '')} · ${timeAgo}</p>
            </div>
            ${isOwner ? `<button onclick="deleteComunidadPost('${post.id}')" class="text-gray-300 hover:text-red-400 transition p-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>` : ''}
          </div>
          ${post.body ? `<p class="text-sm text-gray-800 whitespace-pre-wrap mb-2">${esc(post.body)}</p>` : ''}
          ${mediaHtml}
          <div class="flex items-center justify-between mt-3 pt-3 border-t border-gray-100">
            <button onclick="toggleComunidadLike('${post.id}')" class="flex items-center gap-1.5 ${likeColor} hover:text-red-500 transition text-xs font-semibold">
              <svg class="w-5 h-5" ${likeFill} stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
              <span id="cp-likes-${post.id}">${post.like_count || 0}</span>
            </button>
            <button onclick="toggleComunidadComments('${post.id}')" class="flex items-center gap-1.5 text-gray-400 hover:text-blue-500 transition text-xs font-semibold">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
              <span id="cp-comments-${post.id}">${post.comment_count || 0}</span>
            </button>
            <button onclick="toggleComunidadShare('${post.id}')" class="flex items-center gap-1.5 ${shareColor} hover:text-creo-mint transition text-xs font-semibold">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
              <span id="cp-shares-${post.id}">${post.share_count || 0}</span>
            </button>
          </div>
          <div id="cp-comment-section-${post.id}" class="hidden mt-3 pt-3 border-t border-gray-100 space-y-2">
            <div id="cp-comment-list-${post.id}" class="space-y-2 max-h-60 overflow-y-auto"></div>
            <div class="flex gap-2">
              <input id="cp-comment-input-${post.id}" type="text" placeholder="Escribe un comentario..." class="flex-1 border border-gray-300 bg-gray-50 p-2 rounded-lg text-xs text-gray-900 outline-none focus:ring-2 focus:ring-creo-purple" onkeydown="if(event.key==='Enter')submitComunidadComment('${post.id}')">
              <button onclick="submitComunidadComment('${post.id}')" class="px-3 py-2 bg-creo-purple text-white text-xs font-bold rounded-lg hover:bg-creo-light transition">Enviar</button>
            </div>
          </div>
        </div>
      </div>`;
    }

    function getTimeAgo(dateStr) {
      const now = new Date();
      const d = new Date(dateStr);
      const diff = Math.floor((now - d) / 1000);
      if (diff < 60) return 'ahora';
      if (diff < 3600) return Math.floor(diff / 60) + 'm';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h';
      if (diff < 604800) return Math.floor(diff / 86400) + 'd';
      return d.toLocaleDateString('es', { month: 'short', day: 'numeric' });
    }

    function previewComunidadMedia() {
      const input = document.getElementById('comunidad-media');
      const preview = document.getElementById('comunidad-media-preview');
      comunidadMediaFiles = Array.from(input.files);
      if (comunidadMediaFiles.length === 0) { preview.classList.add('hidden'); return; }
      preview.classList.remove('hidden');
      preview.innerHTML = comunidadMediaFiles.map((f, i) => {
        const isVideo = f.type.startsWith('video');
        return `<div class="relative flex-shrink-0">
          ${isVideo
            ? `<div class="w-20 h-20 rounded-lg bg-black flex items-center justify-center"><svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>`
            : `<img src="${URL.createObjectURL(f)}" class="w-20 h-20 rounded-lg object-cover">`}
          <button onclick="removeComunidadMedia(${i})" class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white rounded-full text-xs flex items-center justify-center">×</button>
        </div>`;
      }).join('');
    }

    function removeComunidadMedia(idx) {
      comunidadMediaFiles.splice(idx, 1);
      const preview = document.getElementById('comunidad-media-preview');
      if (comunidadMediaFiles.length === 0) { preview.classList.add('hidden'); preview.innerHTML = ''; return; }
      previewComunidadMedia();
    }

    async function publishComunidadPost() {
      if (!currentUser) { showToast('Inicia sesión para publicar', 'error'); return; }
      const body = document.getElementById('comunidad-compose').value.trim();
      if (!body && comunidadMediaFiles.length === 0) { showToast('Escribe algo o agrega una imagen', 'error'); return; }
      const btn = document.getElementById('comunidad-publish-btn');
      btn.textContent = 'Publicando...'; btn.disabled = true;

      let mediaUrls = [];
      for (const file of comunidadMediaFiles) {
        const url = await uploadToStorage(file, 'community-media', 10);
        if (url) mediaUrls.push(url);
      }

      const postType = mediaUrls.some(u => /\.(mp4|webm|mov)$/i.test(u)) ? 'video' : (mediaUrls.length > 0 ? 'photo' : 'text');
      const { error } = await sb.from('community_posts').insert([{
        author_id: currentUser.id,
        body: body || null,
        media_urls: mediaUrls,
        post_type: postType,
        profile_only: false
      }]);

      btn.textContent = 'Publicar'; btn.disabled = false;
      if (error) { showToast('Error: ' + error.message, 'error'); return; }

      document.getElementById('comunidad-compose').value = '';
      document.getElementById('comunidad-media-preview').classList.add('hidden');
      document.getElementById('comunidad-media-preview').innerHTML = '';
      document.getElementById('comunidad-media').value = '';
      comunidadMediaFiles = [];
      showToast('Publicación creada', 'success');

      comunidadPage = 0; comunidadDone = false;
      document.getElementById('comunidad-feed').innerHTML = '';
      loadComunidadFeed();
    }

    async function toggleComunidadLike(postId) {
      if (!currentUser) { showToast('Inicia sesión', 'error'); return; }
      const { data: existing } = await sb.from('community_likes').select('id').eq('post_id', postId).eq('user_id', currentUser.id).single();
      if (existing) {
        await sb.from('community_likes').delete().eq('id', existing.id);
      } else {
        await sb.from('community_likes').insert([{ post_id: postId, user_id: currentUser.id }]);
      }
      const { count } = await sb.from('community_likes').select('id', { count: 'exact', head: true }).eq('post_id', postId);
      const el = document.getElementById('cp-likes-' + postId);
      if (el) el.textContent = count || 0;
    }

    async function toggleComunidadShare(postId) {
      if (!currentUser) { showToast('Inicia sesión', 'error'); return; }
      const { data: existing } = await sb.from('community_shares').select('id').eq('post_id', postId).eq('user_id', currentUser.id).single();
      if (existing) {
        await sb.from('community_shares').delete().eq('id', existing.id);
      } else {
        await sb.from('community_shares').insert([{ post_id: postId, user_id: currentUser.id }]);
      }
      const { count } = await sb.from('community_shares').select('id', { count: 'exact', head: true }).eq('post_id', postId);
      const el = document.getElementById('cp-shares-' + postId);
      if (el) el.textContent = count || 0;
    }

    async function toggleComunidadComments(postId) {
      const section = document.getElementById('cp-comment-section-' + postId);
      if (section.classList.contains('hidden')) {
        section.classList.remove('hidden');
        await loadComunidadComments(postId);
      } else {
        section.classList.add('hidden');
      }
    }

    async function loadComunidadComments(postId) {
      const { data } = await sb.from('community_comments')
        .select('*, author:author_id(username, display_name, avatar_url)')
        .eq('post_id', postId)
        .order('created_at', { ascending: true })
        .limit(50);
      const list = document.getElementById('cp-comment-list-' + postId);
      if (!data || data.length === 0) { list.innerHTML = '<p class="text-xs text-gray-400 text-center py-2">Sin comentarios aún</p>'; return; }
      list.innerHTML = data.map(c => {
        const ca = c.author;
        const cName = ca?.display_name || ca?.username || '?';
        const cAvatar = ca?.avatar_url
          ? `<img src="${esc(ca.avatar_url)}" class="w-6 h-6 rounded-full object-cover">`
          : `<div class="w-6 h-6 rounded-full bg-creo-purple/10 flex items-center justify-center"><span class="text-[9px] font-bold text-creo-purple">${esc(cName[0])}</span></div>`;
        const isOwn = currentUser && currentUser.id === c.author_id;
        return `<div class="flex gap-2 items-start">
          ${cAvatar}
          <div class="flex-1 bg-gray-50 rounded-lg px-3 py-2">
            <p class="text-[10px] font-semibold text-gray-700">${esc(cName)}</p>
            <p class="text-xs text-gray-600">${esc(c.body)}</p>
          </div>
          ${isOwn ? `<button onclick="deleteComunidadComment('${c.id}','${postId}')" class="text-gray-300 hover:text-red-400 text-xs">×</button>` : ''}
        </div>`;
      }).join('');
    }

    async function submitComunidadComment(postId) {
      if (!currentUser) { showToast('Inicia sesión', 'error'); return; }
      const input = document.getElementById('cp-comment-input-' + postId);
      const body = input.value.trim();
      if (!body) return;
      input.value = '';
      await sb.from('community_comments').insert([{ post_id: postId, author_id: currentUser.id, body }]);
      await loadComunidadComments(postId);
      const { count } = await sb.from('community_comments').select('id', { count: 'exact', head: true }).eq('post_id', postId);
      const el = document.getElementById('cp-comments-' + postId);
      if (el) el.textContent = count || 0;
    }

    async function deleteComunidadComment(commentId, postId) {
      await sb.from('community_comments').delete().eq('id', commentId);
      await loadComunidadComments(postId);
      const { count } = await sb.from('community_comments').select('id', { count: 'exact', head: true }).eq('post_id', postId);
      const el = document.getElementById('cp-comments-' + postId);
      if (el) el.textContent = count || 0;
    }

    async function deleteComunidadPost(postId) {
      if (!confirm('¿Eliminar esta publicación?')) return;
      await sb.from('community_posts').delete().eq('id', postId);
      const el = document.getElementById('cp-' + postId);
      if (el) el.remove();
      showToast('Publicación eliminada', 'success');
    }

    window.onload = async () => {
      renderBottomNav('comunidad');
      loadNotificationBell();
      const { data: { user } } = await sb.auth.getUser();
      if (user) {
        currentUser = user;
        document.getElementById('compose-section').classList.remove('hidden');
        const { data: profile } = await sb.from('profiles').select('avatar_url, display_name').eq('id', user.id).single();
        if (profile?.avatar_url) {
          document.getElementById('comunidad-avatar').innerHTML = `<img src="${esc(profile.avatar_url)}" class="w-full h-full object-cover">`;
        }
      }
      loadComunidadFeed();
    };
  </script>
</body>
</html>
