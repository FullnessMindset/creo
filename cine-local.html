<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CREO — Cine Local</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/logo-icon.png" type="image/png">
  <meta name="theme-color" content="#0a0a0a">
  <meta property="og:title" content="CREO — Cine Local">
  <meta property="og:description" content="Cine independiente y contenido visual genuino. Historias reales de creadores locales. Gratis para ver, apoya con Creo en Ti.">
  <meta property="og:image" content="https://fullnessmindset.github.io/creo/assets/logo-icon.png">
  <meta property="og:url" content="https://fullnessmindset.github.io/creo/cine-local.html">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { creo: { purple: '#1a0a3e', light: '#2d1b69', mint: '#33f0b0', mintDark: '#28c48e' } } } }
    }
  </script>
  <style>
    body { overscroll-behavior: contain; background: #0a0a0a; }
    .cine-scrollbar::-webkit-scrollbar { height: 0; width: 0; }
    .cine-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
    .card-hover { transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .card-hover:hover { transform: scale(1.05); box-shadow: 0 8px 32px rgba(51,240,176,0.15); }
    .pill-active { background: #33f0b0; color: #0a0a0a; font-weight: 600; }
    .pill-inactive { background: rgba(255,255,255,0.08); color: #ccc; }
    .pill-inactive:hover { background: rgba(255,255,255,0.15); }
    .hero-gradient { background: linear-gradient(to top, #0a0a0a 0%, transparent 60%); }
    .modal-backdrop { background: rgba(0,0,0,0.95); }
    @keyframes fade-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fade-in 0.4s ease-out; }
    @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(51,240,176,0.4); } 50% { box-shadow: 0 0 20px 4px rgba(51,240,176,0.2); } }
    .play-btn { animation: pulse-glow 2s infinite; }
  </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">
  <script src="shared.js"></script>

  <!-- Header -->
  <header class="fixed top-0 left-0 right-0 z-50 bg-[#0a0a0a]/90 backdrop-blur-md border-b border-white/5">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="index.html" class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center flex-shrink-0">
            <img src="assets/logo-icon.png" alt="CREO" class="w-6 h-6 rounded-full object-contain">
          </div>
        </a>
        <h1 class="text-lg font-bold tracking-[0.2em] text-creo-mint">CINE LOCAL</h1>
      </div>
      <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-white/10 transition">
        <svg class="w-5 h-5 text-gray-400 theme-icon-sun" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        <svg class="w-5 h-5 text-gray-300 theme-icon-moon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="pt-16 pb-24">

    <!-- Manifesto Banner -->
    <section class="relative px-4 py-10 md:py-14">
      <div class="max-w-3xl mx-auto text-center">
        <p class="text-sm md:text-base text-gray-400 leading-relaxed italic">
          "Cine Local es un espacio para cineastas y creadores visuales que cuentan historias reales.
          Aquí no hay algoritmos que premien lo viral — solo contenido genuino que merece ser visto.
          El contenido es gratuito. Si amas lo que ves, apoya al creador con un <span class="text-creo-mint font-semibold not-italic">Creo en Ti</span>."
        </p>
      </div>
    </section>

    <!-- Category Filter Pills -->
    <section class="px-4 mb-6">
      <div class="max-w-6xl mx-auto">
        <div id="category-pills" class="flex gap-2 overflow-x-auto cine-scrollbar pb-2">
          <!-- pills rendered by JS -->
        </div>
      </div>
    </section>

    <!-- Featured Hero -->
    <section id="hero-section" class="px-4 mb-10">
      <div class="max-w-6xl mx-auto">
        <div id="hero-card" class="relative rounded-xl overflow-hidden cursor-pointer group" onclick="playFeatured()">
          <!-- filled by JS -->
        </div>
      </div>
    </section>

    <!-- Content Rows by Category -->
    <div id="content-rows" class="space-y-10">
      <!-- filled by JS -->
    </div>

  </main>

  <!-- Video Player Modal -->
  <div id="player-modal" class="fixed inset-0 z-[100] hidden modal-backdrop">
    <div class="relative w-full h-full flex flex-col">
      <!-- Close button -->
      <button onclick="closePlayer()" class="absolute top-4 right-4 z-[110] text-white/60 hover:text-white transition">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>

      <!-- Video -->
      <div class="flex-1 flex items-center justify-center px-4 pt-14 pb-4">
        <video id="modal-video" class="max-w-full max-h-full rounded-lg" controls autoplay>
          <source src="" type="video/mp4">
        </video>
      </div>

      <!-- Info bar -->
      <div class="px-4 pb-6 md:px-8 animate-fade-in">
        <div class="max-w-3xl mx-auto flex items-start justify-between gap-4">
          <div class="flex-1 min-w-0">
            <h2 id="modal-title" class="text-xl md:text-2xl font-bold truncate"></h2>
            <p id="modal-creator" class="text-gray-400 text-sm mt-1"></p>
            <p id="modal-desc" class="text-gray-500 text-xs mt-2 line-clamp-2"></p>
          </div>
          <a id="modal-tip-btn" href="#" class="flex-shrink-0 bg-creo-mint text-black font-bold text-sm px-5 py-2.5 rounded-full hover:bg-creo-mintDark transition flex items-center gap-2">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            Creo en Ti
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
  /* ── Demo Data ─────────────────────────────────────────── */
  const CATEGORIES = ['Todo', 'Cortometrajes', 'Documentales', 'Música', 'Arte', 'Comedia', 'Drama'];

  const DEMO_DATA = [
    {
      id: 'd1', title: 'El Último Amanecer', description: 'Un cortometraje sobre un pescador que enfrenta su última jornada en el mar antes de que su pueblo desaparezca bajo el agua.',
      creator: 'Carlos Rivera', username: 'carlosrivera', category: 'Cortometrajes', duration: '12:34',
      thumbnail: 'https://picsum.photos/seed/cine1/640/360', video_url: ''
    },
    {
      id: 'd2', title: 'Raíces de Barro', description: 'Documental sobre artesanos que mantienen viva la tradición de la cerámica en los pueblos del interior.',
      creator: 'María Santos', username: 'mariasantos', category: 'Documentales', duration: '24:10',
      thumbnail: 'https://picsum.photos/seed/cine2/640/360', video_url: ''
    },
    {
      id: 'd3', title: 'Acorde Invisible', description: 'Un guitarrista callejero encuentra su voz en las esquinas olvidadas de la ciudad.',
      creator: 'Andrés Molina', username: 'andresmolina', category: 'Música', duration: '8:45',
      thumbnail: 'https://picsum.photos/seed/cine3/640/360', video_url: ''
    },
    {
      id: 'd4', title: 'Colores del Silencio', description: 'Exploración visual de murales abandonados que cuentan la historia de un barrio en transformación.',
      creator: 'Lucía Vargas', username: 'luciavargas', category: 'Arte', duration: '15:22',
      thumbnail: 'https://picsum.photos/seed/cine4/640/360', video_url: ''
    },
    {
      id: 'd5', title: 'La Ruta del Café', description: 'Viaje por las montañas cafeteras siguiendo la cadena desde la semilla hasta la taza.',
      creator: 'Diego Herrera', username: 'diegoherrera', category: 'Documentales', duration: '31:05',
      thumbnail: 'https://picsum.photos/seed/cine5/640/360', video_url: ''
    },
    {
      id: 'd6', title: 'Tres Minutos', description: 'Cortometraje experimental: tres historias paralelas que se cruzan en exactamente tres minutos.',
      creator: 'Valentina Cruz', username: 'valentinacruz', category: 'Cortometrajes', duration: '3:00',
      thumbnail: 'https://picsum.photos/seed/cine6/640/360', video_url: ''
    },
    {
      id: 'd7', title: 'Tambores del Sur', description: 'Sesión en vivo de percusión afrolatina grabada en un patio colonial al atardecer.',
      creator: 'Roberto Méndez', username: 'robertomendez', category: 'Música', duration: '18:30',
      thumbnail: 'https://picsum.photos/seed/cine7/640/360', video_url: ''
    },
    {
      id: 'd8', title: 'Manos que Hablan', description: 'Retrato íntimo de una escultora sorda que transforma el metal en emociones.',
      creator: 'Ana Belén Ríos', username: 'anabelenrios', category: 'Arte', duration: '20:15',
      thumbnail: 'https://picsum.photos/seed/cine8/640/360', video_url: ''
    },
    {
      id: 'd9', title: 'El Vecino del 4B', description: 'Comedia breve sobre los malentendidos entre vecinos que comparten una pared demasiado delgada.',
      creator: 'Carlos Rivera', username: 'carlosrivera', category: 'Comedia', duration: '7:12',
      thumbnail: 'https://picsum.photos/seed/cine9/640/360', video_url: ''
    },
    {
      id: 'd10', title: 'Carta a Mi Padre', description: 'Drama epistolar: una hija lee en voz alta las cartas que nunca envió, mientras recorre los lugares de su infancia.',
      creator: 'Valentina Cruz', username: 'valentinacruz', category: 'Drama', duration: '14:48',
      thumbnail: 'https://picsum.photos/seed/cine10/640/360', video_url: ''
    }
  ];

  let allVideos = [];
  let activeCategory = 'Todo';

  /* ── Init ──────────────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded', async () => {
    renderCategoryPills();
    await loadVideos();
    renderAll();
    renderBottomNav('cine');
    initTheme();
    updateNavAuth();
  });

  /* ── Load from Supabase or fall back to demo ──────────── */
  async function loadVideos() {
    try {
      if (typeof sb !== 'undefined') {
        const { data, error } = await sb.from('cine_local').select(`
          id, title, description, video_url, thumbnail_url, category, duration, created_at,
          profiles:creator_id ( username, display_name, avatar_url )
        `).order('created_at', { ascending: false });

        if (!error && data && data.length > 0) {
          allVideos = data.map(v => ({
            id: v.id,
            title: v.title,
            description: v.description,
            video_url: v.video_url,
            thumbnail: v.thumbnail_url,
            category: v.category,
            duration: v.duration || '',
            creator: v.profiles?.display_name || v.profiles?.username || 'Creador',
            username: v.profiles?.username || ''
          }));
          return;
        }
      }
    } catch (e) {
      console.log('Supabase not available, using demo data');
    }
    allVideos = [...DEMO_DATA];
  }

  /* ── Category Pills ───────────────────────────────────── */
  function renderCategoryPills() {
    const container = document.getElementById('category-pills');
    container.innerHTML = CATEGORIES.map(cat => `
      <button onclick="filterCategory('${cat}')"
        class="px-4 py-1.5 rounded-full text-sm whitespace-nowrap transition ${cat === activeCategory ? 'pill-active' : 'pill-inactive'}"
        data-cat="${cat}">
        ${typeof esc === 'function' ? esc(cat) : cat}
      </button>
    `).join('');
  }

  function filterCategory(cat) {
    activeCategory = cat;
    renderCategoryPills();
    renderAll();
  }

  /* ── Render Everything ────────────────────────────────── */
  function renderAll() {
    const filtered = activeCategory === 'Todo'
      ? allVideos
      : allVideos.filter(v => v.category === activeCategory);

    renderHero(filtered[0] || allVideos[0]);
    renderContentRows(filtered);
  }

  /* ── Hero Section ─────────────────────────────────────── */
  function renderHero(video) {
    if (!video) return;
    const card = document.getElementById('hero-card');
    const safe = typeof esc === 'function' ? esc : s => s;
    card.setAttribute('data-id', video.id);
    card.innerHTML = `
      <img src="${safe(video.thumbnail)}" alt="${safe(video.title)}" class="w-full aspect-video object-cover">
      <div class="hero-gradient absolute inset-0"></div>
      <!-- Play button -->
      <div class="absolute inset-0 flex items-center justify-center">
        <div class="w-16 h-16 md:w-20 md:h-20 rounded-full bg-creo-mint/90 flex items-center justify-center play-btn group-hover:bg-creo-mint transition">
          <svg class="w-8 h-8 md:w-10 md:h-10 text-black ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
      <!-- Info overlay -->
      <div class="absolute bottom-0 left-0 right-0 p-5 md:p-8">
        <span class="text-xs font-semibold text-creo-mint uppercase tracking-wider">${safe(video.category)}</span>
        <h2 class="text-2xl md:text-4xl font-bold mt-1">${safe(video.title)}</h2>
        <p class="text-gray-300 text-sm mt-1">por ${safe(video.creator)}</p>
        <p class="text-gray-500 text-xs mt-2 max-w-xl line-clamp-2">${safe(video.description)}</p>
      </div>
      <!-- Duration badge -->
      <div class="absolute top-4 right-4 bg-black/70 text-white text-xs px-2 py-1 rounded">${safe(video.duration)}</div>
    `;
  }

  function playFeatured() {
    const card = document.getElementById('hero-card');
    const id = card.getAttribute('data-id');
    const video = allVideos.find(v => v.id === id);
    if (video) openPlayer(video);
  }

  /* ── Content Rows ─────────────────────────────────────── */
  function renderContentRows(videos) {
    const container = document.getElementById('content-rows');
    const safe = typeof esc === 'function' ? esc : s => s;

    if (activeCategory !== 'Todo') {
      // Single flat grid when a specific category is selected
      container.innerHTML = `
        <section class="px-4">
          <div class="max-w-6xl mx-auto">
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
              ${videos.map(v => videoCard(v, safe)).join('')}
            </div>
          </div>
        </section>
      `;
      return;
    }

    // Group by category
    const groups = {};
    videos.forEach(v => {
      if (!groups[v.category]) groups[v.category] = [];
      groups[v.category].push(v);
    });

    container.innerHTML = Object.entries(groups).map(([cat, items]) => `
      <section class="px-4">
        <div class="max-w-6xl mx-auto">
          <h3 class="text-lg font-bold mb-3 flex items-center gap-2">
            <span class="text-creo-mint">${safe(cat)}</span>
          </h3>
          <div class="flex gap-4 overflow-x-auto cine-scrollbar pb-3">
            ${items.map(v => `<div class="flex-shrink-0 w-56 sm:w-64 md:w-72">${videoCard(v, safe)}</div>`).join('')}
          </div>
        </div>
      </section>
    `).join('');
  }

  function videoCard(v, safe) {
    return `
      <div class="card-hover rounded-lg overflow-hidden bg-white/5 cursor-pointer group" onclick="openPlayer(allVideos.find(x=>x.id==='${v.id}'))">
        <div class="relative aspect-video">
          <img src="${safe(v.thumbnail)}" alt="${safe(v.title)}" class="w-full h-full object-cover" loading="lazy">
          <!-- Play overlay -->
          <div class="absolute inset-0 bg-black/0 group-hover:bg-black/40 transition flex items-center justify-center">
            <div class="w-10 h-10 rounded-full bg-creo-mint/0 group-hover:bg-creo-mint/90 flex items-center justify-center transition opacity-0 group-hover:opacity-100">
              <svg class="w-5 h-5 text-black ml-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
          </div>
          <!-- Duration -->
          <span class="absolute bottom-2 right-2 bg-black/80 text-white text-[10px] px-1.5 py-0.5 rounded">${safe(v.duration)}</span>
        </div>
        <div class="p-3">
          <h4 class="text-sm font-semibold truncate">${safe(v.title)}</h4>
          <p class="text-xs text-gray-400 mt-0.5">${safe(v.creator)}</p>
          <div class="flex items-center justify-between mt-2">
            <span class="text-[10px] text-gray-500 uppercase tracking-wider">${safe(v.category)}</span>
            <a href="profile.html?u=${encodeURIComponent(v.username)}" onclick="event.stopPropagation()"
              class="text-[10px] bg-creo-mint/10 text-creo-mint px-2 py-0.5 rounded-full hover:bg-creo-mint/20 transition font-semibold">
              Creo en Ti
            </a>
          </div>
        </div>
      </div>
    `;
  }

  /* ── Video Player Modal ───────────────────────────────── */
  function openPlayer(video) {
    if (!video) return;
    const safe = typeof esc === 'function' ? esc : s => s;
    const modal = document.getElementById('player-modal');
    const vid = document.getElementById('modal-video');
    const src = vid.querySelector('source');

    document.getElementById('modal-title').textContent = video.title;
    document.getElementById('modal-creator').textContent = 'por ' + video.creator;
    document.getElementById('modal-desc').textContent = video.description;
    document.getElementById('modal-tip-btn').href = 'profile.html?u=' + encodeURIComponent(video.username);

    if (video.video_url) {
      src.src = video.video_url;
      vid.load();
      vid.style.display = '';
    } else {
      // Demo mode: show thumbnail as poster, no actual video
      vid.poster = video.thumbnail;
      src.src = '';
      vid.load();
      vid.style.display = '';
    }

    modal.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }

  function closePlayer() {
    const modal = document.getElementById('player-modal');
    const vid = document.getElementById('modal-video');
    vid.pause();
    vid.removeAttribute('src');
    vid.querySelector('source').src = '';
    vid.load();
    modal.classList.add('hidden');
    document.body.style.overflow = '';
  }

  // Close modal on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closePlayer();
  });
  </script>
</body>
</html>
