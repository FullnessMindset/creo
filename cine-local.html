<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CREO — Cine Local</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/logo-icon.png" type="image/png">
  <meta name="theme-color" content="#0a0a0a">
  <meta property="og:title" content="CREO — Cine Local">
  <meta property="og:description" content="Cine independiente y contenido visual genuino. Historias reales de creadores locales. Gratis para ver, apoya con Creo en Ti.">
  <meta property="og:image" content="https://fullnessmindset.github.io/creo/assets/logo-icon.png">
  <meta property="og:url" content="https://fullnessmindset.github.io/creo/cine-local.html">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { creo: { purple: '#1a0a3e', light: '#2d1b69', mint: '#33f0b0', mintDark: '#28c48e' } } } }
    }
  </script>
  <style>
    body { overscroll-behavior: contain; background: #0a0a0a; }
    .cine-scrollbar::-webkit-scrollbar { height: 0; width: 0; }
    .cine-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
    .card-hover { transition: transform 0.25s ease; }
    .card-hover:hover { transform: scale(1.03); }
    .pill-active { background: #33f0b0; color: #0a0a0a; font-weight: 600; }
    .pill-inactive { background: rgba(255,255,255,0.08); color: #ccc; }
    .pill-inactive:hover { background: rgba(255,255,255,0.15); }
    .hero-gradient { background: linear-gradient(to top, #0a0a0a 0%, transparent 60%); }
    .modal-backdrop { background: rgba(0,0,0,0.95); }
    @keyframes fade-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fade-in 0.4s ease-out; }
    @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(51,240,176,0.4); } 50% { box-shadow: 0 0 20px 4px rgba(51,240,176,0.2); } }
    .play-btn { animation: pulse-glow 2s infinite; }
    .sidebar-link { transition: background 0.15s, color 0.15s; }
    .sidebar-link:hover { background: rgba(255,255,255,0.08); }
    .sidebar-link.active { background: rgba(51,240,176,0.12); color: #33f0b0; }
  </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">
  <script src="shared.js"></script>

  <!-- Header -->
  <header class="fixed top-0 left-0 right-0 z-50 bg-[#0a0a0a]/90 backdrop-blur-md border-b border-white/5">
    <div class="px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button onclick="toggleSidebar()" class="p-1.5 rounded-lg hover:bg-white/10 transition lg:hidden">
          <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <a href="index.html" class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center flex-shrink-0">
            <img src="assets/logo-icon.png" alt="CREO" class="w-6 h-6 rounded-full object-contain">
          </div>
        </a>
        <h1 class="text-lg font-bold tracking-[0.2em] text-creo-mint">CINE LOCAL</h1>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-white/10 transition">
          <svg class="w-5 h-5 text-gray-400 theme-icon-sun" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          <svg class="w-5 h-5 text-gray-300 theme-icon-moon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
        <button id="cine-upload-btn" class="hidden bg-creo-mint text-black font-bold text-sm px-4 py-1.5 rounded-full hover:bg-creo-mintDark transition flex items-center gap-1" onclick="openUploadModal()">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
          Publicar
        </button>
      </div>
    </div>
  </header>

  <!-- Sidebar Overlay (mobile) -->
  <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-40 hidden lg:hidden" onclick="toggleSidebar()"></div>

  <!-- Left Sidebar -->
  <aside id="sidebar" class="fixed top-14 left-0 bottom-0 w-56 bg-[#0f0f0f] border-r border-white/5 z-40 overflow-y-auto cine-scrollbar -translate-x-full lg:translate-x-0 transition-transform duration-200">
    <nav class="py-4 space-y-1 px-2">
      <button onclick="setView('home')" data-view="home" class="sidebar-link active w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Inicio
      </button>
      <button onclick="setView('trending')" data-view="trending" class="sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
        Favoritos del Pueblo
      </button>
      <button onclick="setView('recent')" data-view="recent" class="sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Recien Llegados
      </button>
      <button onclick="setView('myfilms')" data-view="myfilms" id="sidebar-myfilms" class="sidebar-link hidden w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"/></svg>
        Mis Peliculas
      </button>
    </nav>

    <!-- Categories -->
    <div class="px-4 pt-2 pb-3">
      <p class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold mb-2">Categorias</p>
      <div id="sidebar-categories" class="space-y-0.5">
        <!-- rendered by JS -->
      </div>
    </div>

    <!-- Top Creators -->
    <div class="px-4 pt-2 pb-20">
      <p class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold mb-3">Top Creadores</p>
      <div id="top-creators" class="space-y-2">
        <!-- rendered by JS -->
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="pt-16 pb-24 lg:ml-56">

    <!-- Search Bar -->
    <section class="px-4 py-4">
      <div class="max-w-5xl mx-auto">
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input id="cine-search" type="text" placeholder="Buscar peliculas, creadores..."
            class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-4 py-2.5 text-sm text-white placeholder-gray-500 focus:ring-2 focus:ring-creo-mint focus:border-transparent outline-none"
            oninput="searchVideos(this.value)">
        </div>
      </div>
    </section>

    <!-- Featured Hero -->
    <section id="hero-section" class="px-4 mb-8">
      <div class="max-w-5xl mx-auto">
        <div id="hero-card" class="relative rounded-xl overflow-hidden cursor-pointer group" onclick="playFeatured()">
        </div>
      </div>
    </section>

    <!-- Content Area -->
    <div id="content-rows" class="space-y-8">
    </div>

    <!-- My Films Section -->
    <section id="my-films-section" class="hidden px-4 mt-8">
      <div class="max-w-5xl mx-auto">
        <h3 class="text-lg font-bold mb-3 text-creo-mint">Mis Peliculas</h3>
        <div id="my-films-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
        </div>
      </div>
    </section>

  </main>

  <!-- Upload Modal -->
  <div id="upload-modal" class="fixed inset-0 z-[100] hidden modal-backdrop flex items-center justify-center p-4">
    <div class="bg-[#1a1a1a] rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto animate-fade-in border border-white/10">
      <div class="flex items-center justify-between p-5 border-b border-white/10">
        <h2 class="text-lg font-bold">Publicar en Cine Local</h2>
        <button onclick="closeUploadModal()" class="text-gray-400 hover:text-white transition">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="p-5 space-y-4">
        <div>
          <label class="block text-sm text-gray-400 mb-1">Titulo *</label>
          <input id="upload-title" type="text" placeholder="Nombre de tu pelicula" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-500 focus:ring-2 focus:ring-creo-mint focus:border-transparent outline-none">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Descripcion</label>
          <textarea id="upload-desc" rows="3" placeholder="Cuenta la historia detras de tu pelicula..." class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-500 focus:ring-2 focus:ring-creo-mint focus:border-transparent outline-none resize-none"></textarea>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Categoria *</label>
          <select id="upload-category" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2.5 text-sm text-white focus:ring-2 focus:ring-creo-mint outline-none appearance-none">
            <option value="" class="bg-[#1a1a1a]">Seleccionar categoria</option>
            <option value="Cortometrajes" class="bg-[#1a1a1a]">Cortometrajes</option>
            <option value="Documentales" class="bg-[#1a1a1a]">Documentales</option>
            <option value="Música" class="bg-[#1a1a1a]">Musica</option>
            <option value="Arte" class="bg-[#1a1a1a]">Arte</option>
            <option value="Comedia" class="bg-[#1a1a1a]">Comedia</option>
            <option value="Drama" class="bg-[#1a1a1a]">Drama</option>
          </select>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Duracion</label>
          <input id="upload-duration" type="text" placeholder="ej. 12:34" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-500 focus:ring-2 focus:ring-creo-mint outline-none">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Video *</label>
          <input id="upload-video" type="file" accept="video/*" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm text-gray-400 file:mr-3 file:py-1.5 file:px-3 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-creo-mint/10 file:text-creo-mint hover:file:bg-creo-mint/20">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Miniatura (opcional)</label>
          <input id="upload-thumb" type="file" accept="image/*" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm text-gray-400 file:mr-3 file:py-1.5 file:px-3 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-creo-mint/10 file:text-creo-mint hover:file:bg-creo-mint/20">
        </div>
        <button id="upload-submit-btn" onclick="submitCineUpload()" class="w-full bg-creo-mint text-black font-bold text-sm py-3 rounded-full hover:bg-creo-mintDark transition mt-2">Publicar</button>
      </div>
    </div>
  </div>

  <!-- Video Player Modal -->
  <div id="player-modal" class="fixed inset-0 z-[100] hidden modal-backdrop">
    <div class="relative w-full h-full flex flex-col">
      <button onclick="closePlayer()" class="absolute top-4 right-4 z-[110] text-white/60 hover:text-white transition">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>

      <div class="flex-1 flex items-center justify-center px-4 pt-14 pb-4">
        <video id="modal-video" class="max-w-full max-h-full rounded-lg" controls autoplay>
          <source src="" type="video/mp4">
        </video>
      </div>

      <!-- Info bar with actions -->
      <div class="px-4 pb-6 md:px-8 animate-fade-in">
        <div class="max-w-3xl mx-auto">
          <div class="flex items-start justify-between gap-4">
            <div class="flex-1 min-w-0">
              <h2 id="modal-title" class="text-xl md:text-2xl font-bold truncate"></h2>
              <p id="modal-creator" class="text-gray-400 text-sm mt-1"></p>
              <p id="modal-desc" class="text-gray-500 text-xs mt-2 line-clamp-2"></p>
            </div>
            <div class="flex items-center gap-2 flex-shrink-0">
              <button onclick="shareToComunnidad()" class="bg-white/10 hover:bg-white/20 text-white text-sm px-4 py-2 rounded-full transition flex items-center gap-1.5" title="Compartir en Comunidad">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
                Compartir
              </button>
              <a id="modal-tip-btn" href="#" class="flex-shrink-0 bg-creo-mint text-black font-bold text-sm px-5 py-2 rounded-full hover:bg-creo-mintDark transition flex items-center gap-2">
                <img src="assets/logo-icon.png" class="w-5 h-5 rounded-full" alt="CREO">
                Creo en Ti
              </a>
            </div>
          </div>
          <!-- Comment section -->
          <div class="mt-4 pt-4 border-t border-white/10">
            <div class="flex gap-2">
              <input id="modal-comment" type="text" placeholder="Deja un comentario..." class="flex-1 bg-white/5 border border-white/10 rounded-full px-4 py-2 text-sm text-white placeholder-gray-500 focus:ring-2 focus:ring-creo-mint outline-none">
              <button onclick="postComment()" class="bg-creo-mint/20 text-creo-mint px-4 py-2 rounded-full text-sm font-semibold hover:bg-creo-mint/30 transition">Enviar</button>
            </div>
            <div id="modal-comments" class="mt-3 space-y-2 max-h-32 overflow-y-auto cine-scrollbar"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

    { id: 'd15', title: 'Rio Abajo', description: 'Documental sobre pescadores artesanales que resisten la industrializacion del rio.', creator: 'Maria Santos', username: 'mariasantos', avatar: 'https://picsum.photos/seed/avatar2/100/100', category: 'Documentales', duration: '35:20', thumbnail: 'https://picsum.photos/seed/cine15/640/360', video_url: '', creos: 167, shares: 71, comments: 39 },
    { id: 'd16', title: 'Frecuencia', description: 'Un musico construye instrumentos con materiales reciclados y crea una sinfonia unica.', creator: 'Andres Molina', username: 'andresmolina', avatar: 'https://picsum.photos/seed/avatar3/100/100', category: 'Música', duration: '22:10', thumbnail: 'https://picsum.photos/seed/cine16/640/360', video_url: '', creos: 143, shares: 58, comments: 35 }
  ];

  let allVideos = [];
  let activeCategory = 'Todo';
  let currentView = 'home';
  let cineCurrentUser = null;
  let currentPlayingVideo = null;

  /* ── Init ──────────────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded', async () => {
    await loadVideos();
    renderSidebarCategories();
    renderTopCreators();
    renderAll();
    renderBottomNav('cine');
    initTheme();
    updateNavAuth();

    try {
      const { data: { user } } = await sb.auth.getUser();
      if (user) {
        cineCurrentUser = user;
        document.getElementById('cine-upload-btn').classList.remove('hidden');
        document.getElementById('sidebar-myfilms').classList.remove('hidden');
        loadMyFilms(user.id);
        if (new URLSearchParams(window.location.search).get('publish') === '1') {
          setTimeout(() => openUploadModal(), 500);
        }
      }
    } catch(e) {}
  });

  /* ── Sidebar ──────────────────────────────────────────── */
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    sidebar.classList.toggle('-translate-x-full');
    overlay.classList.toggle('hidden');
  }

  function renderSidebarCategories() {
    const container = document.getElementById('sidebar-categories');
    const safe = typeof esc === 'function' ? esc : s => s;
    container.innerHTML = CATEGORIES.filter(c => c !== 'Todo').map(cat => `
      <button onclick="filterCategory('${cat}')"
        class="sidebar-link w-full text-left px-3 py-2 rounded-lg text-xs text-gray-400 hover:text-white"
        data-cat="${cat}">
        ${safe(cat)}
      </button>
    `).join('');
  }

  function renderTopCreators() {
    const container = document.getElementById('top-creators');
    const safe = typeof esc === 'function' ? esc : s => s;
    const creatorMap = {};
    allVideos.forEach(v => {
      if (!creatorMap[v.username]) creatorMap[v.username] = { name: v.creator, username: v.username, avatar: v.avatar || '', creos: 0, films: 0 };
      creatorMap[v.username].creos += (v.creos || 0);
      creatorMap[v.username].films++;
    });
    const sorted = Object.values(creatorMap).sort((a, b) => b.creos - a.creos).slice(0, 5);
    container.innerHTML = sorted.map((c, i) => `
      <a href="profile.html?u=${encodeURIComponent(c.username)}" class="flex items-center gap-2 p-2 rounded-lg hover:bg-white/5 transition group">
        <div class="relative">
          <img src="${safe(c.avatar || 'https://picsum.photos/seed/' + c.username + '/100/100')}" class="w-8 h-8 rounded-full object-cover" alt="">
          ${i === 0 ? '<span class="absolute -top-1 -right-1 text-[8px] bg-creo-mint text-black w-4 h-4 rounded-full flex items-center justify-center font-bold">1</span>' : ''}
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-xs font-semibold truncate group-hover:text-creo-mint transition">${safe(c.name)}</p>
          <p class="text-[10px] text-gray-500">${c.creos} creos · ${c.films} films</p>
        </div>
      </a>
    `).join('');
  }

  /* ── Views ────────────────────────────────────────────── */
  function setView(view) {
    currentView = view;
    document.querySelectorAll('.sidebar-link[data-view]').forEach(b => {
      b.classList.toggle('active', b.dataset.view === view);
      b.classList.toggle('text-gray-400', b.dataset.view !== view);
    });
    activeCategory = 'Todo';
    if (view === 'myfilms') {
      document.getElementById('hero-section').classList.add('hidden');
      document.getElementById('content-rows').innerHTML = '';
      document.getElementById('my-films-section').classList.remove('hidden');
      if (cineCurrentUser) loadMyFilms(cineCurrentUser.id);
    } else {
      document.getElementById('hero-section').classList.remove('hidden');
      document.getElementById('my-films-section').classList.add('hidden');
      renderAll();
    }
    if (window.innerWidth < 1024) toggleSidebar();
  }

  /* ── Load from Supabase or demo ───────────────────────── */
  async function loadVideos() {
    try {
      if (typeof sb !== 'undefined') {
        const { data, error } = await sb.from('cine_local').select(`
          id, title, description, video_url, thumbnail_url, category, duration, created_at,
          profiles:creator_id ( username, display_name, avatar_url )
        `).order('created_at', { ascending: false });
        if (!error && data && data.length > 0) {
          allVideos = data.map(v => ({
            id: v.id, title: v.title, description: v.description, video_url: v.video_url,
            thumbnail: v.thumbnail_url, category: v.category, duration: v.duration || '',
            creator: v.profiles?.display_name || v.profiles?.username || 'Creador',
            username: v.profiles?.username || '',
            avatar: v.profiles?.avatar_url || '',
            creos: 0, shares: 0, comments: 0
          }));
          return;
        }
      }
    } catch (e) { console.log('Using demo data'); }
    allVideos = [...DEMO_DATA];
  }

  /* ── Category Filter ──────────────────────────────────── */
  function filterCategory(cat) {
    activeCategory = cat;
    currentView = 'home';
    document.querySelectorAll('.sidebar-link[data-view]').forEach(b => {
      b.classList.remove('active');
      b.classList.add('text-gray-400');
    });
    document.getElementById('hero-section').classList.remove('hidden');
    document.getElementById('my-films-section').classList.add('hidden');
    renderAll();
    if (window.innerWidth < 1024) toggleSidebar();
  }

  /* ── Render Everything ────────────────────────────────── */
  function renderAll() {
    let filtered = activeCategory === 'Todo' ? allVideos : allVideos.filter(v => v.category === activeCategory);

    if (currentView === 'trending') {
      filtered = [...allVideos].sort((a, b) => ((b.creos || 0) + (b.shares || 0) * 2) - ((a.creos || 0) + (a.shares || 0) * 2));
    } else if (currentView === 'recent') {
      filtered = [...allVideos].sort((a, b) => (b.created_at || '').localeCompare(a.created_at || '') || allVideos.indexOf(a) - allVideos.indexOf(b));
      filtered.reverse();
    }

    const heroVideo = currentView === 'trending' ? filtered[0] : (filtered[0] || allVideos[0]);
    renderHero(heroVideo);
    renderContentRows(filtered);
  }

  /* ── Hero Section ─────────────────────────────────────── */
  function renderHero(video) {
    if (!video) return;
    const card = document.getElementById('hero-card');
    const safe = typeof esc === 'function' ? esc : s => s;
    card.setAttribute('data-id', video.id);
    const interactionScore = (video.creos || 0) + (video.shares || 0) + (video.comments || 0);
    card.innerHTML = `
      <img src="${safe(video.thumbnail)}" alt="${safe(video.title)}" class="w-full aspect-video object-cover">
      <div class="hero-gradient absolute inset-0"></div>
      <div class="absolute inset-0 flex items-center justify-center">
        <div class="w-16 h-16 md:w-20 md:h-20 rounded-full bg-creo-mint/90 flex items-center justify-center play-btn group-hover:bg-creo-mint transition">
          <svg class="w-8 h-8 md:w-10 md:h-10 text-black ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
      <div class="absolute bottom-0 left-0 right-0 p-5 md:p-8">
        <div class="flex items-center gap-2 mb-2">
          <span class="text-xs font-semibold text-creo-mint uppercase tracking-wider">${safe(video.category)}</span>
          ${currentView === 'trending' ? '<span class="text-[10px] bg-creo-mint/20 text-creo-mint px-2 py-0.5 rounded-full font-semibold">Favorito del Pueblo</span>' : ''}
        </div>
        <h2 class="text-2xl md:text-4xl font-bold mt-1">${safe(video.title)}</h2>
        <p class="text-gray-300 text-sm mt-1">por ${safe(video.creator)}</p>
        <p class="text-gray-500 text-xs mt-2 max-w-xl line-clamp-2">${safe(video.description)}</p>
        <div class="flex items-center gap-4 mt-3">
          <span class="flex items-center gap-1 text-[11px] text-gray-400"><img src="assets/logo-icon.png" class="w-3.5 h-3.5 rounded-full opacity-70">${video.creos || 0}</span>
          <span class="flex items-center gap-1 text-[11px] text-gray-400"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>${video.shares || 0}</span>
          <span class="flex items-center gap-1 text-[11px] text-gray-400"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>${video.comments || 0}</span>
        </div>
      </div>
      <div class="absolute top-4 right-4 bg-black/70 text-white text-xs px-2 py-1 rounded">${safe(video.duration)}</div>
    `;
  }

  function playFeatured() {
    const id = document.getElementById('hero-card').getAttribute('data-id');
    const video = allVideos.find(v => v.id === id);
    if (video) openPlayer(video);
  }

  /* ── Content Rows ─────────────────────────────────────── */
  function renderContentRows(videos) {
    const container = document.getElementById('content-rows');
    const safe = typeof esc === 'function' ? esc : s => s;

    if (currentView === 'trending') {
      container.innerHTML = `
        <section class="px-4">
          <div class="max-w-5xl mx-auto">
            <h3 class="text-lg font-bold mb-1 text-creo-mint">Favoritos del Pueblo</h3>
            <p class="text-xs text-gray-500 mb-4">Clasificados por la comunidad — creos, comentarios y compartidos deciden</p>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
              ${videos.slice(1).map((v, i) => videoCard(v, safe, i + 2)).join('')}
            </div>
          </div>
        </section>`;
      return;
    }

    if (activeCategory !== 'Todo') {
      container.innerHTML = `
        <section class="px-4">
          <div class="max-w-5xl mx-auto">
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
              ${videos.map(v => videoCard(v, safe)).join('')}
            </div>
          </div>
        </section>`;
      return;
    }

    const groups = {};
    videos.forEach(v => {
      if (!groups[v.category]) groups[v.category] = [];
      groups[v.category].push(v);
    });

    container.innerHTML = Object.entries(groups).map(([cat, items]) => `
      <section class="px-4">
        <div class="max-w-5xl mx-auto">
          <h3 class="text-lg font-bold mb-3 text-creo-mint">${safe(cat)}</h3>
          <div class="flex gap-3 overflow-x-auto cine-scrollbar pb-3">
            ${items.map(v => `<div class="flex-shrink-0 w-48 sm:w-56 md:w-64">${videoCard(v, safe)}</div>`).join('')}
          </div>
        </div>
      </section>
    `).join('');
  }

  function videoCard(v, safe, rank) {
    const rankBadge = rank ? `<span class="absolute top-2 left-2 bg-creo-mint text-black text-[10px] font-bold w-6 h-6 rounded-full flex items-center justify-center z-10">${rank}</span>` : '';
    return `
      <div class="card-hover rounded-xl overflow-hidden bg-white/5 cursor-pointer group" onclick="openPlayer(allVideos.find(x=>x.id==='${v.id}'))">
        <div class="relative aspect-video overflow-hidden rounded-t-xl">
          <img src="${safe(v.thumbnail)}" alt="${safe(v.title)}" class="w-full h-full object-cover" loading="lazy">
          ${rankBadge}
          <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <div class="w-10 h-10 rounded-full bg-creo-mint/0 group-hover:bg-creo-mint/90 flex items-center justify-center transition opacity-0 group-hover:opacity-100">
              <svg class="w-5 h-5 text-black ml-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
          </div>
          <span class="absolute bottom-2 right-2 bg-black/80 text-white text-[10px] px-1.5 py-0.5 rounded z-10">${safe(v.duration)}</span>
        </div>
        <div class="p-2.5">
          <div class="flex items-start gap-2">
            <img src="${safe(v.avatar || 'https://picsum.photos/seed/' + v.username + '/100/100')}" class="w-7 h-7 rounded-full object-cover flex-shrink-0 mt-0.5" alt="">
            <div class="flex-1 min-w-0">
              <h4 class="text-xs font-semibold leading-tight line-clamp-2">${safe(v.title)}</h4>
              <p class="text-[10px] text-gray-400 mt-0.5">${safe(v.creator)}</p>
              <div class="flex items-center gap-2 mt-1">
                <span class="flex items-center gap-0.5 text-[9px] text-gray-500"><img src="assets/logo-icon.png" class="w-3 h-3 rounded-full opacity-60">${v.creos || 0}</span>
                <span class="flex items-center gap-0.5 text-[9px] text-gray-500"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>${v.shares || 0}</span>
              </div>
            </div>
          </div>
        </div>
      </div>`;
  }

  /* ── Search ────────────────────────────────────────────── */
  function searchVideos(query) {
    const q = query.toLowerCase().trim();
    if (!q) { renderAll(); document.getElementById('hero-section').classList.remove('hidden'); return; }
    const filtered = allVideos.filter(v =>
      v.title.toLowerCase().includes(q) || v.creator.toLowerCase().includes(q) ||
      v.description.toLowerCase().includes(q) || v.category.toLowerCase().includes(q)
    );
    renderContentRows(filtered);
    document.getElementById('hero-section').classList.add('hidden');
  }

  /* ── Video Player Modal ───────────────────────────────── */
  function openPlayer(video) {
    if (!video) return;
    currentPlayingVideo = video;
    const modal = document.getElementById('player-modal');
    const vid = document.getElementById('modal-video');
    const src = vid.querySelector('source');

    document.getElementById('modal-title').textContent = video.title;
    document.getElementById('modal-creator').textContent = 'por ' + video.creator;
    document.getElementById('modal-desc').textContent = video.description;
    document.getElementById('modal-tip-btn').href = 'profile.html?u=' + encodeURIComponent(video.username);
    document.getElementById('modal-comment').value = '';
    renderDemoComments(video);

    if (video.video_url) {
      src.src = video.video_url; vid.load(); vid.style.display = '';
    } else {
      vid.poster = video.thumbnail; src.src = ''; vid.load(); vid.style.display = '';
    }
    modal.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }

  function closePlayer() {
    const vid = document.getElementById('modal-video');
    vid.pause(); vid.removeAttribute('src'); vid.querySelector('source').src = ''; vid.load();
    document.getElementById('player-modal').classList.add('hidden');
    document.body.style.overflow = '';
    currentPlayingVideo = null;
  }

  function renderDemoComments(video) {
    const container = document.getElementById('modal-comments');
    const safe = typeof esc === 'function' ? esc : s => s;
    const demoComments = [
      { user: 'Sofia L.', text: 'Increible trabajo, me encanto la fotografia' },
      { user: 'Marco R.', text: 'Esto es lo que necesitamos, contenido real' },
      { user: 'Ana P.', text: 'Compartido con toda mi familia' }
    ];
    const show = demoComments.slice(0, Math.min(video.comments || 2, 3));
    container.innerHTML = show.map(c => `
      <div class="flex items-start gap-2 text-xs">
        <span class="font-semibold text-creo-mint flex-shrink-0">${safe(c.user)}</span>
        <span class="text-gray-400">${safe(c.text)}</span>
      </div>
    `).join('');
  }

  function postComment() {
    const input = document.getElementById('modal-comment');
    const text = input.value.trim();
    if (!text) return;
    if (!cineCurrentUser) { showToast('Inicia sesion para comentar', 'error'); return; }
    const container = document.getElementById('modal-comments');
    const safe = typeof esc === 'function' ? esc : s => s;
    container.insertAdjacentHTML('afterbegin', `
      <div class="flex items-start gap-2 text-xs animate-fade-in">
        <span class="font-semibold text-creo-mint flex-shrink-0">Tu</span>
        <span class="text-gray-400">${safe(text)}</span>
      </div>
    `);
    input.value = '';
    if (currentPlayingVideo) currentPlayingVideo.comments = (currentPlayingVideo.comments || 0) + 1;
    showToast('Comentario publicado', 'success');
  }

  function shareToComunnidad() {
    if (!currentPlayingVideo) return;
    if (!cineCurrentUser) { showToast('Inicia sesion para compartir', 'error'); return; }
    const v = currentPlayingVideo;
    v.shares = (v.shares || 0) + 1;
    showToast('Compartido en la Comunidad', 'success');
  }

  /* ── Upload Modal ─────────────────────────────────────── */
  function openUploadModal() {
    document.getElementById('upload-modal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }

  function closeUploadModal() {
    document.getElementById('upload-modal').classList.add('hidden');
    document.body.style.overflow = '';
  }

  async function submitCineUpload() {
    const title = document.getElementById('upload-title').value.trim();
    const desc = document.getElementById('upload-desc').value.trim();
    const cat = document.getElementById('upload-category').value;
    const dur = document.getElementById('upload-duration').value.trim();
    const videoFile = document.getElementById('upload-video').files[0];
    const thumbFile = document.getElementById('upload-thumb').files[0];

    if (!title) { showToast('Agrega un titulo', 'error'); return; }
    if (!videoFile) { showToast('Selecciona un video', 'error'); return; }
    if (!cat) { showToast('Selecciona una categoria', 'error'); return; }

    const btn = document.getElementById('upload-submit-btn');
    btn.disabled = true; btn.textContent = 'Subiendo...';

    try {
      const { data: { user } } = await sb.auth.getUser();
      if (!user) throw new Error('No autenticado');
      const video_url = await uploadToStorage(videoFile, 'cine-local', 500);
      if (!video_url) throw new Error('Error al subir video');
      let thumbnail_url = null;
      if (thumbFile) thumbnail_url = await uploadToStorage(thumbFile, 'cine-local', 10);
      const { error } = await sb.from('cine_local').insert({
        creator_id: user.id, title, description: desc || null, video_url, thumbnail_url, category: cat, duration: dur || null
      });
      if (error) throw error;
      showToast('Publicado en Cine Local', 'success');
      closeUploadModal();
      ['upload-title','upload-desc','upload-category','upload-duration','upload-video','upload-thumb'].forEach(id => document.getElementById(id).value = '');
      await loadVideos(); renderAll(); loadMyFilms(user.id);
    } catch (e) {
      showToast('Error: ' + (e.message || ''), 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Publicar';
    }
  }

  /* ── My Films ─────────────────────────────────────────── */
  async function loadMyFilms(userId) {
    try {
      const { data } = await sb.from('cine_local').select('*').eq('creator_id', userId).order('created_at', { ascending: false });
      if (data && data.length) {
        document.getElementById('sidebar-myfilms').classList.remove('hidden');
        if (currentView === 'myfilms') document.getElementById('my-films-section').classList.remove('hidden');
        const safe = typeof esc === 'function' ? esc : s => s;
        document.getElementById('my-films-grid').innerHTML = data.map(v => `
          <div class="rounded-xl overflow-hidden bg-white/5 group relative">
            <div class="relative aspect-video">
              <img src="${safe(v.thumbnail_url || 'https://picsum.photos/seed/' + v.id + '/640/360')}" class="w-full h-full object-cover" loading="lazy">
              <span class="absolute bottom-2 right-2 bg-black/80 text-white text-[10px] px-1.5 py-0.5 rounded">${safe(v.duration || '')}</span>
            </div>
            <div class="p-2.5 flex items-center justify-between">
              <div class="min-w-0 flex-1">
                <h4 class="text-xs font-semibold truncate">${safe(v.title)}</h4>
                <p class="text-[10px] text-gray-500">${safe(v.category || '')}</p>
              </div>
              <button onclick="deleteMyCineFilm('${v.id}')" class="text-red-400 hover:text-red-500 p-1 flex-shrink-0">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
              </button>
            </div>
          </div>
        `).join('');
      }
    } catch(e) {}
  }

  async function deleteMyCineFilm(id) {
    if (!confirm('Eliminar este video?')) return;
    try {
      const { data: { user } } = await sb.auth.getUser();
      const { error } = await sb.from('cine_local').delete().eq('id', id).eq('creator_id', user.id);
      if (error) throw error;
      showToast('Video eliminado', 'success');
      await loadVideos(); renderAll(); loadMyFilms(user.id);
    } catch(e) { showToast('Error: ' + (e.message || ''), 'error'); }
  }

  // Close modals on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closePlayer(); closeUploadModal(); }
  });
  </script>
</body>
</html>
