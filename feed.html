<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CREO — Creadores</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a0a3e">
  <meta name="description" content="CREO — Descubre y apoya a tus creadores favoritos con tips, metas y suscripciones">
  <meta property="og:title" content="CREO — Creadores">
  <meta property="og:description" content="Descubre y apoya a tus creadores favoritos con tips, metas y suscripciones">
  <meta property="og:image" content="https://fullnessmindset.github.io/creo/assets/logo-icon.png">
  <meta property="og:url" content="https://fullnessmindset.github.io/creo/feed.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <link rel="icon" href="assets/logo-icon.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/logo-icon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { creo: { purple: '#1a0a3e', light: '#2d1b69', mint: '#33f0b0', mintDark: '#28c48e' } } } }
    }
  </script>
  <style>
    body { overscroll-behavior-y: contain; }
    .feed-card { scroll-snap-align: start; }
    #feed-scroll { scroll-snap-type: y mandatory; }
    .creo-btn { animation: pulse-creo 2s ease-in-out infinite; }
    @keyframes pulse-creo { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  </style>
</head>
<body class="bg-creo-purple text-white min-h-screen transition-colors duration-300">
  <script src="shared.js"></script>

  <!-- Header -->
  <div class="fixed top-0 left-0 right-0 z-40 bg-creo-purple/90 backdrop-blur-sm">
    <div class="max-w-lg mx-auto flex items-center justify-between px-4 py-3">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center flex-shrink-0"><img src="assets/logo-icon.png" alt="CREO" class="w-6 h-6 rounded-full object-contain"></div>
        <h1 class="text-lg font-bold tracking-[0.15em]">CREADORES</h1>
      </div>
    </div>
  </div>

  <!-- Feed Container -->
  <div id="feed-scroll" class="max-w-lg mx-auto pt-14 pb-20 space-y-4 px-4">
    <div id="feed-content" class="space-y-4"></div>

    <!-- Loading -->
    <div id="feed-loading" class="text-center py-12">
      <div class="inline-block w-8 h-8 border-2 border-creo-mint border-t-transparent rounded-full animate-spin"></div>
      <p class="text-white/50 text-sm mt-3">Cargando creadores...</p>
    </div>

    <!-- Empty State -->
    <div id="feed-empty" class="text-center py-20 hidden">
      <div class="w-20 h-20 rounded-full bg-white/10 flex items-center justify-center mx-auto mb-4">
        <svg class="w-10 h-10 text-creo-mint" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
      </div>
      <h3 class="text-xl font-bold mb-2">No hay contenido aún</h3>
      <p class="text-white/50 text-sm">Sé el primero en publicar un video</p>
    </div>

    <!-- Load More -->
    <div id="load-more" class="text-center py-4 hidden">
      <button onclick="loadFeed()" class="px-6 py-2 bg-white/10 hover:bg-white/20 rounded-full text-sm font-semibold transition">Cargar más</button>
    </div>
  </div>

  <!-- Comments Drawer -->
  <div id="comments-drawer" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/60" onclick="closeComments()"></div>
    <div class="absolute bottom-0 left-0 right-0 max-w-lg mx-auto bg-creo-purple border-t border-white/10 rounded-t-2xl max-h-[70vh] flex flex-col animate-slide-up">
      <div class="flex items-center justify-between px-4 py-3 border-b border-white/10">
        <h3 class="font-bold text-sm" id="comments-title">Comentarios</h3>
        <button onclick="closeComments()" class="text-white/50 hover:text-white p-1"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
      </div>
      <div id="comments-list" class="flex-1 overflow-y-auto px-4 py-3 space-y-3"></div>
      <div id="comments-input-area" class="border-t border-white/10 px-4 py-3 hidden">
        <div id="reply-indicator" class="hidden flex items-center justify-between mb-2 px-1">
          <span class="text-xs text-creo-mint" id="reply-to-label">Respondiendo a...</span>
          <button onclick="cancelReply()" class="text-white/40 hover:text-white text-xs">Cancelar</button>
        </div>
        <div class="flex gap-2">
          <input id="comment-input" type="text" maxlength="500" placeholder="Escribe un comentario..." class="flex-1 bg-white/10 border border-white/10 rounded-full px-4 py-2 text-sm text-white placeholder-white/40 focus:outline-none focus:border-creo-mint">
          <button onclick="submitComment()" class="bg-creo-mint text-creo-purple font-bold px-4 py-2 rounded-full text-sm hover:bg-creo-mintDark transition">Enviar</button>
        </div>
      </div>
    </div>
  </div>

  <style>
    @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .animate-slide-up { animation: slide-up 0.3s ease-out; }
    .like-bounce { animation: like-pop 0.3s ease-out; }
    @keyframes like-pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
  </style>

  <script>
    let feedOffset = 0;
    const FEED_LIMIT = 10;
    let allLoaded = false;
    let currentUser = null;
    let userLikes = new Set();
    let userCommentLikes = new Set();
    let activeCommentsPostId = null;
    let replyingToCommentId = null;
    let replyingToName = null;

    async function initAuth() {
      const { data: { user } } = await sb.auth.getUser();
      currentUser = user;
      if (user) {
        const { data } = await sb.from('post_likes').select('post_id').eq('user_id', user.id);
        if (data) data.forEach(l => userLikes.add(l.post_id));
        const { data: cl } = await sb.from('comment_likes').select('comment_id').eq('user_id', user.id);
        if (cl) cl.forEach(l => userCommentLikes.add(l.comment_id));
      }
    }

    async function toggleLike(postId) {
      if (!currentUser) { showToast('Inicia sesión para dar like', 'error'); return; }
      const btn = document.getElementById('like-' + postId);
      const countEl = document.getElementById('like-count-' + postId);
      btn.classList.add('like-bounce');
      setTimeout(() => btn.classList.remove('like-bounce'), 300);

      const { data, error } = await sb.rpc('toggle_post_like', { p_post_id: postId });
      if (error) { showToast('Error', 'error'); return; }

      if (data.liked) {
        userLikes.add(postId);
        btn.querySelector('svg').setAttribute('fill', '#33f0b0');
        btn.querySelector('svg').setAttribute('stroke', '#33f0b0');
      } else {
        userLikes.delete(postId);
        btn.querySelector('svg').setAttribute('fill', 'none');
        btn.querySelector('svg').setAttribute('stroke', 'currentColor');
      }
      countEl.textContent = data.count > 0 ? data.count : '';
    }

    async function toggleCommentLike(commentId) {
      if (!currentUser) { showToast('Inicia sesión', 'error'); return; }
      const { data, error } = await sb.rpc('toggle_comment_like', { p_comment_id: commentId });
      if (error) { showToast('Error', 'error'); return; }
      if (data.liked) userCommentLikes.add(commentId);
      else userCommentLikes.delete(commentId);
      openComments(activeCommentsPostId);
    }

    function startReply(commentId, displayName) {
      replyingToCommentId = commentId;
      replyingToName = displayName;
      document.getElementById('reply-indicator').classList.remove('hidden');
      document.getElementById('reply-to-label').textContent = 'Respondiendo a ' + displayName;
      document.getElementById('comment-input').placeholder = 'Responder a ' + displayName + '...';
      document.getElementById('comment-input').focus();
    }

    function cancelReply() {
      replyingToCommentId = null;
      replyingToName = null;
      document.getElementById('reply-indicator').classList.add('hidden');
      document.getElementById('comment-input').placeholder = 'Escribe un comentario...';
    }

    async function openComments(postId) {
      activeCommentsPostId = postId;
      const drawer = document.getElementById('comments-drawer');
      drawer.classList.remove('hidden');
      document.getElementById('comments-input-area').classList.toggle('hidden', !currentUser);
      cancelReply();
      document.getElementById('comments-list').innerHTML = '<div class="text-center py-6"><div class="inline-block w-5 h-5 border-2 border-creo-mint border-t-transparent rounded-full animate-spin"></div></div>';

      const { data } = await sb
        .from('post_comments')
        .select('*, profiles:user_id(username, display_name, avatar_url)')
        .eq('post_id', postId)
        .order('created_at', { ascending: true });

      const list = document.getElementById('comments-list');
      const topLevel = (data || []).filter(c => !c.parent_id);
      const replies = (data || []).filter(c => c.parent_id);
      const replyMap = {};
      replies.forEach(r => { (replyMap[r.parent_id] = replyMap[r.parent_id] || []).push(r); });

      document.getElementById('comments-title').textContent = `Comentarios (${data ? data.length : 0})`;

      if (!data || data.length === 0) {
        list.innerHTML = '<p class="text-center text-white/40 text-sm py-8">Sin comentarios aún. ¡Sé el primero!</p>';
        return;
      }

      list.innerHTML = topLevel.map(c => renderComment(c, replyMap, postId)).join('');
      list.scrollTop = list.scrollHeight;
    }

    function renderComment(c, replyMap, postId) {
      const p = c.profiles || {};
      const name = p.display_name || p.username || 'Usuario';
      const avatar = p.avatar_url
        ? `<img src="${esc(p.avatar_url)}" class="w-8 h-8 rounded-full object-cover flex-shrink-0">`
        : `<div class="w-8 h-8 rounded-full bg-creo-mint/20 flex items-center justify-center flex-shrink-0"><span class="text-creo-mint text-xs font-bold">${esc(name[0].toUpperCase())}</span></div>`;
      const canDelete = currentUser && currentUser.id === c.user_id;
      const isLiked = userCommentLikes.has(c.id);
      const childReplies = replyMap[c.id] || [];

      return `<div class="space-y-2">
        <div class="flex gap-2 group">
          ${avatar}
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <span class="font-semibold text-xs text-creo-mint">${esc(name)}</span>
              <span class="text-white/30 text-xs">${timeAgo(c.created_at)}</span>
              ${canDelete ? `<button onclick="deleteComment('${c.id}','${postId}')" class="ml-auto text-white/20 hover:text-red-400 text-xs opacity-0 group-hover:opacity-100 transition">✕</button>` : ''}
            </div>
            <p class="text-sm text-white/80 leading-relaxed">${esc(c.body)}</p>
            <div class="flex items-center gap-4 mt-1">
              <button onclick="toggleCommentLike('${c.id}')" class="flex items-center gap-1 text-xs ${isLiked ? 'text-red-400' : 'text-white/30 hover:text-red-400'} transition">
                <svg class="w-3.5 h-3.5" fill="${isLiked ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                ${c.like_count > 0 ? c.like_count : ''}
              </button>
              ${currentUser ? `<button onclick="startReply('${c.id}','${esc(name)}')" class="text-xs text-white/30 hover:text-creo-mint transition">Responder</button>` : ''}
            </div>
          </div>
        </div>
        ${childReplies.length > 0 ? `<div class="ml-10 space-y-2 border-l border-white/10 pl-3">${childReplies.map(r => renderReply(r, postId)).join('')}</div>` : ''}
      </div>`;
    }

    function renderReply(c, postId) {
      const p = c.profiles || {};
      const name = p.display_name || p.username || 'Usuario';
      const avatar = p.avatar_url
        ? `<img src="${esc(p.avatar_url)}" class="w-6 h-6 rounded-full object-cover flex-shrink-0">`
        : `<div class="w-6 h-6 rounded-full bg-creo-mint/20 flex items-center justify-center flex-shrink-0"><span class="text-creo-mint text-[10px] font-bold">${esc(name[0].toUpperCase())}</span></div>`;
      const canDelete = currentUser && currentUser.id === c.user_id;
      const isLiked = userCommentLikes.has(c.id);

      return `<div class="flex gap-2 group">
        ${avatar}
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <span class="font-semibold text-[11px] text-creo-mint">${esc(name)}</span>
            <span class="text-white/30 text-[10px]">${timeAgo(c.created_at)}</span>
            ${canDelete ? `<button onclick="deleteComment('${c.id}','${postId}')" class="ml-auto text-white/20 hover:text-red-400 text-[10px] opacity-0 group-hover:opacity-100 transition">✕</button>` : ''}
          </div>
          <p class="text-xs text-white/70 leading-relaxed">${esc(c.body)}</p>
          <button onclick="toggleCommentLike('${c.id}')" class="flex items-center gap-1 mt-1 text-[10px] ${isLiked ? 'text-red-400' : 'text-white/30 hover:text-red-400'} transition">
            <svg class="w-3 h-3" fill="${isLiked ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
            ${c.like_count > 0 ? c.like_count : ''}
          </button>
        </div>
      </div>`;
    }

    function closeComments() {
      document.getElementById('comments-drawer').classList.add('hidden');
      activeCommentsPostId = null;
      cancelReply();
    }

    async function submitComment() {
      const input = document.getElementById('comment-input');
      const body = input.value.trim();
      if (!body) return;
      input.value = '';

      let result;
      if (replyingToCommentId) {
        result = await sb.rpc('add_comment_reply', { p_comment_id: replyingToCommentId, p_body: body });
      } else {
        result = await sb.rpc('add_post_comment', { p_post_id: activeCommentsPostId, p_body: body });
      }

      if (result.error) { showToast(result.error.message || 'Error al comentar', 'error'); return; }

      const countEl = document.getElementById('comment-count-' + activeCommentsPostId);
      if (countEl && result.data) countEl.textContent = result.data.count > 0 ? result.data.count : '';

      cancelReply();
      openComments(activeCommentsPostId);
    }

    async function deleteComment(commentId, postId) {
      await sb.from('post_comments').delete().eq('id', commentId);
      const { count } = await sb.from('post_comments').select('id', { count: 'exact', head: true }).eq('post_id', postId);
      await sb.from('posts').update({ comment_count: count || 0 }).eq('id', postId);
      const countEl = document.getElementById('comment-count-' + postId);
      if (countEl) countEl.textContent = count > 0 ? count : '';
      openComments(postId);
    }

    document.getElementById('comment-input')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') submitComment();
    });

    // Autoplay: play/pause videos as they scroll into view
    const videoObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const video = entry.target;
        if (entry.isIntersecting) {
          video.play().catch(() => {});
        } else {
          video.pause();
        }
      });
    }, { threshold: 0.6 });

    async function loadFeed() {
      if (allLoaded) return;

      const { data, error } = await sb
        .from('posts')
        .select('*, profiles(username, display_name, avatar_url, stripe_connect_id)')
        .order('created_at', { ascending: false })
        .range(feedOffset, feedOffset + FEED_LIMIT - 1);

      document.getElementById('feed-loading').classList.add('hidden');

      if (error) { showToast('Error cargando feed', 'error'); return; }

      if (!data || data.length === 0) {
        if (feedOffset === 0) document.getElementById('feed-empty').classList.remove('hidden');
        allLoaded = true;
        document.getElementById('load-more').classList.add('hidden');
        return;
      }

      const container = document.getElementById('feed-content');

      data.forEach(post => {
        const profile = post.profiles;
        const card = document.createElement('div');
        card.className = 'feed-card bg-white/5 rounded-2xl overflow-hidden border border-white/10';

        const avatarHTML = profile.avatar_url
          ? `<img src="${esc(profile.avatar_url)}" class="w-10 h-10 rounded-full object-cover border-2 border-creo-mint" alt="">`
          : `<div class="w-10 h-10 rounded-full bg-creo-mint/20 flex items-center justify-center border-2 border-creo-mint"><span class="text-creo-mint font-bold text-sm">${esc((profile.display_name || profile.username || '?')[0].toUpperCase())}</span></div>`;

        const isLiked = userLikes.has(post.id);
        const isDirectVideo = post.video_type === 'direct' && post.video_url && !post.video_url.includes('youtube');
        const videoHTML = isDirectVideo
          ? `<video src="${esc(post.video_url)}" class="w-full aspect-[9/16] max-h-[70vh] object-cover feed-video" loop muted playsinline preload="metadata"></video>`
          : getAutoplayEmbedHTML(post.video_url, post.video_type);

        card.innerHTML = `
          <div class="relative">
            <div class="w-full">${videoHTML}</div>
            ${isDirectVideo ? `<div class="absolute bottom-24 left-3 z-10"><button class="mute-toggle w-8 h-8 rounded-full bg-black/40 flex items-center justify-center text-white/70 hover:text-white transition" onclick="toggleMute(this)"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"/></svg></button></div>` : ''}

            <div class="absolute right-3 bottom-20 flex flex-col items-center gap-4">
              <a href="profile.html?u=${esc(profile.username)}" class="block">${avatarHTML}</a>

              <button id="like-${post.id}" onclick="toggleLike('${post.id}')" class="flex flex-col items-center gap-1 text-white/70 hover:text-white transition">
                <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center">
                  <svg class="w-5 h-5" fill="${isLiked ? '#33f0b0' : 'none'}" stroke="${isLiked ? '#33f0b0' : 'currentColor'}" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                </div>
                <span id="like-count-${post.id}" class="text-xs font-semibold">${post.like_count > 0 ? post.like_count : ''}</span>
              </button>

              <button onclick="openComments('${post.id}')" class="flex flex-col items-center gap-1 text-white/70 hover:text-white transition">
                <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                </div>
                <span id="comment-count-${post.id}" class="text-xs font-semibold">${post.comment_count > 0 ? post.comment_count : ''}</span>
              </button>

              <a href="profile.html?u=${esc(profile.username)}" class="creo-btn flex flex-col items-center gap-1">
                <div class="w-12 h-12 rounded-full bg-creo-mint flex items-center justify-center shadow-lg shadow-creo-mint/30">
                  <span class="text-creo-purple font-black text-xs">CREO</span>
                </div>
              </a>

              <button onclick="shareCreator('${esc(profile.username)}')" class="flex flex-col items-center gap-1 text-white/70 hover:text-white transition">
                <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
                </div>
              </button>
            </div>
          </div>

          <div class="p-4 space-y-2">
            <div class="flex items-center gap-2">
              <a href="profile.html?u=${esc(profile.username)}" class="font-bold text-sm hover:text-creo-mint transition">${esc(profile.display_name || profile.username)}</a>
              <span class="text-white/40 text-xs">@${esc(profile.username)}</span>
            </div>
            ${post.caption ? `<p class="text-sm text-white/70 leading-relaxed">${esc(post.caption)}</p>` : ''}
            <p class="text-xs text-white/30">${timeAgo(post.created_at)}</p>
          </div>
        `;

        container.appendChild(card);

        // Observe direct videos for autoplay
        const video = card.querySelector('video.feed-video');
        if (video) videoObserver.observe(video);
      });

      feedOffset += data.length;
      if (data.length < FEED_LIMIT) {
        allLoaded = true;
        document.getElementById('load-more').classList.add('hidden');
      } else {
        document.getElementById('load-more').classList.remove('hidden');
      }
    }

    function getAutoplayEmbedHTML(url, type) {
      const cls = 'aspect-[9/16] max-h-[70vh]';
      if (type === 'youtube') {
        const id = extractVideoId(url, 'youtube');
        if (!id) return `<div class="w-full ${cls} bg-gray-800 flex items-center justify-center text-gray-400">Invalid YouTube URL</div>`;
        return `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1&loop=1&playlist=${id}&rel=0&playsinline=1" class="w-full ${cls} rounded-xl" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe>`;
      }
      if (type === 'tiktok') {
        const id = extractVideoId(url, 'tiktok');
        if (!id) return `<div class="w-full ${cls} bg-gray-800 flex items-center justify-center text-gray-400">Invalid TikTok URL</div>`;
        return `<iframe src="https://www.tiktok.com/embed/v2/${id}" class="w-full ${cls} rounded-xl" frameborder="0" allowfullscreen loading="lazy"></iframe>`;
      }
      if (type === 'instagram') {
        return `<iframe src="${url.replace(/\/$/, '')}/embed" class="w-full ${cls} rounded-xl" frameborder="0" allowfullscreen loading="lazy"></iframe>`;
      }
      return `<video src="${esc(url)}" class="w-full ${cls} rounded-xl object-cover feed-video" loop muted playsinline preload="metadata"></video>`;
    }

    function toggleMute(btn) {
      const card = btn.closest('.feed-card');
      const video = card.querySelector('video');
      if (!video) return;
      video.muted = !video.muted;
      btn.innerHTML = video.muted
        ? '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"/></svg>'
        : '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/></svg>';
    }

    function shareCreator(username) {
      const url = 'https://fullnessmindset.github.io/creo/profile.html?u=' + username;
      if (navigator.share) {
        navigator.share({ title: 'CREO — Apoya a este creador', url });
      } else {
        navigator.clipboard.writeText(url);
        showToast('Enlace copiado', 'success');
      }
    }

    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'ahora';
      if (mins < 60) return mins + 'm';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + 'h';
      const days = Math.floor(hrs / 24);
      if (days < 30) return days + 'd';
      return Math.floor(days / 30) + 'mes';
    }

    window.addEventListener('scroll', () => {
      if (allLoaded) return;
      if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) loadFeed();
    });

    window.onload = async () => {
      await initAuth();
      loadFeed();
      renderBottomNav('feed');
      updateNavAuth();
      loadNotificationBell();
    };
  </script>
</body>
</html>
