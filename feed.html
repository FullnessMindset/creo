<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CREO — Creadores</title>
  <link rel="manifest" href="manifest.json">
  <link rel="canonical" href="https://fullnessmindset.github.io/creo/feed.html">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="CREO — Descubre y apoya a tus creadores favoritos">
  <meta property="og:title" content="CREO — Creadores">
  <meta property="og:description" content="Descubre y apoya a tus creadores favoritos">
  <meta property="og:image" content="https://fullnessmindset.github.io/creo/assets/logo-icon.png">
  <meta property="og:url" content="https://fullnessmindset.github.io/creo/feed.html">
  <meta property="og:type" content="website">
  <link rel="icon" href="assets/logo-icon.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/logo-icon.png">
  <link rel="stylesheet" href="tailwind.min.css?v=20260719">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { overscroll-behavior: contain; background: #000; }
    input, select, textarea { font-size: max(16px, 1em) !important; }
    .glass { background: rgba(255,255,255,0.88); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.4); }

    /* Creator card snap scroll */
    .creator-feed { scroll-snap-type: y mandatory; overflow-y: auto; height: calc(100vh - 64px); }
    @media (min-width: 1024px) { .creator-feed { margin-left: 220px; } }
    .creator-card { scroll-snap-align: start; min-height: calc(100vh - 64px); position: relative; border-bottom: 3px solid rgba(51,240,176,0.15); }

    /* Horizontal video row */
    .video-row { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 0; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .video-row::-webkit-scrollbar { display: none; }
    .video-slide { flex-shrink: 0; width: 100%; scroll-snap-align: start; position: relative; aspect-ratio: 9/16; max-height: 55vh; background: #000; overflow: hidden; }
    @media (min-width: 768px) { .video-slide { max-height: 60vh; } }
    .video-slide video, .video-slide iframe { width: 100%; height: 100%; object-fit: cover; }
    .video-slide img.video-thumb { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
    .video-slide .play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.15); cursor: pointer; z-index: 2; }

    /* Video indicators */
    .video-dots { display: flex; gap: 4px; justify-content: center; padding: 6px; }
    .video-dots .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: all 0.2s; }
    .video-dots .dot.active { background: #33f0b0; width: 18px; border-radius: 3px; }

    /* Creator info overlay */
    .creator-overlay { position: absolute; bottom: 0; left: 0; right: 0; z-index: 5; background: linear-gradient(transparent, rgba(0,0,0,0.8)); padding: 40px 16px 12px; }

    /* Video action buttons */
    .vid-actions { position: absolute; right: 12px; bottom: 60px; z-index: 6; display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .vid-act-btn { width: 44px; height: 44px; border-radius: 50%; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.15s; color: #fff; border: none; }
    .vid-act-btn:active { transform: scale(0.9); }
    .vid-act-count { font-size: 10px; color: #fff; text-align: center; margin-top: -2px; text-shadow: 0 1px 3px rgba(0,0,0,0.7); font-weight: 700; }

    /* Recommended creators */
    .rec-section { background: linear-gradient(135deg, rgba(26,10,62,0.95), rgba(45,27,105,0.95)); }
    .rec-card { width: 130px; flex-shrink: 0; cursor: pointer; transition: transform 0.2s; }
    .rec-card:hover { transform: translateY(-4px); }

    /* Mi Meta section */
    .meta-progress-bar { height: 8px; border-radius: 4px; background: rgba(255,255,255,0.1); overflow: hidden; }
    .meta-progress-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #33f0b0, #28c48e); transition: width 0.6s ease; }

    /* CFH content link */
    .cfh-link { background: linear-gradient(135deg, #1a0a3e, #2d1b69); transition: all 0.2s; }
    .cfh-link:hover { transform: scale(1.02); box-shadow: 0 4px 20px rgba(108,58,237,0.3); }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { scrollbar-width: none; }

    /* Floating popup for recommended */
    .rec-popup { position: fixed; z-index: 200; pointer-events: none; display: none; }
    .rec-popup.show { display: block; }
    .rec-popup-inner { pointer-events: auto; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .rec-popup-inner { animation: slideUp 0.2s ease-out; }

    /* Skeleton */
    .skel-pulse { background: linear-gradient(90deg, #1a1a2e 25%, #2a2a4e 50%, #1a1a2e 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body class="bg-black text-white min-h-screen">
  <script src="shared.js?v=2"></script>

  <!-- Creator Feed (vertical snap scroll) -->
  <div id="creator-feed" class="creator-feed pb-20">
    <!-- Skeleton loading -->
    <div id="feed-skeleton" class="space-y-4 p-4">
      <div class="skel-pulse rounded-2xl h-[55vh]"></div>
      <div class="skel-pulse rounded-xl h-8 w-48"></div>
      <div class="skel-pulse rounded-xl h-24"></div>
    </div>
  </div>

  <!-- Recommended Creator Popup -->
  <div id="rec-popup" class="rec-popup">
    <div class="rec-popup-inner bg-white rounded-2xl shadow-2xl border border-gray-200 overflow-hidden w-72">
      <div id="rec-popup-cover" class="h-16 bg-gradient-to-r from-creo-purple to-creo-light"></div>
      <div class="px-4 pb-4 -mt-5 text-center">
        <div id="rec-popup-avatar" class="w-11 h-11 rounded-full bg-creo-purple/10 border-2 border-white shadow mx-auto overflow-hidden"></div>
        <p id="rec-popup-name" class="text-sm font-bold text-gray-900 mt-1.5"></p>
        <p id="rec-popup-username" class="text-[10px] text-gray-400"></p>
        <p id="rec-popup-bio" class="text-[11px] text-gray-600 mt-1 line-clamp-3"></p>
        <a id="rec-popup-link" href="#" class="mt-2 inline-block bg-creo-purple text-white text-xs font-bold px-5 py-2 rounded-full hover:bg-creo-light transition">Visitar Perfil</a>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_FN_URL = SUPABASE_URL + '/functions/v1';

    let currentUser = null;
    let userLikes = new Set();
    let creatorGroups = [];

    // ===== INIT =====
    window.onload = async () => {
      renderBottomNav('feed');
      loadNotificationBell();
      translatePage();

      const { data: { user } } = await sb.auth.getUser();
      currentUser = user;
      if (user) {
        const { data: likes } = await sb.from('post_likes').select('post_id').eq('user_id', user.id);
        if (likes) likes.forEach(l => userLikes.add(l.post_id));
      }
      await loadCreadorFeed();
    };

    // ===== LOAD FEED =====
    async function loadCreadorFeed() {
      // Get posts grouped by creator
      const { data: posts } = await sb.from('posts')
        .select('*, profiles:creator_id(id, username, display_name, avatar_url, bio, stripe_connect_id, stripe_onboarded, identity_verified, verification_status, account_type, social_links, mecenas_settings, meta_fixed_price_cents, cover_url)')
        .order('created_at', { ascending: false })
        .limit(200);

      if (!posts || posts.length === 0) {
        document.getElementById('feed-skeleton').innerHTML = '<div class="text-center py-20"><p class="text-3xl mb-3">🌱</p><p class="text-gray-400">Aún no hay creadores publicando</p><p class="text-gray-600 text-sm mt-1">Sé el primero en publicar desde tu Panel</p></div>';
        return;
      }

      // Group by creator
      const groupMap = new Map();
      posts.forEach(p => {
        const prof = p.profiles;
        if (!prof) return;
        if (!groupMap.has(prof.id)) groupMap.set(prof.id, { creator: prof, posts: [] });
        groupMap.get(prof.id).posts.push(p);
      });
      creatorGroups = Array.from(groupMap.values());

      // Sort by virality: small creators get 18% boost
      creatorGroups.sort((a, b) => {
        const aScore = a.posts.reduce((s, p) => s + (p.like_count || 0) + (p.comment_count || 0) * 2, 0);
        const bScore = b.posts.reduce((s, p) => s + (p.like_count || 0) + (p.comment_count || 0) * 2, 0);
        const aBoost = a.posts.length < 5 ? 1.18 : 1;
        const bBoost = b.posts.length < 5 ? 1.18 : 1;
        return (bScore * bBoost) - (aScore * aBoost);
      });

      // Load metas for all creators
      const creatorIds = creatorGroups.map(g => g.creator.id);
      const { data: metas } = await sb.from('metas').select('*').in('creator_id', creatorIds).eq('is_active', true);
      const metasMap = {};
      (metas || []).forEach(m => {
        if (!metasMap[m.creator_id]) metasMap[m.creator_id] = [];
        metasMap[m.creator_id].push(m);
      });

      // Load free CFH content for each creator (parallel)
      const cfhMap = {};
      try {
        const cfhPromises = creatorGroups.slice(0, 20).map(async (g) => {
          const res = await fetch(SUPABASE_FN_URL + '/cfh-content', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'creator-free-content', creator_id: g.creator.id, limit: 5 })
          });
          const { data } = await res.json();
          if (data?.length) cfhMap[g.creator.id] = data;
        });
        await Promise.allSettled(cfhPromises);
      } catch (e) {}

      // Get recommended small creators (for section between video and meta)
      const smallCreators = creatorGroups.filter(g => g.posts.length <= 3).slice(0, 10);

      renderFeed(creatorGroups, metasMap, cfhMap, smallCreators);
    }

    // ===== RENDER FEED =====
    function renderFeed(groups, metasMap, cfhMap, smallCreators) {
      const feed = document.getElementById('creator-feed');
      feed.innerHTML = '';

      groups.forEach((group, groupIdx) => {
        const creator = group.creator;
        const posts = group.posts;
        const creatorMetas = metasMap[creator.id] || [];
        const cfhContent = cfhMap[creator.id] || [];

        // Pick 3 random recommended small creators (not this one)
        const recs = smallCreators.filter(s => s.creator.id !== creator.id)
          .sort(() => Math.random() - 0.5).slice(0, 3);

        const card = document.createElement('div');
        card.className = 'creator-card';
        card.innerHTML = `
          ${renderVideoRow(posts, cfhContent, creator, groupIdx)}
          ${renderRecommended(recs, groupIdx)}
          ${renderMiMeta(creator, creatorMetas)}
          ${renderCfhLink(creator, cfhContent)}
        `;
        feed.appendChild(card);
      });
    }

    // ===== VIDEO ROW (horizontal scroll) =====
    function renderVideoRow(posts, cfhContent, creator, groupIdx) {
      // Mi Historia first, then regular posts, then CFH free content
      const historiaPost = posts.find(p => (p.caption || '').toLowerCase().includes('mi historia'));
      const otherPosts = posts.filter(p => p !== historiaPost);
      const orderedPosts = historiaPost ? [historiaPost, ...otherPosts] : posts;

      // Build slides: regular posts + CFH free videos
      const slides = [];

      orderedPosts.forEach((post, i) => {
        const isFirst = i === 0 && historiaPost;
        slides.push(renderVideoSlide(post, creator, groupIdx, i, isFirst ? 'Mi Historia' : null));
      });

      cfhContent.forEach((item, i) => {
        if (item.content_type === 'video' || item.video_url) {
          slides.push(renderCfhVideoSlide(item, creator, groupIdx, posts.length + i));
        }
      });

      const dots = slides.map((_, i) => `<span class="dot${i === 0 ? ' active' : ''}"></span>`).join('');

      return `
        <div class="relative">
          <div class="video-row" id="video-row-${groupIdx}" onscroll="updateVideoDots(${groupIdx}, ${slides.length})">
            ${slides.join('')}
          </div>
          ${slides.length > 1 ? `<div class="video-dots" id="video-dots-${groupIdx}">${dots}</div>` : ''}
          <!-- Creator overlay -->
          <div class="creator-overlay">
            <div class="flex items-center gap-3">
              <a href="profile.html?u=${esc(creator.username)}" class="flex-shrink-0">
                ${creator.avatar_url
                  ? `<img src="${esc(creator.avatar_url)}" class="w-11 h-11 rounded-full object-cover border-2 border-creo-mint">`
                  : `<div class="w-11 h-11 rounded-full bg-creo-mint/20 border-2 border-creo-mint flex items-center justify-center text-sm font-bold text-creo-mint">${esc((creator.display_name || creator.username || '?')[0].toUpperCase())}</div>`
                }
              </a>
              <div class="flex-1 min-w-0">
                <a href="profile.html?u=${esc(creator.username)}" class="font-bold text-white text-sm hover:text-creo-mint transition block truncate">${esc(creator.display_name || creator.username)}</a>
                <p class="text-white/60 text-[11px] truncate">@${esc(creator.username)}</p>
              </div>
              <a href="profile.html?u=${esc(creator.username)}" class="bg-creo-mint/20 border border-creo-mint text-creo-mint text-xs font-bold px-4 py-2 rounded-full hover:bg-creo-mint hover:text-creo-purple transition flex-shrink-0">
                <img src="assets/logo-icon.png" class="w-4 h-4 inline-block mr-1 rounded-full" alt="">CREO
              </a>
            </div>
          </div>
        </div>`;
    }

    function renderVideoSlide(post, creator, groupIdx, slideIdx, label) {
      const isYT = post.video_type === 'youtube';
      const ytId = isYT ? extractYTId(post.video_url) : '';
      const liked = userLikes.has(post.id);

      let media;
      if (isYT && ytId) {
        media = `<img class="video-thumb" src="https://img.youtube.com/vi/${ytId}/maxresdefault.jpg" alt="${esc(post.caption || '')}" onclick="playYTInSlide(this,'${ytId}')">
          <div class="play-overlay" onclick="playYTInSlide(this.previousElementSibling,'${ytId}')"><svg class="w-16 h-16 text-white/80" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>`;
      } else if (post.video_url) {
        media = `<video src="${esc(post.video_url)}" preload="metadata" muted loop playsinline onclick="this.paused?this.play():this.pause()"></video>`;
      } else {
        media = `<div class="w-full h-full flex items-center justify-center bg-gray-900 text-gray-500"><p class="text-sm">Sin video</p></div>`;
      }

      const labelHtml = label ? `<div class="absolute top-3 left-3 z-10 bg-creo-mint/90 text-creo-purple text-[10px] font-bold px-3 py-1 rounded-full">${label}</div>` : '';
      const captionHtml = post.caption ? `<div class="absolute top-3 left-3 z-10 ${label ? 'top-10' : ''} max-w-[70%]"><p class="text-white text-xs drop-shadow-lg bg-black/30 backdrop-blur-sm rounded-lg px-2 py-1 line-clamp-2">${esc(post.caption)}</p></div>` : '';

      return `<div class="video-slide" data-postid="${post.id}">
        ${media}
        ${labelHtml}
        ${captionHtml}
        <div class="vid-actions">
          <div>
            <button class="vid-act-btn ${liked ? 'text-red-400' : ''}" onclick="toggleLike('${post.id}', this)" data-postid="${post.id}">
              <svg class="w-5 h-5" fill="${liked ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
            </button>
            <div class="vid-act-count">${post.like_count || ''}</div>
          </div>
          <div>
            <button class="vid-act-btn" onclick="openComments('${post.id}')">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
            </button>
            <div class="vid-act-count">${post.comment_count || ''}</div>
          </div>
          <div>
            <button class="vid-act-btn" onclick="sharePost('${post.id}', '${esc(creator.username)}')">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
            </button>
          </div>
        </div>
      </div>`;
    }

    function renderCfhVideoSlide(item, creator, groupIdx, slideIdx) {
      const ytId = item.video_type === 'youtube' ? extractYTId(item.video_url) : '';
      const thumb = item.thumbnail_url || (ytId ? `https://img.youtube.com/vi/${ytId}/mqdefault.jpg` : '');

      return `<div class="video-slide" data-cfhid="${item.id}">
        ${thumb ? `<img class="video-thumb" src="${esc(thumb)}" alt="${esc(item.title)}" onclick="window.location.href='futuro.html?content=${item.id}'">` :
          (item.video_url ? `<video src="${esc(item.video_url)}" preload="metadata" muted loop playsinline></video>` :
          `<div class="w-full h-full flex items-center justify-center bg-gray-900"><span class="text-3xl">${getCatIcon(item.category)}</span></div>`)}
        <div class="absolute top-3 left-3 z-10 bg-creo-purple/90 text-white text-[10px] font-bold px-3 py-1 rounded-full flex items-center gap-1">
          ⚡ Creo Futuro Hoy
        </div>
        <div class="absolute bottom-3 left-3 right-12 z-10">
          <p class="text-white text-sm font-bold drop-shadow-lg line-clamp-2">${esc(item.title)}</p>
          <p class="text-white/50 text-[10px] mt-0.5">${getCatIcon(item.category)} ${item.category} · ${item.view_count || 0} vistas</p>
        </div>
        <div class="play-overlay" onclick="window.location.href='futuro.html?content=${item.id}'">
          <svg class="w-14 h-14 text-white/80" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>`;
    }

    // ===== RECOMMENDED CREATORS SECTION =====
    function renderRecommended(recs, groupIdx) {
      if (!recs.length) return '';
      const cards = recs.map((r, i) => {
        const c = r.creator;
        const av = c.avatar_url
          ? `<img src="${esc(c.avatar_url)}" class="w-12 h-12 rounded-full object-cover border-2 border-creo-mint/50 mx-auto">`
          : `<div class="w-12 h-12 rounded-full bg-creo-mint/15 border-2 border-creo-mint/50 mx-auto flex items-center justify-center text-sm font-bold text-creo-mint">${esc((c.display_name || c.username || '?')[0].toUpperCase())}</div>`;
        return `<div class="rec-card text-center" onmouseenter="showRecPopup(event, ${groupIdx}, ${i})" onmouseleave="hideRecPopup()" onclick="window.location.href='profile.html?u=${esc(c.username)}'">
          ${av}
          <p class="text-white text-[11px] font-semibold mt-1.5 truncate">${esc(c.display_name || c.username)}</p>
          <p class="text-gray-400 text-[9px] truncate">@${esc(c.username)}</p>
        </div>`;
      }).join('');

      return `<div class="rec-section px-4 py-3" id="rec-section-${groupIdx}" data-recs='${esc(JSON.stringify(recs.map(r => r.creator)))}'>
        <p class="text-[10px] text-creo-mint/70 font-semibold uppercase tracking-wider mb-2 flex items-center gap-1.5">
          <img src="assets/logo-icon.png" class="w-3.5 h-3.5 rounded-full" alt="">
          Creadores Recomendados
        </p>
        <div class="flex gap-4 overflow-x-auto no-scrollbar pb-1">${cards}</div>
      </div>`;
    }

    function showRecPopup(event, groupIdx, recIdx) {
      try {
        const section = document.getElementById('rec-section-' + groupIdx);
        const recs = JSON.parse(section.dataset.recs);
        const c = recs[recIdx];
        if (!c) return;

        const popup = document.getElementById('rec-popup');
        const av = document.getElementById('rec-popup-avatar');
        av.innerHTML = c.avatar_url
          ? `<img src="${esc(c.avatar_url)}" class="w-full h-full object-cover">`
          : `<span class="text-sm font-bold text-creo-purple">${esc((c.display_name || c.username || '?')[0].toUpperCase())}</span>`;
        if (c.cover_url) document.getElementById('rec-popup-cover').style.backgroundImage = `url(${c.cover_url})`;
        document.getElementById('rec-popup-name').textContent = c.display_name || c.username;
        document.getElementById('rec-popup-username').textContent = '@' + c.username;
        document.getElementById('rec-popup-bio').textContent = c.bio || 'Creador en CREO';
        document.getElementById('rec-popup-link').href = 'profile.html?u=' + c.username;

        const rect = event.target.closest('.rec-card').getBoundingClientRect();
        popup.style.left = Math.min(rect.left, window.innerWidth - 300) + 'px';
        popup.style.top = (rect.top - 200) + 'px';
        popup.classList.add('show');
      } catch (e) {}
    }

    function hideRecPopup() {
      document.getElementById('rec-popup').classList.remove('show');
    }

    // ===== MI META SECTION =====
    function renderMiMeta(creator, metas) {
      if (!metas.length) return '';
      const today = new Date().toISOString().split('T')[0];

      const metaCards = metas.map(m => {
        const pct = m.goal_amount_cents > 0 ? Math.min(100, Math.round(m.raised_cents / m.goal_amount_cents * 100)) : 0;
        const raised = (m.raised_cents / 100).toFixed(2);
        const goal = (m.goal_amount_cents / 100).toFixed(2);
        const expired = m.end_date < today;
        const completed = pct >= 100;
        const images = m.images || (m.image_url ? [m.image_url] : []);
        const mainImg = images[0];

        let badge = '';
        if (completed) badge = '<span class="text-[10px] bg-green-500/20 text-green-400 px-2 py-0.5 rounded-full font-semibold">Completada</span>';
        else if (expired) badge = '<span class="text-[10px] bg-red-500/20 text-red-400 px-2 py-0.5 rounded-full font-semibold">Expirada</span>';

        const canContribute = !completed && !expired && (creator.stripe_onboarded || creator.id === '67133679-4e5f-49aa-8a22-43af41b917ee');
        const contributeBtn = canContribute
          ? `<a href="profile.html?u=${esc(creator.username)}#metas-section" class="block bg-creo-mint text-creo-purple text-xs font-bold text-center py-2.5 rounded-xl hover:brightness-110 transition mt-2">💚 Apoyar esta Meta</a>`
          : '';

        return `<div class="bg-white/5 border border-white/10 rounded-xl overflow-hidden">
          ${mainImg ? `<img src="${esc(mainImg)}" class="w-full h-32 object-cover" alt="${esc(m.title)}">` : ''}
          <div class="p-3 space-y-2">
            <div class="flex items-start justify-between gap-2">
              <h4 class="text-white font-bold text-sm leading-tight flex-1">${esc(m.title)}</h4>
              ${badge}
            </div>
            ${m.description ? `<p class="text-gray-400 text-[11px] line-clamp-2">${esc(m.description)}</p>` : ''}
            <div>
              <div class="flex justify-between text-[10px] mb-1">
                <span class="text-creo-mint font-bold">$${raised}</span>
                <span class="text-gray-500">de $${goal} (${pct}%)</span>
              </div>
              <div class="meta-progress-bar">
                <div class="meta-progress-fill" style="width:${pct}%"></div>
              </div>
            </div>
            ${contributeBtn}
          </div>
        </div>`;
      }).join('');

      return `<div class="bg-black/80 border-t border-white/5 px-4 py-4 space-y-3">
        <div class="flex items-center gap-2">
          <span class="text-sm">🎯</span>
          <h3 class="text-white font-bold text-sm">Mi Meta</h3>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">${metaCards}</div>
      </div>`;
    }

    // ===== CFH CONTENT LINK =====
    function renderCfhLink(creator, cfhContent) {
      if (!cfhContent.length && !creator.stripe_onboarded) return '';
      const hasSubscription = false; // Would check via API in real scenario

      return `<div class="px-4 py-3 bg-black/90">
        <a href="futuro.html?creator=${creator.id}" class="cfh-link block rounded-xl p-4 border border-creo-purple/30">
          <div class="flex items-center gap-3">
            <span class="text-2xl">⚡</span>
            <div class="flex-1">
              <p class="text-white font-bold text-sm">Creo Futuro Hoy</p>
              <p class="text-gray-400 text-[11px]">${cfhContent.length} contenido${cfhContent.length !== 1 ? 's' : ''} gratis · Suscríbete para contenido premium</p>
            </div>
            <svg class="w-5 h-5 text-creo-mint flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </div>
        </a>
      </div>`;
    }

    // ===== VIDEO DOTS UPDATE =====
    function updateVideoDots(groupIdx, total) {
      const row = document.getElementById('video-row-' + groupIdx);
      const dotsEl = document.getElementById('video-dots-' + groupIdx);
      if (!row || !dotsEl) return;
      const slideWidth = row.firstElementChild?.offsetWidth || 1;
      const activeIdx = Math.round(row.scrollLeft / slideWidth);
      dotsEl.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === activeIdx));
    }

    // ===== YT PLAYER IN SLIDE =====
    function playYTInSlide(thumbEl, ytId) {
      const slide = thumbEl.closest('.video-slide');
      const overlay = slide.querySelector('.play-overlay');
      if (overlay) overlay.remove();
      thumbEl.outerHTML = `<iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1&playsinline=1" class="w-full h-full" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    }

    // ===== LIKE =====
    async function toggleLike(postId, btn) {
      if (!currentUser) { showToast('Inicia sesión para dar like', 'info'); return; }
      const liked = userLikes.has(postId);
      try {
        if (liked) {
          await sb.from('post_likes').delete().eq('post_id', postId).eq('user_id', currentUser.id);
          userLikes.delete(postId);
        } else {
          await sb.from('post_likes').insert({ post_id: postId, user_id: currentUser.id });
          userLikes.add(postId);
        }
        const svg = btn.querySelector('svg');
        svg.setAttribute('fill', !liked ? 'currentColor' : 'none');
        btn.classList.toggle('text-red-400', !liked);
        const countEl = btn.parentElement.querySelector('.vid-act-count');
        const current = parseInt(countEl.textContent) || 0;
        countEl.textContent = !liked ? current + 1 : Math.max(current - 1, 0) || '';
      } catch (e) {}
    }

    // ===== COMMENTS MODAL =====
    async function openComments(postId) {
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 z-[100] flex items-end justify-center';
      modal.id = 'comments-modal';
      modal.innerHTML = `
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="document.getElementById('comments-modal').remove()"></div>
        <div class="relative w-full max-w-lg bg-white rounded-t-2xl max-h-[70vh] flex flex-col z-10">
          <div class="flex items-center justify-between px-4 py-3 border-b border-gray-200">
            <h3 class="font-bold text-gray-900 text-sm">Comentarios</h3>
            <button onclick="document.getElementById('comments-modal').remove()" class="p-1.5 hover:bg-gray-100 rounded-full"><svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
          </div>
          <div id="comments-list" class="flex-1 overflow-y-auto px-4 py-3 space-y-3">
            <p class="text-gray-400 text-sm text-center py-8 animate-pulse">Cargando...</p>
          </div>
          <div class="border-t border-gray-200 p-3 flex gap-2">
            <input id="comment-input" type="text" placeholder="Escribe un comentario..." class="flex-1 bg-gray-100 text-gray-900 rounded-full px-4 py-2 text-sm outline-none border border-gray-200 focus:border-creo-purple/50" onkeydown="if(event.key==='Enter')submitComment('${postId}')">
            <button onclick="submitComment('${postId}')" class="w-9 h-9 rounded-full bg-creo-purple flex items-center justify-center hover:bg-creo-light transition flex-shrink-0">
              <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
          </div>
        </div>`;
      document.body.appendChild(modal);

      // Load comments
      const { data: comments } = await sb.from('comments').select('*, profiles:user_id(username, display_name, avatar_url)').eq('post_id', postId).order('created_at', { ascending: true }).limit(100);
      const list = document.getElementById('comments-list');
      if (!comments || comments.length === 0) {
        list.innerHTML = '<p class="text-gray-400 text-sm text-center py-8">Sin comentarios aún. Sé el primero.</p>';
        return;
      }
      list.innerHTML = comments.map(c => {
        const author = c.profiles || {};
        const av = author.avatar_url
          ? `<img src="${esc(author.avatar_url)}" class="w-7 h-7 rounded-full object-cover">`
          : `<div class="w-7 h-7 rounded-full bg-creo-purple/10 flex items-center justify-center text-[10px] text-creo-purple font-bold">${(author.display_name || '?')[0].toUpperCase()}</div>`;
        const date = new Date(c.created_at).toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
        return `<div class="flex gap-2">
          ${av}
          <div class="flex-1">
            <div class="flex items-center gap-2">
              <span class="text-xs font-semibold text-gray-900">${esc(author.display_name || author.username || 'Anónimo')}</span>
              <span class="text-[10px] text-gray-400">${date}</span>
            </div>
            <p class="text-sm text-gray-600 mt-0.5">${esc(c.body)}</p>
          </div>
        </div>`;
      }).join('');
    }

    async function submitComment(postId) {
      if (!currentUser) { showToast('Inicia sesión para comentar', 'info'); return; }
      const input = document.getElementById('comment-input');
      const body = input.value.trim();
      if (!body) return;
      input.value = '';
      try {
        await sb.from('comments').insert({ post_id: postId, user_id: currentUser.id, body: body.slice(0, 1000) });
        showToast('Comentario publicado', 'success');
        openComments(postId);
      } catch (e) {
        showToast('Error al comentar', 'error');
      }
    }

    // ===== SHARE =====
    function sharePost(postId, username) {
      const url = `https://fullnessmindset.github.io/creo/profile.html?u=${username}`;
      if (navigator.share) {
        navigator.share({ title: 'CREO — ' + username, url });
      } else {
        navigator.clipboard.writeText(url);
        showToast('Enlace copiado', 'success');
      }
    }

    // ===== HELPERS =====
    function extractYTId(url) {
      if (!url) return '';
      const m = url.match(/(?:v=|youtu\.be\/|embed\/|\/v\/)([a-zA-Z0-9_-]{11})/);
      return m ? m[1] : '';
    }

    function getCatIcon(cat) {
      return { music: '🎵', books: '📚', food: '🍽️', health: '🏥', fitness: '💪', education: '🎓', faith: '✝️' }[cat] || '📁';
    }

    function esc(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = String(str);
      return d.innerHTML;
    }
  </script>
  <script>renderBottomNav('feed');</script>
</body>
