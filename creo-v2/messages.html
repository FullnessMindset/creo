<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CREO — Mensajes</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a0a3e">
  <link rel="icon" href="assets/logo-icon.png" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { creo: { purple: '#1a0a3e', light: '#2d1b69', mint: '#33f0b0', mintDark: '#28c48e' } } } }
    }
  </script>
  <style>
    .glass { background: rgba(255,255,255,0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.3); }
    .glass-dark { background: rgba(26,10,62,0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15); }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen transition-colors duration-300">
  <script src="shared.js"></script>

  <div class="max-w-2xl mx-auto px-4 pt-6 pb-24 space-y-4">
    <a href="index.html" class="flex items-center gap-3 no-underline">
      <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow">
        <img src="assets/logo-icon.png" alt="CREO" class="w-7 h-7 rounded-full object-contain">
      </div>
      <h1 class="text-xl font-bold text-creo-purple tracking-wider">Mensajes</h1>
    </a>

    <div id="auth-required" class="hidden glass p-8 rounded-2xl text-center space-y-3">
      <p class="text-gray-500 text-sm">Inicia sesión para ver tus mensajes</p>
      <a href="index.html" class="inline-block bg-creo-purple text-white px-6 py-2 rounded-xl text-sm font-semibold hover:bg-creo-light transition">Iniciar Sesión</a>
    </div>

    <div id="conversations-list" class="space-y-2"></div>
    <p id="no-messages" class="hidden text-center text-gray-400 text-sm py-8">No tienes mensajes aún</p>
  </div>

  <!-- Chat Modal -->
  <div id="chat-modal" class="fixed inset-0 z-[100] hidden">
    <div class="absolute inset-0 bg-white flex flex-col" id="chat-bg">
      <div class="p-4 border-b border-gray-200 flex items-center gap-3">
        <button onclick="closeChat()" class="text-gray-400 hover:text-gray-600">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <a id="chat-profile-link" href="#" class="w-10 h-10 rounded-full bg-creo-purple/10 overflow-hidden flex items-center justify-center hover:ring-2 hover:ring-creo-mint transition">
          <div id="chat-avatar"></div>
        </a>
        <div>
          <a id="chat-profile-link-name" href="#" class="font-bold text-sm text-gray-900 hover:text-creo-purple transition block"><span id="chat-name"></span></a>
          <p id="chat-username" class="text-[10px] text-gray-400"></p>
        </div>
      </div>
      <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
      <div class="p-3 border-t border-gray-200 pb-safe">
        <div id="chat-audio-preview" class="hidden mb-2 flex items-center gap-2 bg-gray-100 rounded-xl px-3 py-2">
          <audio id="chat-audio-player" controls class="flex-1 h-8"></audio>
          <button onclick="cancelAudio()" class="text-red-400 hover:text-red-600 text-xs">✕</button>
        </div>
        <div class="flex items-center gap-2">
          <span id="chat-emoji-btn" class="cursor-pointer text-xl hover:scale-110 transition">😊</span>
          <button onclick="toggleChatGif()" class="px-2 py-1 text-xs font-bold text-gray-400 hover:text-creo-purple border border-gray-200 rounded-lg hover:border-creo-mint transition">GIF</button>
          <button onclick="toggleAudioRecord()" id="chat-audio-btn" class="text-gray-400 hover:text-red-500 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-14 0m7 7v4m-4 0h8M12 1a3 3 0 00-3 3v7a3 3 0 006 0V4a3 3 0 00-3-3z"/></svg>
          </button>
          <input id="chat-input" type="text" placeholder="Escribe un mensaje..." class="flex-1 bg-gray-100 border border-gray-200 rounded-full px-4 py-2 text-sm outline-none focus:border-creo-mint">
          <button onclick="sendMessage()" class="bg-creo-mint text-creo-purple font-bold px-4 py-2 rounded-full text-sm hover:bg-creo-mintDark transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
          </button>
        </div>
        <div id="chat-gif-picker" class="hidden mt-2 bg-white border border-gray-200 rounded-xl p-2 max-h-48 overflow-y-auto glass">
          <input id="chat-gif-search" type="text" placeholder="Buscar GIF..." class="w-full bg-gray-100 rounded-lg px-3 py-2 text-xs mb-2 outline-none" oninput="searchChatGifs(this.value)">
          <div id="chat-gif-results" class="grid grid-cols-3 gap-1"></div>
          <p class="text-[9px] text-gray-300 text-center mt-1">Powered by GIPHY</p>
        </div>
        <div id="chat-recording-indicator" class="hidden mt-2 flex items-center gap-2 text-red-500 text-xs">
          <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span> Grabando audio...
          <button onclick="stopAudioRecord()" class="ml-auto bg-red-100 text-red-600 px-3 py-1 rounded-full text-xs font-semibold">Detener</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentUser = null;
    let activeChatUser = null;
    let chatPolling = null;
    let recorder = null;
    let audioBlob = null;

    async function init() {
      const { data: { user } } = await sb.auth.getUser();
      if (!user) {
        document.getElementById('auth-required').classList.remove('hidden');
        return;
      }
      currentUser = user;
      loadConversations();
      setInterval(loadConversations, 10000);
    }

    async function loadConversations() {
      if (!currentUser) return;
      const { data: msgs } = await sb.from('messages')
        .select('*, sender:sender_id(id, username, display_name, avatar_url), receiver:receiver_id(id, username, display_name, avatar_url)')
        .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`)
        .order('created_at', { ascending: false });

      if (!msgs || msgs.length === 0) {
        document.getElementById('no-messages').classList.remove('hidden');
        return;
      }
      document.getElementById('no-messages').classList.add('hidden');

      const convos = {};
      msgs.forEach(m => {
        const other = m.sender_id === currentUser.id ? m.receiver : m.sender;
        if (!other) return;
        if (!convos[other.id]) {
          convos[other.id] = { user: other, lastMsg: m, unread: 0 };
        }
        if (m.receiver_id === currentUser.id && !m.is_read) convos[other.id].unread++;
      });

      const sorted = Object.values(convos).sort((a, b) => new Date(b.lastMsg.created_at) - new Date(a.lastMsg.created_at));
      const list = document.getElementById('conversations-list');
      list.innerHTML = sorted.map(c => {
        const name = c.user.display_name || c.user.username || 'Usuario';
        const profileLink = c.user.username ? `profile.html?u=${encodeURIComponent(c.user.username)}` : '#';
        const avatar = c.user.avatar_url
          ? `<img src="${esc(c.user.avatar_url)}" class="w-full h-full object-cover">`
          : `<span class="text-creo-purple font-bold">${esc(name[0].toUpperCase())}</span>`;
        const preview = c.lastMsg.body ? esc(c.lastMsg.body).slice(0, 40) : (c.lastMsg.media_type === 'gif' ? '🎬 GIF' : c.lastMsg.media_type === 'audio' ? '🎤 Audio' : '📷 Media');
        const isMine = c.lastMsg.sender_id === currentUser.id;
        return `<button onclick="openChat('${c.user.id}')" class="w-full glass rounded-xl p-3 flex items-center gap-3 hover:shadow-lg transition text-left">
          <a href="${profileLink}" onclick="event.stopPropagation()" class="w-12 h-12 rounded-full bg-creo-purple/10 flex items-center justify-center overflow-hidden flex-shrink-0 hover:ring-2 hover:ring-creo-mint transition">${avatar}</a>
          <div class="flex-1 min-w-0">
            <div class="flex justify-between items-center">
              <a href="${profileLink}" onclick="event.stopPropagation()" class="font-semibold text-sm text-gray-900 truncate hover:text-creo-purple transition">${esc(name)}</a>
              <span class="text-[10px] text-gray-400 flex-shrink-0">${timeAgo(c.lastMsg.created_at)}</span>
            </div>
            <p class="text-xs text-gray-500 truncate">${isMine ? 'Tú: ' : ''}${preview}</p>
          </div>
          ${c.unread > 0 ? `<span class="w-5 h-5 rounded-full bg-creo-mint text-creo-purple text-[10px] font-bold flex items-center justify-center flex-shrink-0">${c.unread}</span>` : ''}
        </button>`;
      }).join('');
    }

    async function openChat(userId) {
      const { data: profile } = await sb.from('profiles').select('*').eq('id', userId).single();
      if (!profile) return;
      activeChatUser = profile;
      const name = profile.display_name || profile.username || 'Usuario';
      const profileUrl = profile.username ? `profile.html?u=${encodeURIComponent(profile.username)}` : '#';
      document.getElementById('chat-name').textContent = name;
      document.getElementById('chat-username').textContent = '@' + (profile.username || '');
      document.getElementById('chat-profile-link').href = profileUrl;
      document.getElementById('chat-profile-link-name').href = profileUrl;
      const avatar = document.getElementById('chat-avatar');
      avatar.innerHTML = profile.avatar_url
        ? `<img src="${esc(profile.avatar_url)}" class="w-full h-full object-cover">`
        : `<span class="text-creo-purple font-bold text-lg">${esc(name[0].toUpperCase())}</span>`;
      document.getElementById('chat-modal').classList.remove('hidden');
      loadChatMessages();
      chatPolling = setInterval(loadChatMessages, 4000);
      createEmojiPicker('chat-input', 'chat-emoji-btn');
    }

    function closeChat() {
      document.getElementById('chat-modal').classList.add('hidden');
      if (chatPolling) { clearInterval(chatPolling); chatPolling = null; }
      activeChatUser = null;
      cancelAudio();
      loadConversations();
    }

    async function loadChatMessages() {
      if (!currentUser || !activeChatUser) return;
      const { data: msgs } = await sb.from('messages')
        .select('*')
        .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${activeChatUser.id}),and(sender_id.eq.${activeChatUser.id},receiver_id.eq.${currentUser.id})`)
        .order('created_at', { ascending: true })
        .limit(200);
      const list = document.getElementById('chat-messages');
      if (!msgs || msgs.length === 0) {
        list.innerHTML = '<p class="text-center text-gray-400 text-xs py-8">Inicia la conversación</p>';
        return;
      }
      list.innerHTML = msgs.map(m => {
        const isMine = m.sender_id === currentUser.id;
        let content = '';
        if (m.media_type === 'gif') content = `<img src="${esc(m.media_url)}" class="max-w-48 rounded-lg" alt="GIF">`;
        else if (m.media_type === 'audio') content = `<audio controls src="${esc(m.media_url)}" class="max-w-48 h-8"></audio>`;
        else if (m.media_type === 'image') content = `<img src="${esc(m.media_url)}" class="max-w-48 rounded-lg" alt="">`;
        if (m.body) content += `<p class="text-sm">${esc(m.body)}</p>`;
        return `<div class="flex ${isMine ? 'justify-end' : 'justify-start'}">
          <div class="max-w-[75%] px-3 py-2 rounded-2xl ${isMine ? 'bg-creo-purple text-white rounded-br-sm' : 'bg-gray-100 text-gray-900 rounded-bl-sm'} space-y-1">
            ${content}
            <p class="text-[10px] ${isMine ? 'text-white/50' : 'text-gray-400'} text-right">${timeAgo(m.created_at)}</p>
          </div>
        </div>`;
      }).join('');
      list.scrollTop = list.scrollHeight;
      const unread = msgs.filter(m => m.sender_id === activeChatUser.id && !m.is_read).map(m => m.id);
      if (unread.length) sb.from('messages').update({ is_read: true }).in('id', unread).then(() => {});
    }

    async function sendMessage() {
      if (!currentUser || !activeChatUser) return;
      const input = document.getElementById('chat-input');
      const body = input.value.trim();
      if (!body && !audioBlob) return;
      const msg = { sender_id: currentUser.id, receiver_id: activeChatUser.id, body: body || null, media_url: null, media_type: null };
      if (audioBlob) {
        const fileName = `dm_audio_${Date.now()}.webm`;
        const { data: upData, error: upErr } = await sb.storage.from('dm-media').upload(fileName, audioBlob, { contentType: 'audio/webm' });
        if (!upErr && upData) {
          const { data: urlData } = sb.storage.from('dm-media').getPublicUrl(fileName);
          msg.media_url = urlData.publicUrl;
          msg.media_type = 'audio';
        }
        cancelAudio();
      }
      input.value = '';
      const { error } = await sb.from('messages').insert(msg);
      if (error) { showToast('Error al enviar', 'error'); return; }
      loadChatMessages();
    }

    // GIF
    let gifTimer = null;
    function toggleChatGif() { document.getElementById('chat-gif-picker').classList.toggle('hidden'); }
    async function searchChatGifs(q) {
      clearTimeout(gifTimer);
      gifTimer = setTimeout(async () => {
        const query = (q || '').trim() || 'trending';
        const url = query === 'trending'
          ? 'https://api.giphy.com/v1/gifs/trending?api_key=GlVGYHkr3WSBnllca54iNt0yFbjz7L65&limit=18&rating=g'
          : `https://api.giphy.com/v1/gifs/search?api_key=GlVGYHkr3WSBnllca54iNt0yFbjz7L65&q=${encodeURIComponent(query)}&limit=18&rating=g`;
        try {
          const res = await fetch(url);
          const json = await res.json();
          document.getElementById('chat-gif-results').innerHTML = (json.data || []).map(g =>
            `<img src="${g.images.fixed_width_small.url}" class="w-full rounded cursor-pointer hover:opacity-80 transition" onclick="sendGif('${g.images.fixed_width.url}')" alt="GIF">`
          ).join('');
        } catch(e) {}
      }, 300);
    }
    async function sendGif(url) {
      if (!currentUser || !activeChatUser) return;
      await sb.from('messages').insert({ sender_id: currentUser.id, receiver_id: activeChatUser.id, body: null, media_url: url, media_type: 'gif' });
      document.getElementById('chat-gif-picker').classList.add('hidden');
      loadChatMessages();
    }

    // Audio
    async function toggleAudioRecord() {
      if (recorder && recorder.state === 'recording') { stopAudioRecord(); return; }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recorder = new MediaRecorder(stream);
        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
          audioBlob = new Blob(chunks, { type: 'audio/webm' });
          document.getElementById('chat-audio-player').src = URL.createObjectURL(audioBlob);
          document.getElementById('chat-audio-preview').classList.remove('hidden');
          document.getElementById('chat-recording-indicator').classList.add('hidden');
          stream.getTracks().forEach(t => t.stop());
        };
        recorder.start();
        document.getElementById('chat-recording-indicator').classList.remove('hidden');
        document.getElementById('chat-audio-btn').classList.add('text-red-500');
      } catch(e) { showToast('No se pudo acceder al micrófono', 'error'); }
    }
    function stopAudioRecord() { if (recorder && recorder.state === 'recording') recorder.stop(); }
    function cancelAudio() {
      audioBlob = null;
      document.getElementById('chat-audio-preview').classList.add('hidden');
      document.getElementById('chat-recording-indicator').classList.add('hidden');
      document.getElementById('chat-audio-btn').classList.remove('text-red-500');
      if (recorder && recorder.state === 'recording') { recorder.stop(); recorder.stream?.getTracks().forEach(t => t.stop()); }
      recorder = null;
    }

    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'ahora';
      if (mins < 60) return mins + 'm';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + 'h';
      const days = Math.floor(hrs / 24);
      if (days < 30) return days + 'd';
      return Math.floor(days / 30) + 'mes';
    }

    document.getElementById('chat-input')?.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

    window.onload = () => {
      init();
      renderBottomNav('messages');
      updateNavAuth();
      loadNotificationBell();
    };
  </script>
</body>
</html>
