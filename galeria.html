<!DOCTYPE html>

<head>

  <style>
    body { overscroll-behavior: contain; background: #0a0a0a; }

    .pill-active { background: #33f0b0; color: #0a0a0a; font-weight: 600; }
    .pill-inactive { background: rgba(255,255,255,0.08); color: #ccc; }
    .pill-inactive:hover { background: rgba(255,255,255,0.15); }
    .hero-gradient { background: linear-gradient(to top, #0a0a0a 0%, transparent 60%); }
    .modal-backdrop { background: rgba(0,0,0,0.95); }
    @keyframes fade-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fade-in 0.4s ease-out; }
    @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(51,240,176,0.4); } 50% { box-shadow: 0 0 20px 4px rgba(51,240,176,0.2); } }

    .sidebar-link:hover { background: rgba(255,255,255,0.08); }
    .sidebar-link.active { background: rgba(51,240,176,0.12); color: #33f0b0; }
    .masonry-grid { columns: 2; column-gap: 0.75rem; }
    @media (min-width: 640px) { .masonry-grid { columns: 3; } }
    @media (min-width: 768px) { .masonry-grid { columns: 4; } }
    @media (min-width: 1024px) { .masonry-grid { columns: 5; } }
    .masonry-grid > .masonry-item { break-inside: avoid; margin-bottom: 0.75rem; }
    .zoom-in { cursor: zoom-in; }
    .zoom-out { cursor: zoom-out; }
    .zoomed-img { transform: scale(1.8); transform-origin: center center; transition: transform 0.3s ease; }
  </style>

<body class="bg-[#0a0a0a] text-white min-h-screen">

  <!-- Cookie Consent -->

  <!-- Header -->

          </div>

        <h1 class="text-lg font-bold tracking-[0.2em] text-creo-mint">GALERIA</h1>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-white/10 transition">
          <svg class="w-5 h-5 text-gray-400 theme-icon-sun" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          <svg class="w-5 h-5 text-gray-300 theme-icon-moon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>

          Publicar
        </button>
      </div>
    </div>

          <input id="galeria-search" type="text" placeholder="Buscar obras, artistas, tecnicas..."

            oninput="searchArt(this.value)">
        </div>
      </div>
    </section>

    <!-- Featured Hero -->
    <section id="hero-section" class="px-4 mb-8">
      <div class="max-w-5xl mx-auto">
        <div id="hero-card" class="relative rounded-xl overflow-hidden cursor-pointer group" onclick="openViewer(getFeatured())"></div>
      </div>
    </section>

    <!-- Content Area -->
    <div id="content-rows" class="space-y-8"></div>

  </main>

  <!-- Upload Modal -->
  <div id="upload-modal" class="fixed inset-0 z-[100] hidden modal-backdrop flex items-center justify-center p-4">
    <div class="bg-[#1a1a1a] rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto animate-fade-in border border-white/10">
      <div class="flex items-center justify-between p-5 border-b border-white/10">
        <h2 class="text-lg font-bold">Publicar en Galeria</h2>
        <button onclick="closeUploadModal()" class="text-gray-400 hover:text-white transition">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="p-5 space-y-4">
        <div>
          <label class="block text-sm text-gray-400 mb-1">Titulo *</label>
          <input id="upload-title" type="text" placeholder="Nombre de tu obra" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-500 focus:ring-2 focus:ring-creo-mint focus:border-transparent outline-none">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Artista / Creador</label>
          <input id="upload-artist" type="text" placeholder="@usuario o nombre" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-500 focus:ring-2 focus:ring-creo-mint focus:border-transparent outline-none">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Categoria *</label>
          <select id="upload-category" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2.5 text-sm text-white focus:ring-2 focus:ring-creo-mint outline-none appearance-none">
            <option value="" class="bg-[#1a1a1a]">Seleccionar categoria</option>
            <option value="Pintura" class="bg-[#1a1a1a]">Pintura</option>
            <option value="Fotografía" class="bg-[#1a1a1a]">Fotografía</option>
            <option value="Escultura" class="bg-[#1a1a1a]">Escultura</option>
            <option value="Arte Digital" class="bg-[#1a1a1a]">Arte Digital</option>
            <option value="Ilustración" class="bg-[#1a1a1a]">Ilustración</option>
            <option value="Grabado" class="bg-[#1a1a1a]">Grabado</option>
            <option value="Cerámica" class="bg-[#1a1a1a]">Cerámica</option>
            <option value="Textil" class="bg-[#1a1a1a]">Textil</option>
          </select>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm text-gray-400 mb-1">Tecnica / Medio</label>
            <input id="upload-medium" type="text" placeholder="ej. Oleo sobre lienzo" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-500 focus:ring-2 focus:ring-creo-mint outline-none">
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-1">Ano</label>
            <input id="upload-year" type="text" placeholder="ej. 2025" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-500 focus:ring-2 focus:ring-creo-mint outline-none">
          </div>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Dimensiones</label>
          <input id="upload-dimensions" type="text" placeholder="ej. 80 x 60 cm" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-500 focus:ring-2 focus:ring-creo-mint outline-none">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Descripcion</label>
          <textarea id="upload-desc" rows="3" placeholder="Cuenta la historia detras de tu obra..." class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-500 focus:ring-2 focus:ring-creo-mint focus:border-transparent outline-none resize-none"></textarea>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Imagen *</label>
          <input id="upload-image" type="file" accept="image/*" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm text-gray-400 file:mr-3 file:py-1.5 file:px-3 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-creo-mint/10 file:text-creo-mint hover:file:bg-creo-mint/20">
        </div>
        <button id="upload-submit-btn" onclick="submitGaleriaUpload()" class="w-full bg-creo-mint text-black font-bold text-sm py-3 rounded-full hover:bg-creo-mintDark transition mt-2">Publicar</button>
      </div>
    </div>
  </div>

  <!-- Art Viewer Modal (Lightbox) -->
  <div id="viewer-modal" class="fixed inset-0 z-[100] hidden modal-backdrop overflow-y-auto">
    <div class="relative min-h-full flex flex-col">
      <button onclick="closeViewer()" class="fixed top-4 right-4 z-[110] text-white/60 hover:text-white transition bg-black/50 rounded-full p-2">
        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>

      <!-- Image area -->
      <div class="flex-1 flex items-center justify-center px-4 pt-16 pb-4">
        <img id="viewer-image" src="" alt="" class="max-w-full max-h-[70vh] rounded-lg object-contain zoom-in transition-transform duration-300" onclick="toggleZoom(this)">
      </div>

      <!-- Info panel -->
      <div class="px-4 pb-6 md:px-8 animate-fade-in">
        <div class="max-w-3xl mx-auto">
          <!-- Title & metadata -->
          <div class="flex items-start justify-between gap-4 flex-wrap">
            <div class="flex-1 min-w-0">
              <h2 id="viewer-title" class="text-xl md:text-2xl font-bold"></h2>
              <p id="viewer-artist" class="text-gray-400 text-sm mt-1"></p>
              <div class="flex flex-wrap items-center gap-2 mt-2">
                <span id="viewer-medium-badge" class="text-[10px] bg-creo-mint/15 text-creo-mint px-2.5 py-1 rounded-full font-semibold"></span>
                <span id="viewer-dimensions" class="text-[10px] text-gray-500"></span>
                <span id="viewer-year" class="text-[10px] text-gray-500"></span>
              </div>
              <p id="viewer-desc" class="text-gray-500 text-xs mt-3 leading-relaxed"></p>
              <!-- Tags -->
              <div id="viewer-tags" class="flex flex-wrap gap-1.5 mt-3"></div>
            </div>
            <!-- Actions -->
            <div class="flex items-center gap-2 flex-shrink-0 flex-wrap">
              <button onclick="shareExternal()" class="bg-white/10 hover:bg-white/20 text-white text-sm px-4 py-2 rounded-full transition flex items-center gap-1.5" title="Compartir Externo">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                Externo
              </button>
              <button onclick="shareToCommunity()" class="bg-white/10 hover:bg-white/20 text-white text-sm px-4 py-2 rounded-full transition flex items-center gap-1.5" title="Compartir a Comunidad">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
                Comunidad
              </button>
              <button onclick="tagArtist()" class="bg-white/10 hover:bg-white/20 text-white text-sm px-4 py-2 rounded-full transition flex items-center gap-1.5" title="Etiquetar Artista">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                Etiquetar
              </button>
              <a id="viewer-tip-btn" href="#" class="flex-shrink-0 bg-creo-mint text-black font-bold text-sm px-5 py-2 rounded-full hover:bg-creo-mintDark transition flex items-center gap-2">
                <img src="assets/logo-icon.png" class="w-5 h-5 rounded-full" alt="CREO">
                Creo en Ti
              </a>
            </div>
          </div>

          <!-- Stats -->
          <div class="flex items-center gap-4 mt-4 pt-3 border-t border-white/10">
            <span class="flex items-center gap-1 text-[11px] text-gray-400"><img src="assets/logo-icon.png" class="w-3.5 h-3.5 rounded-full opacity-70"><span id="viewer-creos">0</span> creos</span>
            <span class="flex items-center gap-1 text-[11px] text-gray-400"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg><span id="viewer-shares">0</span> compartidos</span>
            <span class="flex items-center gap-1 text-[11px] text-gray-400"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg><span id="viewer-views">0</span> vistas</span>
            <span class="flex items-center gap-1 text-[11px] text-gray-400"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg><span id="viewer-comments-count">0</span> comentarios</span>
          </div>

          <!-- Comment section -->
          <div class="mt-4 pt-4 border-t border-white/10">
            <div class="flex gap-2">
              <input id="viewer-comment" type="text" placeholder="Deja un comentario..." class="flex-1 bg-white/5 border border-white/10 rounded-full px-4 py-2 text-sm text-white placeholder-gray-500 focus:ring-2 focus:ring-creo-mint outline-none">
              <button onclick="postComment()" class="bg-creo-mint/20 text-creo-mint px-4 py-2 rounded-full text-sm font-semibold hover:bg-creo-mint/30 transition">Enviar</button>

            <div id="viewer-comments" class="mt-3 space-y-2 max-h-32 overflow-y-auto cine-scrollbar"></div>
          </div>
        </div>
      </div>
    </div>

  <script>
  /* ── Categories ─────────────────────────────────────────── */
  const CATEGORIES = ['Pintura', 'Fotografía', 'Escultura', 'Arte Digital', 'Ilustración', 'Grabado', 'Cerámica', 'Textil'];

  /* ── Demo Data (20 artworks) ───────────────────────────── */

  let allArtworks = [];
  let activeCategory = null;
  let currentView = 'home';
  let galeriaCurrentUser = null;
  let currentViewingArt = null;
  let featuredArt = null;

  /* ── Init ──────────────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded', async () => {
    checkCookieConsent();
    await loadArtworks();
    renderSidebarCategories();
    renderTopArtists();
    renderAll();
    renderBottomNav('galeria');
    initTheme();
    updateNavAuth();

    try {
      const { data: { user } } = await sb.auth.getUser();
      if (user) {
        galeriaCurrentUser = user;
        document.getElementById('galeria-upload-btn').classList.remove('hidden');
        if (new URLSearchParams(window.location.search).get('publish') === '1') {
          setTimeout(() => openUploadModal(), 500);
        }
      }
    } catch(e) {}
  });

  /* ── Cookie Consent ────────────────────────────────────── */
  function checkCookieConsent() {
    if (!localStorage.getItem('creo-cookies-accepted')) {
      document.getElementById('cookie-banner').classList.remove('hidden');
    }
  }
  function acceptCookies() {
    localStorage.setItem('creo-cookies-accepted', 'true');
    document.getElementById('cookie-banner').classList.add('hidden');
  }

  /* ── Sidebar ──────────────────────────────────────────── */
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    sidebar.classList.toggle('-translate-x-full');
    overlay.classList.toggle('hidden');
  }

  function renderSidebarCategories() {
    const container = document.getElementById('sidebar-categories');
    const safe = typeof esc === 'function' ? esc : s => s;
    container.innerHTML = CATEGORIES.map(cat => `
      <button onclick="filterCategory('${cat}')"
        class="sidebar-link w-full text-left px-3 py-2 rounded-lg text-xs text-gray-400 hover:text-white"
        data-cat="${cat}">
        ${safe(cat)}
      </button>
    `).join('');
  }

  function renderTopArtists() {
    const container = document.getElementById('top-artists');
    const safe = typeof esc === 'function' ? esc : s => s;
    const artistMap = {};
    allArtworks.forEach(a => {
      if (!artistMap[a.artistUsername]) artistMap[a.artistUsername] = { name: a.artist, username: a.artistUsername, avatar: a.artistAvatar || '', creos: 0, works: 0 };
      artistMap[a.artistUsername].creos += (a.creos || 0);
      artistMap[a.artistUsername].works++;
    });
    const sorted = Object.values(artistMap).sort((a, b) => b.creos - a.creos).slice(0, 5);
    container.innerHTML = sorted.map((c, i) => `
      <a href="profile.html?u=${encodeURIComponent(c.username)}" class="flex items-center gap-2 p-2 rounded-lg hover:bg-white/5 transition group">
        <div class="relative">
          <img src="${safe(c.avatar || 'https://picsum.photos/seed/' + c.username + '/100/100')}" class="w-8 h-8 rounded-full object-cover" alt="">
          ${i === 0 ? '<span class="absolute -top-1 -right-1 text-[8px] bg-creo-mint text-black w-4 h-4 rounded-full flex items-center justify-center font-bold">1</span>' : ''}
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-xs font-semibold truncate group-hover:text-creo-mint transition">${safe(c.name)}</p>
          <p class="text-[10px] text-gray-500">${c.creos} creos · ${c.works} obras</p>
        </div>
      </a>
    `).join('');
  }

  /* ── Views ────────────────────────────────────────────── */
  function setView(view) {
    currentView = view;
    activeCategory = null;
    document.querySelectorAll('.sidebar-link[data-view]').forEach(b => {
      b.classList.toggle('active', b.dataset.view === view);
      b.classList.toggle('text-gray-400', b.dataset.view !== view);
    });
    document.querySelectorAll('.sidebar-link[data-cat]').forEach(b => {
      b.classList.remove('active');
      b.classList.add('text-gray-400');
    });
    document.getElementById('hero-section').classList.remove('hidden');
    renderAll();
    if (window.innerWidth < 1024) toggleSidebar();
  }

  /* ── Load from Supabase or demo ───────────────────────── */
  async function loadArtworks() {
    try {
      if (typeof sb !== 'undefined') {
        const { data, error } = await sb.from('galeria').select(`
          id, title, description, image_url, category, medium, dimensions, year, created_at,
          profiles:creator_id ( username, display_name, avatar_url )
        `).order('created_at', { ascending: false });
        if (!error && data && data.length > 0) {
          allArtworks = data.map(a => ({
            id: a.id, title: a.title, description: a.description,
            image: a.image_url, category: a.category, medium: a.medium || '',
            dimensions: a.dimensions || '', year: a.year || '',
            artist: a.profiles?.display_name || a.profiles?.username || 'Artista',
            artistUsername: a.profiles?.username || '',
            artistAvatar: a.profiles?.avatar_url || '',
            creos: 0, shares: 0, views: 0, comments: 0, tags: []
          }));
          return;
        }
      }
    } catch (e) { console.log('Using demo data for galeria'); }
    allArtworks = [...DEMO_DATA];
  }

  /* ── Category Filter ──────────────────────────────────── */
  function filterCategory(cat) {
    activeCategory = cat;
    currentView = 'home';
    document.querySelectorAll('.sidebar-link[data-view]').forEach(b => {
      b.classList.remove('active');
      b.classList.add('text-gray-400');
    });
    document.querySelectorAll('.sidebar-link[data-cat]').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === cat);
      b.classList.toggle('text-gray-400', b.dataset.cat !== cat);
    });
    document.getElementById('hero-section').classList.remove('hidden');
    renderAll();
    if (window.innerWidth < 1024) toggleSidebar();
  }

  /* ── Render Everything ────────────────────────────────── */
  function renderAll() {
    let filtered = activeCategory ? allArtworks.filter(a => a.category === activeCategory) : [...allArtworks];

    if (currentView === 'trending') {
      filtered = [...allArtworks].sort((a, b) =>
        ((b.creos || 0) + (b.comments || 0) * 2 + (b.shares || 0) * 3) -
        ((a.creos || 0) + (a.comments || 0) * 2 + (a.shares || 0) * 3)
      );
    } else if (currentView === 'recent') {
      filtered = [...allArtworks].reverse();
    }

    featuredArt = filtered[0] || allArtworks[0];
    renderHero(featuredArt);
    renderContentRows(filtered);
  }

  function getFeatured() {
    return featuredArt;
  }

          <span class="flex items-center gap-1 text-[11px] text-gray-400"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>${artwork.views || 0}</span>

  /* ── Content Rows ─────────────────────────────────────── */
  function renderContentRows(artworks) {
    const container = document.getElementById('content-rows');
    const safe = typeof esc === 'function' ? esc : s => s;

    // Masonry grid for Trending & Recent views
    if (currentView === 'trending') {
      container.innerHTML = `
        <section class="px-4">
          <div class="max-w-5xl mx-auto">
            <h3 class="text-lg font-bold mb-1 text-creo-mint">Favoritos del Pueblo</h3>
            <p class="text-xs text-gray-500 mb-4">Clasificados por la comunidad — creos, comentarios y compartidos deciden</p>
            <div class="masonry-grid">
              ${artworks.slice(1).map((a, i) => artCard(a, safe, i + 2)).join('')}
            </div>
          </div>
        </section>`;
      return;
    }

    if (currentView === 'recent') {
      container.innerHTML = `
        <section class="px-4">
          <div class="max-w-5xl mx-auto">
            <h3 class="text-lg font-bold mb-1 text-creo-mint">Recien Llegados</h3>
            <p class="text-xs text-gray-500 mb-4">Las obras mas recientes de la comunidad creadora</p>
            <div class="masonry-grid">
              ${artworks.slice(1).map(a => artCard(a, safe)).join('')}
            </div>
          </div>
        </section>`;
      return;
    }

    // Single category selected — masonry grid
    if (activeCategory) {
      container.innerHTML = `
        <section class="px-4">
          <div class="max-w-5xl mx-auto">
            <div class="masonry-grid">
              ${artworks.map(a => artCard(a, safe)).join('')}
            </div>
          </div>
        </section>`;
      return;
    }

    // Home view — Netflix horizontal rows by category
    const groups = {};
    artworks.forEach(a => {
      if (!groups[a.category]) groups[a.category] = [];
      groups[a.category].push(a);
    });

    container.innerHTML = Object.entries(groups).map(([cat, items]) => `
      <section class="px-4">
        <div class="max-w-5xl mx-auto">
          <h3 class="text-lg font-bold mb-3 text-creo-mint">${safe(cat)}</h3>
          <div class="flex gap-3 overflow-x-auto cine-scrollbar pb-3">

    return `
      <div class="masonry-item card-hover rounded-xl overflow-hidden bg-white/5 cursor-pointer group" onclick="openViewer(allArtworks.find(x=>x.id==='${a.id}'))">
        <div class="relative overflow-hidden rounded-t-xl">
          <img src="${safe(a.image)}" alt="${safe(a.title)}" class="w-full object-cover" loading="lazy">
          ${rankBadge}
          <div class="absolute inset-0 bg-black/0 group-hover:bg-black/30 transition-all duration-300 flex items-center justify-center">
            <div class="w-10 h-10 rounded-full bg-creo-mint/0 group-hover:bg-creo-mint/90 flex items-center justify-center transition opacity-0 group-hover:opacity-100">
              <svg class="w-5 h-5 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"/></svg>
            </div>
          </div>
        </div>
        <div class="p-2.5">
          <div class="flex items-start gap-2">
            <img src="${safe(a.artistAvatar || 'https://picsum.photos/seed/' + a.artistUsername + '/100/100')}" class="w-7 h-7 rounded-full object-cover flex-shrink-0 mt-0.5" alt="">
            <div class="flex-1 min-w-0">
              <h4 class="text-xs font-semibold leading-tight line-clamp-2">${safe(a.title)}</h4>
              <p class="text-[10px] text-gray-400 mt-0.5">${safe(a.artist)}</p>
              <span class="inline-block text-[9px] bg-white/10 text-gray-400 px-1.5 py-0.5 rounded mt-1">${safe(a.medium)}</span>
              <div class="flex items-center gap-2 mt-1">
                <span class="flex items-center gap-0.5 text-[9px] text-gray-500"><img src="assets/logo-icon.png" class="w-3 h-3 rounded-full opacity-60">${a.creos || 0}</span>
                <span class="flex items-center gap-0.5 text-[9px] text-gray-500"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>${a.shares || 0}</span>
                <span class="flex items-center gap-0.5 text-[9px] text-gray-500"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>${a.views || 0}</span>
              </div>
            </div>
          </div>
        </div>
      </div>`;
  }

  /* ── Search ────────────────────────────────────────────── */
  function searchArt(query) {
    const q = query.toLowerCase().trim();
    if (!q) { renderAll(); document.getElementById('hero-section').classList.remove('hidden'); return; }
    const filtered = allArtworks.filter(a =>
      a.title.toLowerCase().includes(q) || a.artist.toLowerCase().includes(q) ||
      a.description.toLowerCase().includes(q) || a.category.toLowerCase().includes(q) ||
      a.medium.toLowerCase().includes(q) || (a.tags || []).some(t => t.toLowerCase().includes(q))
    );
    document.getElementById('hero-section').classList.add('hidden');
    const safe = typeof esc === 'function' ? esc : s => s;
    const container = document.getElementById('content-rows');
    if (filtered.length === 0) {
      container.innerHTML = `<div class="text-center py-12 text-gray-500"><p class="text-sm">No se encontraron obras para "${safe(q)}"</p></div>`;
      return;
    }
    container.innerHTML = `
      <section class="px-4">
        <div class="max-w-5xl mx-auto">
          <p class="text-xs text-gray-500 mb-4">${filtered.length} resultado${filtered.length !== 1 ? 's' : ''} para "${safe(q)}"</p>
          <div class="masonry-grid">
            ${filtered.map(a => artCard(a, safe)).join('')}
          </div>
        </div>
      </section>`;
  }

  /* ── Art Viewer Modal (Lightbox) ───────────────────────── */
  function openViewer(artwork) {
    if (!artwork) return;
    currentViewingArt = artwork;
    const safe = typeof esc === 'function' ? esc : s => s;

    document.getElementById('viewer-image').src = artwork.image;
    document.getElementById('viewer-image').alt = artwork.title;
    document.getElementById('viewer-image').classList.remove('zoomed-img', 'zoom-out');
    document.getElementById('viewer-image').classList.add('zoom-in');
    document.getElementById('viewer-title').textContent = artwork.title;
    document.getElementById('viewer-artist').textContent = 'por ' + artwork.artist;
    document.getElementById('viewer-medium-badge').textContent = artwork.medium;
    document.getElementById('viewer-dimensions').textContent = artwork.dimensions;
    document.getElementById('viewer-year').textContent = artwork.year;
    document.getElementById('viewer-desc').textContent = artwork.description;
    document.getElementById('viewer-creos').textContent = artwork.creos || 0;
    document.getElementById('viewer-shares').textContent = artwork.shares || 0;
    document.getElementById('viewer-views').textContent = artwork.views || 0;
    document.getElementById('viewer-comments-count').textContent = artwork.comments || 0;
    document.getElementById('viewer-tip-btn').href = 'profile.html?u=' + encodeURIComponent(artwork.artistUsername);
    document.getElementById('viewer-comment').value = '';

    // Tags
    const tagsContainer = document.getElementById('viewer-tags');
    tagsContainer.innerHTML = (artwork.tags || []).map(t => `<span class="text-[10px] bg-white/8 text-gray-400 px-2 py-0.5 rounded-full">#${safe(t)}</span>`).join('');

    // Demo comments
    renderViewerComments(artwork);

    document.getElementById('viewer-modal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }

  function closeViewer() {
    document.getElementById('viewer-modal').classList.add('hidden');
    document.body.style.overflow = '';
    currentViewingArt = null;
  }

  function toggleZoom(img) {
    if (img.classList.contains('zoomed-img')) {
      img.classList.remove('zoomed-img', 'zoom-out');
      img.classList.add('zoom-in');
    } else {
      img.classList.add('zoomed-img', 'zoom-out');
      img.classList.remove('zoom-in');
    }
  }

  function renderViewerComments(artwork) {
    const container = document.getElementById('viewer-comments');
    const safe = typeof esc === 'function' ? esc : s => s;
    const demoComments = [
      { user: 'Sofia L.', text: 'Que trabajo tan hermoso, los detalles son increibles' },
      { user: 'Marco R.', text: 'Esto es arte de verdad, hecho con el alma' },
      { user: 'Ana P.', text: 'Me encanta la tecnica, se nota la dedicacion' }
    ];
    const show = demoComments.slice(0, Math.min(artwork.comments || 2, 3));
    container.innerHTML = show.map(c => `
      <div class="flex items-start gap-2 text-xs">
        <span class="font-semibold text-creo-mint flex-shrink-0">${safe(c.user)}</span>
        <span class="text-gray-400">${safe(c.text)}</span>
      </div>
    `).join('');
  }

  function postComment() {
    const input = document.getElementById('viewer-comment');
    const text = input.value.trim();
    if (!text) return;
    if (!galeriaCurrentUser) { showToast('Inicia sesion para comentar', 'error'); return; }
    const container = document.getElementById('viewer-comments');
    const safe = typeof esc === 'function' ? esc : s => s;
    container.insertAdjacentHTML('afterbegin', `
      <div class="flex items-start gap-2 text-xs animate-fade-in">
        <span class="font-semibold text-creo-mint flex-shrink-0">Tu</span>
        <span class="text-gray-400">${safe(text)}</span>
      </div>
    `);
    input.value = '';
    if (currentViewingArt) {
      currentViewingArt.comments = (currentViewingArt.comments || 0) + 1;
      document.getElementById('viewer-comments-count').textContent = currentViewingArt.comments;
    }
    showToast('Comentario publicado', 'success');
  }

  /* ── Actions ──────────────────────────────────────────── */
  function shareToCommunity() {
    if (!currentViewingArt) return;
    if (!galeriaCurrentUser) { showToast('Inicia sesion para compartir', 'error'); return; }
    currentViewingArt.shares = (currentViewingArt.shares || 0) + 1;
    document.getElementById('viewer-shares').textContent = currentViewingArt.shares;
    showToast('Compartido en la Comunidad', 'success');
  }

  function shareExternal() {
    if (!currentViewingArt) return;
    const shareData = {
      title: currentViewingArt.title + ' — CREO Galeria',
      text: currentViewingArt.title + ' por ' + currentViewingArt.artist + '. Descubre arte genuino en CREO.',
      url: window.location.href
    };
    if (navigator.share) {
      navigator.share(shareData).catch(() => {});
    } else {
      navigator.clipboard.writeText(shareData.url).then(() => {
        showToast('Enlace copiado al portapapeles', 'success');
      }).catch(() => {
        showToast('No se pudo copiar el enlace', 'error');
      });
    }
  }

  function tagArtist() {
    if (!currentViewingArt) return;
    if (!galeriaCurrentUser) { showToast('Inicia sesion para etiquetar', 'error'); return; }
    showToast('Artista @' + currentViewingArt.artistUsername + ' etiquetado', 'success');
  }

  /* ── Upload Modal ─────────────────────────────────────── */
  function openUploadModal() {
    document.getElementById('upload-modal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }

  function closeUploadModal() {
    document.getElementById('upload-modal').classList.add('hidden');
    document.body.style.overflow = '';
  }

  async function submitGaleriaUpload() {
    const title = document.getElementById('upload-title').value.trim();
    const artist = document.getElementById('upload-artist').value.trim();
    const cat = document.getElementById('upload-category').value;
    const medium = document.getElementById('upload-medium').value.trim();
    const year = document.getElementById('upload-year').value.trim();
    const dimensions = document.getElementById('upload-dimensions').value.trim();
    const desc = document.getElementById('upload-desc').value.trim();
    const imageFile = document.getElementById('upload-image').files[0];

    if (!title) { showToast('Agrega un titulo', 'error'); return; }
    if (!imageFile) { showToast('Selecciona una imagen', 'error'); return; }
    if (!cat) { showToast('Selecciona una categoria', 'error'); return; }

    const btn = document.getElementById('upload-submit-btn');
    btn.disabled = true; btn.textContent = 'Subiendo...';

    try {
      const { data: { user } } = await sb.auth.getUser();
      if (!user) throw new Error('No autenticado');
      const image_url = await uploadToStorage(imageFile, 'galeria', 20);
      if (!image_url) throw new Error('Error al subir imagen');
      const { error } = await sb.from('galeria').insert({
        creator_id: user.id, title, description: desc || null, image_url,
        category: cat, medium: medium || null, dimensions: dimensions || null, year: year || null
      });
      if (error) throw error;
      showToast('Publicado en Galeria', 'success');
      closeUploadModal();
      ['upload-title','upload-artist','upload-category','upload-medium','upload-year','upload-dimensions','upload-desc','upload-image'].forEach(id => document.getElementById(id).value = '');
      await loadArtworks(); renderAll();
    } catch (e) {
      showToast('Error: ' + (e.message || ''), 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Publicar';
    }
  }

  // Close modals on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeViewer(); closeUploadModal(); }
  });
  </script>
</body>
</html>
