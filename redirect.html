<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CREO â€” Verificando...</title>
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <link rel="stylesheet" href="tailwind.min.css?v=20260719">
  <style>
    input, select, textarea { font-size: max(16px, 1em) !important; }
    .pulse-ring { animation: pulseRing 1.5s ease-out infinite; }
    @keyframes pulseRing { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.6); opacity: 0; } }
  </style>
</head>
<body class="bg-white text-gray-900 flex items-center justify-center min-h-screen text-center transition-colors duration-300">
  <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-200 max-w-sm transition-colors">
    <div class="mb-4">
      <div class="w-16 h-16 rounded-full bg-white flex items-center justify-center mx-auto"><img src="assets/logo-icon.png" alt="CREO" class="w-12 h-12 rounded-full object-contain"></div>
    </div>
    <h1 id="title" class="text-xl font-bold text-gray-900 mb-2">Verificando tu cuenta...</h1>
    <p id="desc" class="text-gray-500 text-sm">Por favor espera mientras confirmamos tu identidad</p>
    <p id="status-msg" class="mt-4 text-sm font-medium"></p>
    <div id="spinner" class="mt-4 flex justify-center">
      <div class="relative w-6 h-6">
        <div class="absolute inset-0 rounded-full bg-creo-mint opacity-30 pulse-ring"></div>
        <div class="absolute inset-1 rounded-full bg-creo-mint"></div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="shared.js?v=2"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const status = urlParams.get('status') || urlParams.get('stripe');

    function setUI(title, desc) {
      document.getElementById('title').textContent = title;
      document.getElementById('desc').textContent = desc;
    }

    async function ensureProfile(user) {
      const { data: profile } = await sb.from('profiles').select('id, username').eq('id', user.id).single();
      if (profile) return profile;
      const displayName = user.user_metadata?.full_name || user.user_metadata?.name || (user.email ? user.email.split('@')[0] : 'user');
      const username = 'user_' + Math.floor(Math.random() * 100000);
      const { data: newProfile } = await sb.from('profiles').insert([{
        id: user.id, username, display_name: displayName,
        avatar_url: user.user_metadata?.avatar_url || null
      }]).select('id, username').single();
      return newProfile;
    }

    async function handleAuthRedirect(user) {
      if (!user) {
        setUI('âŒ Error', 'No se pudo verificar tu cuenta');
        setTimeout(() => { window.location.href = 'comunidad.html'; }, 2000);
        return;
      }

      await ensureProfile(user);

      const isAdminLogin = localStorage.getItem('creo-admin-login') === '1';
      localStorage.removeItem('creo-admin-login');

      if (isAdmin(user.email) && isAdminLogin) {
        sessionStorage.setItem('admin_mode', 'true');
        setUI('ðŸ›¡ï¸ Acceso Admin Verificado', 'Redirigiendo al panel...');
        document.getElementById('spinner').classList.add('hidden');
        setTimeout(() => { window.location.href = 'admin.html'; }, 1000);
      } else {
        setUI('ðŸ‘‹ Â¡Bienvenido!', 'Redirigiendo a la comunidad...');
        document.getElementById('spinner').classList.add('hidden');
        setTimeout(() => { window.location.href = 'comunidad.html'; }, 1000);
      }
    }

    (async function() {
      if (status === 'success') {
        setUI('ðŸ’³ Verificando conexiÃ³n con Stripe...', 'Confirmando tu cuenta...');
        try {
          const { data: { session } } = await sb.auth.getSession();
          if (session) {
            const res = await fetch(SUPABASE_URL + '/functions/v1/check-stripe-status', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token }
            });
            const result = await res.json();
            if (result.status === 'complete') {
              setUI('âœ… Â¡Stripe Conectado!', 'Tu cuenta estÃ¡ lista para recibir pagos.');
            } else if (result.status === 'incomplete') {
              setUI('âš ï¸ Stripe Conectado', 'ConfiguraciÃ³n casi lista. Completa los datos pendientes desde tu panel.');
            } else {
              setUI('âœ… Stripe Conectado', 'Redirigiendo al panel...');
            }
          } else {
            setUI('âœ… Â¡Stripe Conectado!', 'Redirigiendo al panel...');
          }
        } catch (_) {
          setUI('âœ… Â¡Stripe Conectado!', 'Redirigiendo al panel...');
        }
        document.getElementById('spinner').classList.add('hidden');
        setTimeout(() => { window.location.href = 'index.html?stripe=success'; }, 1500);
        return;
      }

      if (status === 'refresh') {
        setUI('âš ï¸ ConfiguraciÃ³n incompleta', 'La configuraciÃ³n de Stripe no se completÃ³. Puedes reintentar desde tu panel.');
        document.getElementById('spinner').classList.add('hidden');
        setTimeout(() => { window.location.href = 'index.html'; }, 2000);
        return;
      }

      // Listen for auth state change FIRST â€” Supabase auto-detects OAuth tokens
      // in the URL (both ?code= for PKCE and #access_token= for implicit flow)
      let handled = false;

      const { data: { subscription } } = sb.auth.onAuthStateChange(async (event, session) => {
        if (handled) return;
        if ((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED' || event === 'INITIAL_SESSION') && session?.user) {
          handled = true;
          subscription.unsubscribe();
          await handleAuthRedirect(session.user);
        }
      });

      // Also check if session already exists (user was already logged in)
      await new Promise(resolve => setTimeout(resolve, 500));
      if (!handled) {
        const { data: { session } } = await sb.auth.getSession();
        if (session?.user) {
          handled = true;
          subscription.unsubscribe();
          await handleAuthRedirect(session.user);
          return;
        }
      }

      // Final fallback â€” if nothing detected after 8 seconds, redirect
      setTimeout(async () => {
        if (handled) return;
        const { data: { user } } = await sb.auth.getUser();
        if (user) {
          handled = true;
          subscription.unsubscribe();
          await handleAuthRedirect(user);
        } else {
          setUI('ðŸ”’ SesiÃ³n no detectada', 'Redirigiendo...');
          setTimeout(() => { window.location.href = 'comunidad.html'; }, 1500);
        }
      }, 8000);
    })();
  </script>
</body>
</html>
