<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CREO — Verificando...</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { creo: { purple: '#1a0a3e', mint: '#33f0b0' } } } }
    }
  </script>
  <style>
    .pulse-ring { animation: pulseRing 1.5s ease-out infinite; }
    @keyframes pulseRing { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.6); opacity: 0; } }
  </style>
</head>
<body class="bg-white text-gray-900 flex items-center justify-center min-h-screen text-center transition-colors duration-300">
  <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-200 max-w-sm transition-colors">
    <div class="mb-4">
      <div class="w-16 h-16 rounded-full bg-white flex items-center justify-center mx-auto"><img src="assets/logo-icon.png" alt="CREO" class="w-12 h-12 rounded-full object-contain"></div>
    </div>
    <h1 id="title" class="text-xl font-bold text-gray-900 mb-2">Verificando tu cuenta...</h1>
    <p id="desc" class="text-gray-500 text-sm">Por favor espera mientras confirmamos tu identidad</p>
    <p id="status-msg" class="mt-4 text-sm font-medium"></p>
    <div id="spinner" class="mt-4 flex justify-center">
      <div class="relative w-6 h-6">
        <div class="absolute inset-0 rounded-full bg-creo-mint opacity-30 pulse-ring"></div>
        <div class="absolute inset-1 rounded-full bg-creo-mint"></div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="shared.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const status = urlParams.get('status');

    function setStatus(title, desc, color) {
      document.getElementById('title').textContent = title;
      document.getElementById('desc').textContent = desc;
      if (color) {
        document.getElementById('status-msg').textContent = desc;
        document.getElementById('status-msg').className = 'mt-4 text-sm font-medium ' + color;
      }
    }

    async function handleAuthRedirect(user) {
      if (!user) {
        setStatus('Error', 'No se pudo verificar tu cuenta');
        setTimeout(() => { window.location.href = 'index.html'; }, 2000);
        return;
      }

      let { data: profile } = await sb.from('profiles').select('id').eq('id', user.id).single();
      if (!profile) {
        const displayName = user.user_metadata?.full_name || user.email.split('@')[0];
        const username = 'user_' + Math.floor(Math.random() * 100000);
        await sb.from('profiles').insert([{ id: user.id, username, display_name: displayName, avatar_url: user.user_metadata?.avatar_url || null }]);
      }

      const isAdminLogin = localStorage.getItem('creo-admin-login') === '1';

      if (isAdmin(user.email)) {
        localStorage.removeItem('creo-admin-login');
        sessionStorage.setItem('admin_mode', 'true');
        setStatus('Acceso Admin Verificado', 'Redirigiendo al panel...');
        window.location.href = 'index.html';
      } else {
        localStorage.removeItem('creo-admin-login');
        setStatus('¡Cuenta verificada!', 'Redirigiendo a tu panel...');
        window.location.href = 'index.html?welcome=1';
      }
    }

    if (status === 'success') {
      const isUpgrade = localStorage.getItem('creo-cocreator-upgrade') === '1';
      if (isUpgrade) {
        setStatus('¡Ahora eres Creador!', 'Tu cuenta ha sido actualizada. Redirigiendo a tu perfil...', 'text-green-600');
        localStorage.removeItem('creo-cocreator-upgrade');
        (async () => {
          const { data: { user } } = await sb.auth.getUser();
          if (user) {
            const { data: profile } = await sb.from('profiles').select('username').eq('id', user.id).single();
            await sb.from('profiles').update({ account_type: 'creator', verification_status: 'approved' }).eq('id', user.id);
            const username = profile?.username || '';
            setTimeout(() => { window.location.href = 'profile.html?u=' + encodeURIComponent(username); }, 2500);
          } else {
            setTimeout(() => { window.location.href = 'index.html'; }, 2500);
          }
        })();
      } else {
        setStatus('Stripe Verificado', 'Cuenta de Stripe conectada. Redirigiendo...', 'text-green-600');
        setTimeout(() => { window.location.href = 'index.html'; }, 2500);
      }
    } else if (status === 'refresh') {
      setStatus('Incompleto', 'Onboarding incompleto. Redirigiendo para reintentar...', 'text-yellow-600');
      setTimeout(() => { window.location.href = 'index.html'; }, 2500);
    } else {
      // Handle auth callback — works for magic link (PKCE code), OAuth, and hash tokens
      let handled = false;

      // Method 1: Check for hash-based tokens (older Supabase flow)
      const hashParams = new URLSearchParams(window.location.hash.substring(1));
      const hasHashToken = hashParams.get('access_token');

      // Method 2: Check for PKCE code (Supabase v2 magic link flow)
      const hasCode = urlParams.get('code');

      if (hasHashToken || hasCode) {
        setStatus('Verificando...', 'Confirmando tu identidad con Supabase...');

        // Let Supabase client handle the token exchange
        // For PKCE: exchangeCodeForSession will be called by the client
        // For hash: the client detects tokens automatically
        if (hasCode) {
          try {
            const { data, error } = await sb.auth.exchangeCodeForSession(hasCode);
            if (error) {
              setStatus('Error de autenticación', error.message);
              setTimeout(() => { window.location.href = 'index.html'; }, 3000);
            } else if (data.user) {
              handled = true;
              await handleAuthRedirect(data.user);
            }
          } catch (e) {
            setStatus('Error', e.message);
            setTimeout(() => { window.location.href = 'index.html'; }, 3000);
          }
        }

        if (!handled && hasHashToken) {
          try {
            const { data: { user } } = await sb.auth.getUser();
            if (user) {
              handled = true;
              await handleAuthRedirect(user);
            }
          } catch (e) {}
        }
      }

      if (!handled) {
        // Method 3: Listen for auth state change (catches all flows)
        const { data: { subscription } } = sb.auth.onAuthStateChange(async (event, session) => {
          if (handled) return;
          if ((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && session?.user) {
            handled = true;
            subscription.unsubscribe();
            await handleAuthRedirect(session.user);
          }
        });

        // Method 4: Check if already signed in
        const { data: { session } } = await sb.auth.getSession();
        if (!handled && session?.user) {
          handled = true;
          subscription.unsubscribe();
          await handleAuthRedirect(session.user);
        }

        // Timeout fallback — if nothing triggers in 5 seconds, try one more session check then redirect
        if (!handled) {
          setTimeout(async () => {
            if (handled) return;
            const { data: { user } } = await sb.auth.getUser();
            if (user) {
              handled = true;
              subscription.unsubscribe();
              await handleAuthRedirect(user);
            } else {
              setStatus('Sesión no detectada', 'Redirigiendo...');
              window.location.href = 'index.html';
            }
          }, 5000);
        }
      }
    }
  </script>
</body>
</html>
