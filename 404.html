<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CREO — Página no encontrada</title>
  <meta name="theme-color" content="#1a0a3e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CREO">
  <link rel="icon" href="assets/logo-icon.png" type="image/png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1a0a3e 0%, #2d1b69 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 400px; }
    .code { font-size: 5rem; font-weight: 900; color: #33f0b0; line-height: 1; margin-bottom: 0.5rem; }
    h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.75rem; }
    p { font-size: 0.9rem; color: rgba(255,255,255,0.7); line-height: 1.5; margin-bottom: 2rem; }
    .home-btn {
      display: inline-block;
      background: #33f0b0;
      color: #1a0a3e;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 0.75rem 2rem;
      border-radius: 9999px;
      border: none;
      cursor: pointer;
      text-decoration: none;
    }
    .home-btn:active { transform: scale(0.96); }
  </style>
</head>
<body>
  <div class="container">
    <div class="code" aria-hidden="true">404</div>
    <h1><span aria-label="confundido">😵‍💫</span> Página no encontrada</h1>
    <p>La página que buscas no existe o fue movida. Regresa al inicio para seguir explorando CREO.</p>
    <a href="/creo/explore.html" class="home-btn"><span aria-label="casa">🏠</span> Ir al inicio</a>
  </div>
</body>
</html>
