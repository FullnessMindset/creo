<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CREO — Biblioteca</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/logo-icon.png" type="image/png">
  <meta name="theme-color" content="#0a0a0a">
  <meta property="og:title" content="CREO — Biblioteca">
  <meta property="og:description" content="Biblioteca digital de la comunidad. Poesia, novela, cuento y ensayo de creadores locales. Lee gratis, apoya con Creo en Ti.">
  <meta property="og:image" content="https://fullnessmindset.github.io/creo/assets/logo-icon.png">
  <meta property="og:url" content="https://fullnessmindset.github.io/creo/biblioteca.html">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { creo: { purple: '#1a0a3e', light: '#2d1b69', mint: '#33f0b0', mintDark: '#28c48e' } } } }
    }
  </script>
  <style>
    body { overscroll-behavior: contain; background: #0a0a0a; }
    .bib-scrollbar::-webkit-scrollbar { height: 0; width: 0; }
    .bib-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
    .card-hover { transition: transform 0.25s ease; }
    .card-hover:hover { transform: scale(1.03); }
    .pill-active { background: #33f0b0; color: #0a0a0a; font-weight: 600; }
    .pill-inactive { background: rgba(255,255,255,0.08); color: #ccc; }
    .pill-inactive:hover { background: rgba(255,255,255,0.15); }
    .hero-gradient { background: linear-gradient(to top, #0a0a0a 0%, transparent 60%); }
    .modal-backdrop { background: rgba(0,0,0,0.95); }
    @keyframes fade-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fade-in 0.4s ease-out; }
    @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(51,240,176,0.4); } 50% { box-shadow: 0 0 20px 4px rgba(51,240,176,0.2); } }
    .read-btn { animation: pulse-glow 2s infinite; }
    .sidebar-link { transition: background 0.15s, color 0.15s; }
    .sidebar-link:hover { background: rgba(255,255,255,0.08); }
    .sidebar-link.active { background: rgba(51,240,176,0.12); color: #33f0b0; }
    .reading-progress { transition: width 0.3s ease; }
  </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">
  <script src="shared.js"></script>

  <!-- Cookie Consent -->
  <div id="cookie-banner" class="fixed bottom-20 left-4 right-4 z-[200] hidden">
    <div class="max-w-lg mx-auto bg-[#1a1a1a] border border-white/10 rounded-2xl p-4 flex flex-col sm:flex-row items-center gap-3 shadow-2xl">
      <p class="text-xs text-gray-300 flex-1">Usamos cookies para mejorar tu experiencia. Al continuar, aceptas nuestra politica de privacidad.</p>
      <button onclick="acceptCookies()" class="bg-creo-mint text-black text-xs font-bold px-4 py-2 rounded-full hover:bg-creo-mintDark transition flex-shrink-0">Aceptar</button>
    </div>
  </div>

  <!-- Header -->
  <header class="fixed top-0 left-0 right-0 z-50 bg-[#0a0a0a]/90 backdrop-blur-md border-b border-white/5">
    <div class="px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button onclick="toggleSidebar()" class="p-1.5 rounded-lg hover:bg-white/10 transition lg:hidden">
          <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <a href="index.html" class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center flex-shrink-0">
            <img src="assets/logo-icon.png" alt="CREO" class="w-6 h-6 rounded-full object-contain">
          </div>
        </a>
        <h1 class="text-lg font-bold tracking-[0.2em] text-creo-mint">BIBLIOTECA</h1>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-white/10 transition">
          <svg class="w-5 h-5 text-gray-400 theme-icon-sun" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          <svg class="w-5 h-5 text-gray-300 theme-icon-moon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
        <button id="bib-upload-btn" class="hidden bg-creo-mint text-black font-bold text-sm px-4 py-1.5 rounded-full hover:bg-creo-mintDark transition flex items-center gap-1" onclick="openUploadModal()">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
          Publicar
        </button>
      </div>
    </div>
  </header>

  <!-- Sidebar Overlay (mobile) -->
  <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-40 hidden lg:hidden" onclick="toggleSidebar()"></div>

  <!-- Left Sidebar -->
  <aside id="sidebar" class="fixed top-14 left-0 bottom-0 w-56 bg-[#0f0f0f] border-r border-white/5 z-40 overflow-y-auto bib-scrollbar -translate-x-full lg:translate-x-0 transition-transform duration-200">
    <nav class="py-4 space-y-1 px-2">
      <button onclick="setView('home')" data-view="home" class="sidebar-link active w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Inicio
      </button>
      <button onclick="setView('trending')" data-view="trending" class="sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
        Favoritos del Pueblo
      </button>
      <button onclick="setView('recent')" data-view="recent" class="sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Recien Llegados
      </button>
    </nav>

    <!-- Categories -->
    <div class="px-4 pt-2 pb-3">
      <p class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold mb-2">Categorias</p>
      <div id="sidebar-categories" class="space-y-0.5"></div>
    </div>

    <!-- Top Autores -->
    <div class="px-4 pt-2 pb-20">
      <p class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold mb-3">Top Autores</p>
      <div id="top-authors" class="space-y-2"></div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="pt-16 pb-24 lg:ml-56">

    <!-- Search Bar -->
    <section class="px-4 py-4">
      <div class="max-w-5xl mx-auto">
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input id="bib-search" type="text" placeholder="Buscar libros, autores..."
            class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-4 py-2.5 text-sm text-white placeholder-gray-500 focus:ring-2 focus:ring-creo-mint focus:border-transparent outline-none"
            oninput="searchBooks(this.value)">
        </div>
      </div>
    </section>

    <!-- Featured Hero -->
    <section id="hero-section" class="px-4 mb-8">
      <div class="max-w-5xl mx-auto">
        <div id="hero-card" class="relative rounded-xl overflow-hidden cursor-pointer group" onclick="openFeaturedReader()"></div>
      </div>
    </section>

    <!-- Content Area -->
    <div id="content-rows" class="space-y-8"></div>

  </main>

  <!-- Upload Modal -->
  <div id="upload-modal" class="fixed inset-0 z-[100] hidden modal-backdrop flex items-center justify-center p-4">
    <div class="bg-[#1a1a1a] rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto animate-fade-in border border-white/10">
      <div class="flex items-center justify-between p-5 border-b border-white/10">
        <h2 class="text-lg font-bold">Publicar en Biblioteca</h2>
        <button onclick="closeUploadModal()" class="text-gray-400 hover:text-white transition">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="p-5 space-y-4">
        <div>
          <label class="block text-sm text-gray-400 mb-1">Titulo *</label>
          <input id="upload-title" type="text" placeholder="Titulo del libro" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-500 focus:ring-2 focus:ring-creo-mint focus:border-transparent outline-none">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Autor / Creador *</label>
          <input id="upload-author" type="text" placeholder="@usuario del autor" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-500 focus:ring-2 focus:ring-creo-mint focus:border-transparent outline-none">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Categoria *</label>
          <select id="upload-category" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2.5 text-sm text-white focus:ring-2 focus:ring-creo-mint outline-none appearance-none">
            <option value="" class="bg-[#1a1a1a]">Seleccionar categoria</option>
            <option value="Poesia" class="bg-[#1a1a1a]">Poesia</option>
            <option value="Novela" class="bg-[#1a1a1a]">Novela</option>
            <option value="Cuento" class="bg-[#1a1a1a]">Cuento</option>
            <option value="Ensayo" class="bg-[#1a1a1a]">Ensayo</option>
            <option value="Historia" class="bg-[#1a1a1a]">Historia</option>
            <option value="Ciencia" class="bg-[#1a1a1a]">Ciencia</option>
            <option value="Arte" class="bg-[#1a1a1a]">Arte</option>
            <option value="Autoayuda" class="bg-[#1a1a1a]">Autoayuda</option>
          </select>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Descripcion</label>
          <textarea id="upload-desc" rows="3" placeholder="De que trata tu libro..." class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-500 focus:ring-2 focus:ring-creo-mint focus:border-transparent outline-none resize-none"></textarea>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Portada (imagen) *</label>
          <input id="upload-cover" type="file" accept="image/*" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm text-gray-400 file:mr-3 file:py-1.5 file:px-3 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-creo-mint/10 file:text-creo-mint hover:file:bg-creo-mint/20">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Archivo (PDF o texto)</label>
          <input id="upload-file" type="file" accept=".pdf,.txt,.epub" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm text-gray-400 file:mr-3 file:py-1.5 file:px-3 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-creo-mint/10 file:text-creo-mint hover:file:bg-creo-mint/20">
        </div>
        <button id="upload-submit-btn" onclick="submitBookUpload()" class="w-full bg-creo-mint text-black font-bold text-sm py-3 rounded-full hover:bg-creo-mintDark transition mt-2">Publicar</button>
      </div>
    </div>
  </div>

  <!-- Book Reader Modal -->
  <div id="reader-modal" class="fixed inset-0 z-[100] hidden modal-backdrop flex flex-col">
    <!-- Reading progress bar -->
    <div class="fixed top-0 left-0 right-0 h-1 bg-white/10 z-[110]">
      <div id="reading-progress" class="h-full bg-creo-mint reading-progress" style="width: 0%"></div>
    </div>

    <!-- Close button -->
    <button onclick="closeReader()" class="fixed top-4 right-4 z-[110] text-white/60 hover:text-white transition">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>

    <!-- Reader content -->
    <div class="flex-1 overflow-y-auto bib-scrollbar pt-8 pb-32">
      <div class="max-w-4xl mx-auto px-4 py-8">
        <div class="flex flex-col md:flex-row gap-8 animate-fade-in">
          <!-- Book cover -->
          <div class="flex-shrink-0 mx-auto md:mx-0">
            <img id="reader-cover" src="" alt="" class="w-48 md:w-56 rounded-xl shadow-2xl">
          </div>
          <!-- Book info -->
          <div class="flex-1 text-center md:text-left">
            <h2 id="reader-title" class="text-2xl md:text-3xl font-bold"></h2>
            <p id="reader-author" class="text-gray-400 mt-2">por</p>
            <p id="reader-desc" class="text-gray-500 text-sm mt-3 max-w-md"></p>
            <div class="flex items-center justify-center md:justify-start gap-4 mt-4">
              <span id="reader-pages" class="text-xs text-gray-500 bg-white/5 px-3 py-1 rounded-full"></span>
              <span id="reader-category" class="text-xs text-creo-mint bg-creo-mint/10 px-3 py-1 rounded-full font-semibold"></span>
            </div>
            <div class="flex items-center justify-center md:justify-start gap-4 mt-3">
              <span class="flex items-center gap-1 text-[11px] text-gray-400"><img src="assets/logo-icon.png" class="w-3.5 h-3.5 rounded-full opacity-70"><span id="reader-creos">0</span></span>
              <span class="flex items-center gap-1 text-[11px] text-gray-400"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg><span id="reader-shares">0</span></span>
              <span class="flex items-center gap-1 text-[11px] text-gray-400"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg><span id="reader-reads">0</span></span>
            </div>
          </div>
        </div>

        <!-- Chapter navigation tabs -->
        <div class="mt-10 border-b border-white/10 pb-2">
          <div class="flex items-center gap-2 overflow-x-auto bib-scrollbar" id="chapter-tabs"></div>
        </div>

        <!-- Chapter content -->
        <div id="chapter-content" class="mt-8 text-gray-300 leading-relaxed text-base md:text-lg max-w-2xl mx-auto"></div>

        <!-- Chapter nav buttons -->
        <div class="flex items-center justify-between mt-10 max-w-2xl mx-auto">
          <button id="prev-chapter-btn" onclick="prevChapter()" class="flex items-center gap-2 text-sm text-gray-400 hover:text-creo-mint transition px-4 py-2 rounded-full bg-white/5 hover:bg-white/10">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            Anterior
          </button>
          <span id="chapter-indicator" class="text-xs text-gray-500"></span>
          <button id="next-chapter-btn" onclick="nextChapter()" class="flex items-center gap-2 text-sm text-gray-400 hover:text-creo-mint transition px-4 py-2 rounded-full bg-white/5 hover:bg-white/10">
            Siguiente
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Action bar -->
    <div class="fixed bottom-0 left-0 right-0 bg-[#0a0a0a]/95 backdrop-blur-md border-t border-white/10 z-[110] px-4 py-3">
      <div class="max-w-4xl mx-auto flex items-center justify-center gap-2 flex-wrap">
        <a id="reader-tip-btn" href="#" class="bg-creo-mint text-black font-bold text-xs px-4 py-2 rounded-full hover:bg-creo-mintDark transition flex items-center gap-1.5">
          <img src="assets/logo-icon.png" class="w-4 h-4 rounded-full" alt="CREO">
          Creo en Ti
        </a>
        <button onclick="shareToComunnidad()" class="bg-white/10 hover:bg-white/20 text-white text-xs px-4 py-2 rounded-full transition flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          Compartir a Comunidad
        </button>
        <button onclick="shareExternal()" class="bg-white/10 hover:bg-white/20 text-white text-xs px-4 py-2 rounded-full transition flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
          Compartir Externo
        </button>
        <button onclick="openTagAuthor()" class="bg-white/10 hover:bg-white/20 text-white text-xs px-4 py-2 rounded-full transition flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
          Etiquetar Autor
        </button>
      </div>
    </div>
  </div>

  <!-- Share to Community Modal -->
  <div id="share-modal" class="fixed inset-0 z-[120] hidden modal-backdrop flex items-center justify-center p-4">
    <div class="bg-[#1a1a1a] rounded-2xl w-full max-w-md animate-fade-in border border-white/10">
      <div class="flex items-center justify-between p-5 border-b border-white/10">
        <h2 class="text-lg font-bold">Compartir en Comunidad</h2>
        <button onclick="closeShareModal()" class="text-gray-400 hover:text-white transition">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="p-5 space-y-4">
        <textarea id="share-comment" rows="3" placeholder="Que te parecio este libro? Comparte tu opinion con la comunidad..." class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-500 focus:ring-2 focus:ring-creo-mint focus:border-transparent outline-none resize-none"></textarea>
        <button onclick="submitSharePost()" class="w-full bg-creo-mint text-black font-bold text-sm py-3 rounded-full hover:bg-creo-mintDark transition">Compartir</button>
      </div>
    </div>
  </div>

  <!-- Tag Author Modal -->
  <div id="tag-modal" class="fixed inset-0 z-[120] hidden modal-backdrop flex items-center justify-center p-4">
    <div class="bg-[#1a1a1a] rounded-2xl w-full max-w-md animate-fade-in border border-white/10">
      <div class="flex items-center justify-between p-5 border-b border-white/10">
        <h2 class="text-lg font-bold">Etiquetar Autor</h2>
        <button onclick="closeTagModal()" class="text-gray-400 hover:text-white transition">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="p-5 space-y-4">
        <div class="flex items-center gap-3 bg-white/5 rounded-lg p-3">
          <img id="tag-avatar" src="" class="w-10 h-10 rounded-full object-cover">
          <div>
            <p id="tag-author-name" class="text-sm font-semibold"></p>

    { id: 'b1', title: 'Cartas desde el Taller', author: 'Elena Mirabal', authorUsername: 'elenamirabal', authorAvatar: 'https://picsum.photos/seed/autora1/100/100', category: 'Ensayo', cover: 'https://picsum.photos/seed/book1/400/600', pages: 142, description: 'Un epistolario intimo donde una artesana comparte sus reflexiones sobre el oficio, la paciencia y la belleza de crear con las manos.', creos: 89, shares: 34, reads: 312, comments: 21, chapters: [
      { title: 'Primera carta: El barro', content: 'Querida lectora, hoy el taller amaneció en silencio. Solo el torno giraba, lento, como si el barro mismo pidiera tiempo para despertar. He pensado mucho en lo que significa crear algo con las manos — no con prisas, no para vender, sino para dejar una marca honesta en el mundo.\n\nEl barro tiene memoria. Recuerda cada presion, cada caricia, cada duda. Cuando mis dedos tiemblan, la pieza tiembla tambien. Cuando respiro hondo y dejo que mis manos encuentren su ritmo, el barro responde con formas que yo no habia imaginado.\n\nHoy hice un jarron. No es perfecto. Tiene una leve inclinacion hacia la izquierda, como si se asomara a ver quien entra por la puerta. Me gusta. Las cosas perfectas me dan desconfianza.' },
      { title: 'Segunda carta: La espera', content: 'El horno necesita tiempo. No hay forma de apurar el fuego sin romper lo que esta adentro. Esta es quizas la leccion mas dificil del oficio: la espera activa, esa paciencia que no es pasividad sino confianza.\n\nMientras las piezas se cuecen, limpio el taller. Barro en mis uñas, en mi pelo, en las grietas del piso. Mi madre decia que un artesano se reconoce por sus manos, y yo creo que tenia razon. Mis manos cuentan historias que mi boca no sabe narrar.\n\nA veces pienso en los artesanos que vinieron antes que yo — generaciones enteras de manos sabias que transformaron la tierra en arte. Soy un eslabon mas en esa cadena, y eso me llena de una responsabilidad dulce.' },
      { title: 'Tercera carta: El regalo', content: 'Hoy vino una niña al taller. Tenia los ojos enormes y las manos llenas de preguntas. Le di un pedazo de barro y se sento en el suelo a moldear algo. Cuando termino, me mostro una figura: era un pajaro con las alas abiertas.\n\n"Es para ti", me dijo. Y en ese momento entendi que el arte no es lo que hacemos, sino lo que damos. Cada pieza que sale de este taller es una carta que envio al mundo, esperando que alguien la abra y encuentre algo de belleza adentro.\n\nEl taller cierra tarde hoy. La luz del atardecer entra por la ventana y todo se vuelve dorado. Es en estos momentos cuando siento que elegí bien.' }
    ]},
    { id: 'b2', title: 'El Silencio entre Notas', author: 'Andres Quiroga', authorUsername: 'andresquiroga', authorAvatar: 'https://picsum.photos/seed/autor2/100/100', category: 'Novela', cover: 'https://picsum.photos/seed/book2/400/600', pages: 284, description: 'Memorias de un musico que descubre que la musica verdadera vive en los espacios de silencio entre las notas.', creos: 156, shares: 67, reads: 891, comments: 43, chapters: [
      { title: 'I. El primer acorde', content: 'Mi padre tenia un piano desafinado en la sala. No lo tocaba nadie — estaba ahi como un mueble mas, cubierto de polvo y fotografias viejas. Pero a veces, de madrugada, yo bajaba las escaleras y levantaba la tapa.\n\nLas teclas estaban amarillentas. Algunas no sonaban. Pero las que si lo hacian producian un sonido que me hacia sentir que el mundo tenia un orden secreto, una armonia escondida detras del ruido cotidiano.\n\nAprendí a tocar solo. Sin profesor, sin metodo, sin partitura. Solo yo y el piano desafinado, conversando en un idioma que nadie mas entendia. Cada nota erronea era un descubrimiento. Cada silencio entre notas, una revelacion.' },
      { title: 'II. La calle como escenario', content: 'La primera vez que toque en la calle fue por necesidad. No tenia dinero para comer y mi guitarra era lo unico de valor que poseia — pero su valor no estaba en venderla, sino en hacerla sonar.\n\nMe senté en una esquina del centro historico, abri el estuche y empecé a tocar. No recuerdo que toqué. Solo recuerdo que una mujer se detuvo, cerro los ojos, y sonrio. Cuando termino la cancion, dejo unas monedas y se fue sin decir nada.\n\nEse dia aprendi que la musica no necesita aplausos. Necesita presencia. Alguien que escuche, alguien que se detenga en medio del ruido y permita que el silencio hable.' },
      { title: 'III. El silencio', content: 'Los grandes musicos no se miden por las notas que tocan, sino por las que callan. Miles Davis lo sabia. Thelonious Monk lo practicaba. Yo lo descubri una noche de lluvia, cuando mi guitarra se mojo y las cuerdas dejaron de responder.\n\nMe quedé sentado, en silencio, escuchando la lluvia golpear el techo de zinc. Y en ese silencio escuche musica — no notas, no melodias, sino algo mas profundo: el ritmo del mundo respirando.\n\nDesde esa noche, cada vez que toco, dejo espacios. Huecos deliberados donde la musica respira. Y en esos huecos, los que escuchan ponen sus propias emociones, sus recuerdos, sus silencios.' }
    ]},
    { id: 'b3', title: 'Pinceladas de Amanecer', author: 'Sofia del Valle', authorUsername: 'sofiadelvalle', authorAvatar: 'https://picsum.photos/seed/autora3/100/100', category: 'Poesia', cover: 'https://picsum.photos/seed/book3/400/600', pages: 86, description: 'Coleccion de poemas que capturan la luz del amanecer en paisajes rurales, pintados con palabras.', creos: 201, shares: 89, reads: 1240, comments: 56, chapters: [
      { title: 'Luz primera', content: 'Antes del sol,\nel cielo ensaya colores\nque nadie ha nombrado.\n\nRosa de tierra mojada,\nazul de piedra dormida,\namarillo de pan recién hecho.\n\nLos pajaros no cantan todavia.\nEsperan, como yo,\na que la luz termine de vestirse.\n\n---\n\nEl campo huele a cafe\ny a leña encendida.\nAlguien en alguna cocina\nprepara el primer fuego del dia.\n\nYo preparo mis ojos\npara recibir el amanecer\ncomo se recibe a un viejo amigo:\ncon los brazos abiertos\ny sin prisa.' },
      { title: 'Colores de la tierra', content: 'La tierra tiene colores\nque la ciudad ha olvidado.\n\nEl rojo del barro\ndespues de la lluvia.\nEl verde profundo\nde las hojas que nadie poda.\nEl blanco del algodón\nsecándose al sol.\n\n---\n\nPinto con palabras\nlo que mis ojos guardan:\nun atardecer sobre el rio,\nuna montaña envuelta en niebla,\nuna flor silvestre\ncreciendo entre las piedras.\n\nNo necesito lienzo.\nEl poema es mi lienzo.\nNo necesito pincel.\nLas palabras son mis pinceles.' },
      { title: 'Regreso', content: 'Volvi al pueblo\ndespues de muchos años.\n\nLas calles eran mas pequeñas\nde lo que recordaba.\nLa iglesia, mas vieja.\nEl rio, mas delgado.\n\nPero el amanecer\nseguia siendo el mismo:\namplio, generoso,\nderramando luz\nsin pedir nada a cambio.\n\n---\n\nMe senté en la misma piedra\ndonde me sentaba de niña\ny vi salir el sol.\n\nY por un momento,\ntodos los años desaparecieron\ny volvi a ser la niña\nque creia que los amaneceres\neran regalos personales del cielo.' }
    ]},
    { id: 'b4', title: 'Raices de Papel', author: 'Manuel Torrealba', authorUsername: 'manueltorrealba', authorAvatar: 'https://picsum.photos/seed/autor4/100/100', category: 'Cuento', cover: 'https://picsum.photos/seed/book4/400/600', pages: 198, description: 'Cuentos cortos sobre la vida rural, la memoria y las tradiciones que se resisten al olvido.', creos: 134, shares: 55, reads: 678, comments: 30, chapters: [
      { title: 'El cartero del pueblo', content: 'Don Efrain era el cartero del pueblo desde antes de que yo naciera. Caminaba ocho kilometros diarios bajo el sol o la lluvia, con su bolsa de cuero cruzada al pecho y un sombrero que habia sido blanco alguna vez.\n\nNunca llego tarde. Ni siquiera el dia que su esposa murio — dejo las flores en la tumba a las cinco de la mañana y a las siete ya estaba repartiendo cartas como si el mundo no se hubiera roto.\n\n"Las cartas no pueden esperar", me dijo una vez. "Adentro de cada sobre hay alguien esperando noticias, y la esperanza no se puede poner en pausa."\n\nEl dia que llego el correo electronico al pueblo, don Efrain siguio caminando su ruta. Ya no llevaba cartas, pero saludaba a todos como siempre. "Buenos dias, doña Carmen. Buenos dias, don Jose." La gente le sonreia desde las ventanas.\n\nCuando le preguntaron por que seguia caminando si ya no habia cartas, respondio: "Las cartas eran la excusa. Yo siempre vine a traer compañia."' },
      { title: 'La receta de la abuela', content: 'Mi abuela cocinaba sin recetas. "Las manos saben", decia, y sus manos en efecto sabian exactamente cuanta sal, cuanto comino, cuanto amor poner en cada olla.\n\nIntente muchas veces escribir sus recetas. Me sentaba en la cocina con un cuaderno y le pedia que midiera. "Un poquito de esto", decia, echando un puñado generoso. "Una pizca de aquello", y la pizca era mas grande que mi mano entera.\n\nCuando murio, busque el cuaderno. Tenia paginas llenas de notas como: "bastante cebolla", "fuego hasta que huela bien", "revolver con paciencia".\n\nNo eran recetas. Eran poemas.\n\nHoy cocino como ella — sin medir, sin pesar, dejando que las manos recuerden lo que la memoria olvida. Y a veces, solo a veces, la cocina huele como cuando ella estaba viva.' },
      { title: 'El arbol de la plaza', content: 'En la plaza del pueblo hay un samán que tiene mas de doscientos años. Bajo su sombra se han firmado acuerdos, se han declarado amores, se han llorado muertos y se han celebrado fiestas.\n\nMi bisabuelo conto que bajo ese arbol se reunian los fundadores del pueblo a tomar decisiones. No habia alcaldia, no habia oficina — solo el arbol, unas sillas y la voluntad de ponerse de acuerdo.\n\nHoy quieren cortarlo. Dicen que las raices levantan el pavimento, que las hojas tapan el drenaje, que el progreso necesita espacio. Pero el pueblo se ha unido, cada familia ha puesto su firma en un papel que dice: "Este arbol es nuestra memoria. Sin él, somos un pueblo sin historia."\n\nEl arbol sigue en pie. Y cada tarde, los viejos del pueblo se sientan bajo su sombra a contar las mismas historias de siempre, que nunca son las mismas.' }
    ]},
    { id: 'b5', title: 'El Arte de lo Lento', author: 'Isabel Montero', authorUsername: 'isabelmontero', authorAvatar: 'https://picsum.photos/seed/autora5/100/100', category: 'Autoayuda', cover: 'https://picsum.photos/seed/book5/400/600', pages: 164, description: 'Reflexiones sobre el arte de vivir sin prisa, creando con intencion y disfrutando el proceso.', creos: 178, shares: 91, reads: 1456, comments: 62, chapters: [
      { title: 'Elogio de la lentitud', content: 'Vivimos en la era de lo instantaneo. Cafe instantaneo, mensajes instantaneos, resultados instantaneos. Todo debe ser rapido, eficiente, optimizado. Pero hay cosas que no se pueden apurar sin destruirlas.\n\nUn buen queso necesita meses. Un buen vino, años. Una amistad verdadera, toda una vida. Las cosas que importan no aceptan atajos.\n\nPropongo un experimento: mañana, haz una sola cosa con toda tu atencion. Solo una. Puede ser preparar el desayuno, puede ser caminar al trabajo, puede ser escuchar a alguien. Pero hazlo sin prisa, sin telefono, sin la necesidad de estar en otro lugar.\n\nNotaras que el tiempo se estira. Que los detalles aparecen. Que el mundo tiene texturas que la velocidad borra.' },
      { title: 'Crear sin reloj', content: 'Cuando era niña, dibujaba durante horas sin saber cuanto tiempo habia pasado. No habia meta, no habia deadline, no habia "producto final". Solo habia yo, los colores y el papel.\n\nDe adulta perdi eso. Todo tenia que tener proposito, medida, resultado. Mis dibujos se volvieron tareas y las tareas mataron la alegria.\n\nEl dia que decidi crear sin reloj, recupere algo que creia perdido. Me senté con una hoja en blanco y le dije al tiempo: "Hoy no existes." Y dibujé durante tres horas que se sintieron como veinte minutos.\n\nNo produje nada vendible. No generé contenido. No optimicé mi creatividad. Simplemente creé. Y fue suficiente.' },
      { title: 'La paciencia como arte', content: 'La paciencia no es esperar sin hacer nada. La paciencia es trabajar sabiendo que los frutos vendran cuando deban venir, no cuando nosotros queramos.\n\nEl campesino siembra y espera. No tira de la planta para que crezca mas rapido. No le grita al sol para que brille mas fuerte. Cuida la tierra, riega con constancia, y confia.\n\nAsí deberiamos crear: sembrando ideas con cuidado, regandolas con trabajo honesto, y dejando que el tiempo haga lo suyo. No todo lo que vale la pena se puede medir en likes o en ventas. Algunas cosas simplemente necesitan tiempo para florecer.\n\nY cuando florecen, lo hacen con una belleza que la prisa jamas podria producir.' }
    ]},
    { id: 'b6', title: 'Acuarelas del Olvido', author: 'Sofia del Valle', authorUsername: 'sofiadelvalle', authorAvatar: 'https://picsum.photos/seed/autora3/100/100', category: 'Poesia', cover: 'https://picsum.photos/seed/book6/400/600', pages: 72, description: 'Poemas sobre la memoria, el paso del tiempo y los colores que se desvanecen con los años.', creos: 97, shares: 42, reads: 534, comments: 18, chapters: [
      { title: 'Desvanecerse', content: 'Las fotografias viejas\nse ponen amarillas,\ncomo si el tiempo\nles quitara el color\npoco a poco,\ncon paciencia de ladrón.\n\n---\n\nAsí se van los recuerdos:\nno de golpe,\nsino despacio,\nperdiendo nitidez\nhasta que un dia\nno sabes si lo que recuerdas\nes lo que paso\no lo que inventaste\npara no olvidar.' },
      { title: 'Retrato en sepia', content: 'Mi madre joven\nen una foto sepia.\nSonrie como si supiera\nalgo que yo todavia no sé.\n\nTiene las manos cruzadas\nsobre el regazo\ny una flor en el pelo\nque ya no existe.\n\n---\n\nA veces la miro\ny le pregunto cosas.\nElla no responde\npero su sonrisa\nme dice que todo\nestará bien.\n\nLas madres saben eso:\ncalmar con la mirada,\ncurar con el silencio,\namar sin condiciones\nni fecha de vencimiento.' }
    ]},
    { id: 'b7', title: 'Talleres de Luz', author: 'Roberto Camacho', authorUsername: 'robertocamacho', authorAvatar: 'https://picsum.photos/seed/autor7/100/100', category: 'Arte', cover: 'https://picsum.photos/seed/book7/400/600', pages: 220, description: 'Guia para artistas visuales sobre como capturar la luz natural en pintura, fotografia y cine.', creos: 112, shares: 48, reads: 789, comments: 25, chapters: [
      { title: 'La luz de la mañana', content: 'La luz de la mañana es la mas honesta. No esconde defectos ni exagera virtudes. Llega lateral, suave, y revela las texturas tal como son.\n\nPara el pintor, la mañana es el momento de observar. No de pintar — de observar. Sentarse frente al paisaje con los ojos abiertos y dejar que la luz haga su trabajo: separar las formas, definir los volumenes, crear las sombras que dan profundidad.\n\nHe pasado mañanas enteras sin tocar el pincel, solo mirando. Y esas mañanas de observacion silenciosa son las que luego alimentan meses de trabajo. Porque no se puede pintar lo que no se ha visto, y ver — de verdad ver — requiere tiempo y paciencia.' },
      { title: 'Sombras como aliadas', content: 'Los pintores principiantes le temen a las sombras. Quieren que todo esté iluminado, visible, claro. Pero sin sombras no hay volumen, no hay misterio, no hay drama.\n\nLa sombra es la compañera inseparable de la luz. No es su enemiga — es su complemento. Como el silencio es complemento de la musica, la sombra es complemento de la luz.\n\nAprender a pintar sombras es aprender a aceptar que no todo necesita ser visible. Que hay belleza en lo que se sugiere, en lo que se intuye, en lo que se deja a la imaginacion del espectador.' },
      { title: 'El dorado de la tarde', content: 'Los fotografos la llaman "la hora dorada". Ese momento justo antes del atardecer cuando todo se baña de un color calido que hace que las cosas ordinarias se vean extraordinarias.\n\nUna pared descascarada se vuelve textura. Un charco se vuelve espejo. Una persona caminando se vuelve silueta. La luz dorada es generosa: embellece todo lo que toca.\n\nPero dura poco. Quince minutos, tal vez veinte. Y hay que estar listo — con la camara, con el pincel, con los ojos. La luz dorada no espera.' }
    ]},
    { id: 'b8', title: 'La Tejedora de Historias', author: 'Carmen Lucia Bravo', authorUsername: 'carmenluciabravo', authorAvatar: 'https://picsum.photos/seed/autora8/100/100', category: 'Novela', cover: 'https://picsum.photos/seed/book8/400/600', pages: 312, description: 'Novela sobre una mujer que teje tapices donde cada hilo cuenta la historia de alguien del pueblo.', creos: 187, shares: 78, reads: 1023, comments: 51, chapters: [
      { title: 'Cap. 1: El telar', content: 'El telar de doña Mercedes ocupaba la mitad de la sala. Era viejo — mas viejo que ella, mas viejo que su madre, mas viejo que la casa misma. Nadie sabia exactamente de donde habia venido ni quien lo habia construido. Simplemente siempre habia estado ahi, como el rio o la montaña.\n\nDoña Mercedes tejia todos los dias. Se sentaba al amanecer, cuando la luz entraba oblicua por la ventana del este, y no se levantaba hasta que el sol empezaba a bajar. Sus manos se movian con una precision que parecia sobrenatural — los hilos obedecian como si tuvieran voluntad propia.\n\nLa gente del pueblo decia que sus tapices contaban historias. No de forma literal — no eran ilustraciones ni retratos. Eran algo mas sutil: combinaciones de colores y texturas que, al mirarlas, despertaban recuerdos. Como si los hilos supieran cosas que las palabras no podian decir.' },
      { title: 'Cap. 2: Los hilos', content: 'Los hilos de doña Mercedes no venian de ninguna tienda. Ella misma los hacia — hilaba la lana de las ovejas del valle, teñia las fibras con tintes naturales que extraia de plantas, flores y minerales de la zona.\n\nCada color tenia un significado. El rojo de la remolacha era para las historias de amor. El azul del añil, para las de nostalgia. El amarillo de la curcuma, para las de alegria. El negro del carbon, para las de duelo.\n\nCuando alguien del pueblo vivia algo importante — un nacimiento, una boda, una pérdida — venia a ver a doña Mercedes. No le contaba nada. Solo se sentaba frente a ella, en silencio, y ella lo miraba con esos ojos que parecian leer las emociones como quien lee un libro abierto.\n\nLuego, sin decir palabra, seleccionaba los hilos y empezaba a tejer.' },
      { title: 'Cap. 3: El tapiz prohibido', content: 'Habia un tapiz que doña Mercedes mantenia cubierto con una tela oscura en el rincon mas alejado de la sala. Nadie lo habia visto completo. Los niños del pueblo inventaban historias sobre lo que escondia — algunos decian que era un mapa del tesoro, otros que era un retrato del diablo.\n\nLa verdad era mas simple y mas triste. Era el tapiz de su propia historia. Y doña Mercedes no podia terminarlo porque su historia aun no habia terminado.\n\n"Un tapiz se cierra cuando la historia se cierra", me dijo una vez, la unica vez que le pregunte. "Y yo todavia tengo hilos por tejer."\n\nTenia noventa y tres años cuando dijo eso. Y sus manos seguian moviendose con la misma precision de siempre.' }
    ]},
    { id: 'b9', title: 'Compas y Madera', author: 'Andres Quiroga', authorUsername: 'andresquiroga', authorAvatar: 'https://picsum.photos/seed/autor2/100/100', category: 'Ensayo', cover: 'https://picsum.photos/seed/book9/400/600', pages: 156, description: 'Ensayos sobre la relacion entre la musica y la construccion de instrumentos artesanales.', creos: 98, shares: 37, reads: 445, comments: 16, chapters: [
      { title: 'La voz de la madera', content: 'Cada madera tiene una voz. El cedro canta grave y calido. El abeto responde agudo y brillante. El palisandro susurra con profundidad. Un luthier es, antes que artesano, un oyente — alguien que sabe escuchar lo que la madera quiere decir.\n\nCuando elijo una pieza de madera para construir una guitarra, la golpeo suavemente con los nudillos y escucho. No busco un sonido especifico — busco una promesa. Una vibración que me diga: "Aqui adentro hay musica esperando salir."\n\nNo toda la madera sirve. Algunas piezas son hermosas pero mudas. Otras son feas pero cantan como angeles. La belleza exterior no garantiza la belleza interior — leccion que aplica tanto a la madera como a las personas.' },
      { title: 'El alma del instrumento', content: 'Dentro de cada guitarra clasica hay una pequeña pieza de madera llamada "alma". Es un cilindro delgado que conecta la tapa con el fondo del instrumento y transmite las vibraciones de una superficie a otra.\n\nSin el alma, la guitarra suena plana, sin cuerpo, sin resonancia. Con el alma bien colocada, el sonido se expande, se redondea, adquiere la profundidad que distingue a un instrumento artesanal de uno industrial.\n\nSiempre me ha parecido poetico que esa pieza se llame "alma". Porque es exactamente eso: lo que le da vida al instrumento. Lo que transforma un conjunto de maderas pegadas en algo capaz de hacer llorar o bailar a una persona.' }
    ]},
    { id: 'b10', title: 'Ventanas al Pasado', author: 'Lucia Fontana', authorUsername: 'luciafontana', authorAvatar: 'https://picsum.photos/seed/autora10/100/100', category: 'Historia', cover: 'https://picsum.photos/seed/book10/400/600', pages: 276, description: 'Cronicas historicas de pueblos que conservan sus tradiciones como tesoros vivos.', creos: 145, shares: 61, reads: 823, comments: 34, chapters: [
      { title: 'El pueblo que no olvida', content: 'San Juan de los Reyes es un pueblo de trescientas almas que se niega a olvidar. Cada casa tiene un nombre — no un numero, un nombre — y cada nombre cuenta una historia.\n\n"Casa de la Esperanza" fue donde nacio la primera maestra del pueblo. "Casa del Silencio" fue donde vivio un poeta que nunca publico nada pero que todos recitaban de memoria. "Casa de los Pajaros" tiene un patio donde anidan golondrinas cada primavera desde hace mas de un siglo.\n\nLos jovenes se van, como en todos los pueblos. Pero los que se quedan cargan con la responsabilidad de mantener vivas las historias. Cada noche, en la plaza, alguien cuenta algo. No importa si ya lo han escuchado cien veces — las historias, como las canciones, mejoran con cada repeticion.' },
      { title: 'Oficios que resisten', content: 'En las montañas del interior quedan oficios que el mundo moderno ha declarado obsoletos. El herrero que forja clavos a mano. La tejedora que produce telas en un telar de pedal. El alfarero que gira su torno con los pies.\n\nNo lo hacen por nostalgia ni por espectaculo turistico. Lo hacen porque saben que un clavo forjado a mano dura mas que uno industrial. Que una tela tejida en telar de pedal tiene una textura que ninguna maquina puede replicar. Que una vasija hecha a mano guarda el agua fresca de una manera que el plastico no puede.\n\nEstos artesanos no compiten con la industria. No quieren competir. Simplemente hacen lo que saben hacer, como lo han hecho siempre, con la certeza tranquila de que lo hecho con cuidado siempre tendra valor.' }
    ]},
    { id: 'b11', title: 'Semillas de Estrella', author: 'Patricia Nuvial', authorUsername: 'patricianuvial', authorAvatar: 'https://picsum.photos/seed/autora11/100/100', category: 'Ciencia', cover: 'https://picsum.photos/seed/book11/400/600', pages: 192, description: 'Un viaje poetico por la astronomia: como las estrellas nos conectan con el universo y con nosotros mismos.', creos: 123, shares: 52, reads: 667, comments: 28, chapters: [
      { title: 'Polvo de estrellas', content: 'Cada atomo de tu cuerpo fue forjado en el interior de una estrella. El calcio de tus huesos, el hierro de tu sangre, el oxigeno que respiras — todo fue creado en hornos cosmicos que ardieron durante millones de años antes de explotar y esparcir sus elementos por el universo.\n\nNo es metafora. No es poesia. Es ciencia. Somos, literalmente, polvo de estrellas.\n\nCuando miras el cielo nocturno, no estas mirando algo lejano y ajeno. Estas mirando tu propio origen. Cada punto de luz es un primo lejano, una fabrica cosmica que quizas, en algun momento futuro, producira los atomos que formaran otros seres, otros mundos, otras historias.' },
      { title: 'La oscuridad necesaria', content: 'Para ver las estrellas necesitas oscuridad. Parece obvio, pero tiene implicaciones profundas. En las ciudades modernas, con sus millones de luces, hemos perdido el cielo nocturno. Hemos cambiado las estrellas por letreros luminosos.\n\nLa contaminacion luminica no solo nos roba la vista del cosmos — nos roba la perspectiva. Cuando ves la Via Lactea cruzar el cielo de horizonte a horizonte, tus problemas se reducen a su verdadera proporcion. Eres un ser diminuto en un planeta diminuto orbitando una estrella promedio en una galaxia de miles de millones de estrellas.\n\nY eso, lejos de ser deprimente, es liberador. Porque significa que no necesitas ser enorme para ser significativo. Una vela es pequeña, pero en la oscuridad correcta, puede iluminar un cuarto entero.' }
    ]},
    { id: 'b12', title: 'Manos Sabias', author: 'Elena Mirabal', authorUsername: 'elenamirabal', authorAvatar: 'https://picsum.photos/seed/autora1/100/100', category: 'Arte', cover: 'https://picsum.photos/seed/book12/400/600', pages: 148, description: 'Retratos escritos de artesanos contemporaneos que mantienen vivas las tecnicas ancestrales.', creos: 76, shares: 31, reads: 398, comments: 12, chapters: [
      { title: 'La ceramista', content: 'Rosa trabaja en un taller sin paredes. Cuatro columnas de madera sostienen un techo de palma bajo el cual gira un torno que construyo su abuelo. El viento entra libre, trayendo polvo y polen, y a veces una mariposa se posa en el borde de una pieza recien formada.\n\n"El barro tiene que respirar", dice Rosa mientras sus manos moldean un cuenco con movimientos que parecen caricias. "Si lo encierras, se ahoga. Como las personas."\n\nTiene sesenta y dos años y las manos mas fuertes y mas suaves que he tocado. Manos que han formado miles de piezas — platos, jarrones, tazas, figuras — sin repetir ninguna. "Cada pieza es unica porque cada momento es unico", explica. "La misma mano, el mismo barro, pero diferente luz, diferente humor, diferente dia."' },
      { title: 'El tejedor', content: 'Don Abundio teje hamacas. No cualquier hamaca — hamacas que duran generaciones. Su padre le enseño, y a su padre le enseño su padre, y asi hacia atras, hasta perderse en el tiempo.\n\nEl proceso es lento. Una hamaca puede tardar tres semanas. Don Abundio no tiene prisa. "La hamaca es para descansar", dice con una sonrisa, "y no se puede hacer algo para descansar con prisa."\n\nCada hamaca lleva un patron diferente. Don Abundio no usa diseños predeterminados — inventa uno nuevo cada vez, inspirado en lo que ve alrededor: el vuelo de un pajaro, la forma de una nube, las ondas del rio.\n\n"La hamaca cuenta la historia del mes en que fue tejida", explica. "Si la teji en epoca de lluvias, tiene ondas. Si la teji en verano, tiene lineas rectas como rayos de sol."' }
    ]},
    { id: 'b13', title: 'Cielo Invertido', author: 'Diego Armenta', authorUsername: 'diegoarmenta', authorAvatar: 'https://picsum.photos/seed/autor13/100/100', category: 'Cuento', cover: 'https://picsum.photos/seed/book13/400/600', pages: 134, description: 'Cuentos donde la realidad se dobla suavemente, como un espejo de agua que muestra el cielo al reves.', creos: 88, shares: 36, reads: 456, comments: 19, chapters: [
      { title: 'El relojero', content: 'En el pueblo habia un relojero que arreglaba relojes que no estaban rotos. La gente le traia relojes que funcionaban perfectamente y el los abria, miraba su interior con una lupa y decia: "Este reloj marca la hora correcta pero no marca el tiempo correcto."\n\nNadie entendia que queria decir. Pero cuando devolvía el reloj, algo cambiaba. No en el reloj — en el dueño. De pronto, las horas parecian mas largas, los dias mas amplios, las semanas menos apuradas.\n\n"Que le hizo a mi reloj?", preguntaban. Y el viejo relojero sonreia y decia: "Le enseñe a respirar entre un segundo y otro."\n\nEl relojero murio un martes a las tres de la tarde. Todos los relojes del pueblo se detuvieron durante exactamente un minuto. Luego siguieron andando, pero dicen que desde entonces marcan un tiempo ligeramente diferente — un tiempo mas amable, mas ancho, mas habitable.' },
      { title: 'La biblioteca infinita', content: 'Habia una biblioteca en un pueblo tan pequeño que no aparecia en los mapas. Tenia una sola sala con una sola estanteria con exactamente un libro. Pero ese libro cambiaba cada vez que alguien lo abria.\n\nPara el panadero, era un libro de recetas que incluia panes que no existian en ninguna tradicion conocida. Para la maestra, era un atlas de paises que todavia no habian sido fundados. Para el niño, era un cuento de aventuras cuyo heroe se parecia sospechosamente a el mismo.\n\nLa bibliotecaria, una mujer anciana de ojos transparentes, nunca lo habia leido. "Mi trabajo es cuidarlo, no leerlo", decia. "Cada persona necesita encontrar en sus paginas lo que necesita encontrar, y yo ya encontre lo que necesitaba hace mucho tiempo."\n\nCuando le preguntaban que habia encontrado, respondia simplemente: "La certeza de que un solo libro puede contener todos los libros del mundo, si el lector sabe leer con el corazon."' }
    ]},
    { id: 'b14', title: 'Frecuencias del Alma', author: 'Marina Solarte', authorUsername: 'marinasolarte', authorAvatar: 'https://picsum.photos/seed/autora14/100/100', category: 'Autoayuda', cover: 'https://picsum.photos/seed/book14/400/600', pages: 176, description: 'Reflexiones sobre como el arte, la naturaleza y la creatividad sanan el espiritu.', creos: 165, shares: 73, reads: 1102, comments: 47, chapters: [
      { title: 'El arte como medicina', content: 'No necesitas ser artista para que el arte te sane. No necesitas saber dibujar, cantar, escribir o bailar con técnica. Solo necesitas permitirte hacer algo sin juicio, sin expectativa, sin la presion de que el resultado sea "bueno".\n\nDibuja un arbol. No importa si parece un arbol o una mancha. El acto de dibujar — la atencion puesta en las lineas, los colores, las formas — ya está haciendo su trabajo. Está sacando tu mente del ruido y llevandola a un lugar de concentracion suave.\n\nCanta una cancion. No importa si desafinas. Tu cuerpo vibra con cada nota, y esa vibracion mueve cosas dentro de ti que las palabras no pueden alcanzar.\n\nEscribe lo que sientes. No para publicar, no para que nadie lo lea. Solo para sacarlo de adentro y ponerlo afuera, donde puedas mirarlo con distancia y decir: "Eso era lo que me pasaba."' },
      { title: 'Naturaleza como maestra', content: 'Un arbol no intenta ser mas alto que el arbol de al lado. Un rio no compite con otro rio. Una flor no se disculpa por ser pequeña.\n\nLa naturaleza crea sin ansiedad. Cada forma, cada color, cada patron es el resultado de millones de años de evolucion tranquila. No hay urgencia en la naturaleza — hay ritmo.\n\nCuando siento que el mundo me aplasta, salgo a caminar. No a un gimnasio, no a un centro comercial — a un lugar con arboles, con tierra, con cielo abierto. Y camino sin destino, sin contador de pasos, sin musica en los audifonos.\n\nSolo camino. Y escucho. Y miro. Y poco a poco, el ritmo de la naturaleza reemplaza el ritmo frenetico de mi cabeza. Y vuelvo a respirar como se debe respirar: despacio, profundo, sin prisa por llegar a la proxima respiracion.' }
    ]},
    { id: 'b15', title: 'Cronicas del Mercado', author: 'Manuel Torrealba', authorUsername: 'manueltorrealba', authorAvatar: 'https://picsum.photos/seed/autor4/100/100', category: 'Historia', cover: 'https://picsum.photos/seed/book15/400/600', pages: 208, description: 'Historias del mercado municipal: sus personajes, sus olores, sus secretos y su resistencia al tiempo.', creos: 109, shares: 44, reads: 567, comments: 22, chapters: [
      { title: 'Puesto numero uno', content: 'El puesto numero uno del mercado municipal pertenece a doña Gladys desde 1978. Vende frutas tropicales y tiene la capacidad sobrenatural de saber exactamente que fruta necesitas antes de que tu lo sepas.\n\n"Llevas cara de mango", te dice, y te da un mango que resulta ser exactamente lo que tu cuerpo pedia. "Hoy necesitas papaya", le dice a otro, y le escoge una papaya que esta en el punto perfecto de maduracion.\n\nNadie le ha preguntado como lo hace. Seria como preguntarle al sol como brilla — simplemente lo hace, y todos nos beneficiamos de su don.\n\nDoña Gladys llega al mercado a las cuatro de la mañana. Acomoda las frutas con el cuidado de quien arregla flores. Cada piña, cada guayaba, cada maracuyá tiene su lugar exacto. "Las frutas son como las personas", dice. "Si las pones en el lugar equivocado, se marchitan."' },
      { title: 'El pasillo de las especias', content: 'El pasillo de las especias es el alma del mercado. Huele a canela, a clavo, a comino, a mundos lejanos que llegaron aqui en barcos hace siglos y se quedaron para siempre.\n\nDon Aurelio es el dueño del puesto mas antiguo de especias. Tiene sacos de yute abiertos, cada uno lleno de un polvo de color diferente: amarillo curcuma, rojo pimienton, verde oregano, negro pimienta. Parece un pintor con su paleta, excepto que sus colores se comen.\n\n"Cada especia cuenta la historia de un viaje", dice don Aurelio mientras pesa canela en una balanza que no ha cambiado en cuarenta años. "La pimienta vino de la India. El clavo de las islas Molucas. El comino del Mediterraneo. Este puesto es mas internacional que las Naciones Unidas."' }
    ]},
    { id: 'b16', title: 'Fragmentos de Tinta', author: 'Diego Armenta', authorUsername: 'diegoarmenta', authorAvatar: 'https://picsum.photos/seed/autor13/100/100', category: 'Poesia', cover: 'https://picsum.photos/seed/book16/400/600', pages: 64, description: 'Micropoemas y haikus sobre la vida cotidiana, la belleza de lo simple y el asombro de existir.', creos: 71, shares: 29, reads: 389, comments: 11, chapters: [
      { title: 'Haikus del dia', content: 'Cafe en la taza.\nEl vapor dibuja formas\nque nadie repite.\n\n---\n\nLluvia en el zinc.\nCada gota es un tambor\ndiminuto y fiel.\n\n---\n\nPan en el horno.\nLa casa entera respira\naroma de hogar.\n\n---\n\nGato en la ventana.\nMira el mundo con los ojos\nde quien ya lo entiende.\n\n---\n\nManos de abuela.\nMapas de una vida entera\ntrazados en piel.' },
      { title: 'Fragmentos', content: 'Escribo en los margenes\nde los libros que leo.\nPequeñas conversaciones\ncon autores que no me conocen\npero que de alguna manera\nme entienden.\n\n---\n\nLa tinta se seca.\nPero las palabras siguen\nhúmedas por dentro,\nlistas para mojarte\ncuando las leas\nen el momento justo.\n\n---\n\nNo escribo para la eternidad.\nEscribo para este martes,\npara esta tarde gris,\npara esta taza de cafe\nque se enfria mientras busco\nla palabra exacta.' }
    ]}
  ];

  let allBooks = [];
  let activeCategory = null;
  let currentView = 'home';
  let bibCurrentUser = null;
  let currentBook = null;
  let currentChapter = 0;

  /* -- Init -------------------------------------------------------- */
  document.addEventListener('DOMContentLoaded', async () => {
    showCookieBanner();
    allBooks = [...DEMO_DATA];
    renderSidebarCategories();
    renderTopAuthors();
    renderAll();
    renderBottomNav('biblioteca');
    initTheme();
    updateNavAuth();

    try {
      const { data: { user } } = await sb.auth.getUser();
      if (user) {
        bibCurrentUser = user;
        document.getElementById('bib-upload-btn').classList.remove('hidden');
      }
    } catch(e) {}
  });

  /* -- Cookie Banner ----------------------------------------------- */
  function showCookieBanner() {
    if (!localStorage.getItem('creo_cookies_accepted')) {
      document.getElementById('cookie-banner').classList.remove('hidden');
    }
  }
  function acceptCookies() {
    localStorage.setItem('creo_cookies_accepted', 'true');
    document.getElementById('cookie-banner').classList.add('hidden');
  }

  /* -- Sidebar ----------------------------------------------------- */
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    sidebar.classList.toggle('-translate-x-full');
    overlay.classList.toggle('hidden');
  }

  function renderSidebarCategories() {
    const container = document.getElementById('sidebar-categories');
    const safe = typeof esc === 'function' ? esc : s => s;
    container.innerHTML = CATEGORIES.map(cat => `
      <button onclick="filterCategory('${cat}')"
        class="sidebar-link w-full text-left px-3 py-2 rounded-lg text-xs text-gray-400 hover:text-white"
        data-cat="${cat}">
        ${safe(cat)}
      </button>
    `).join('');
  }

  function renderTopAuthors() {
    const container = document.getElementById('top-authors');
    const safe = typeof esc === 'function' ? esc : s => s;
    const authorMap = {};
    allBooks.forEach(b => {
      if (!authorMap[b.authorUsername]) authorMap[b.authorUsername] = { name: b.author, username: b.authorUsername, avatar: b.authorAvatar, creos: 0, books: 0 };
      authorMap[b.authorUsername].creos += (b.creos || 0);
      authorMap[b.authorUsername].books++;
    });
    const sorted = Object.values(authorMap).sort((a, b) => b.creos - a.creos).slice(0, 5);
    container.innerHTML = sorted.map((a, i) => `
      <a href="profile.html?u=${encodeURIComponent(a.username)}" class="flex items-center gap-2 p-2 rounded-lg hover:bg-white/5 transition group">
        <div class="relative">
          <img src="${safe(a.avatar)}" class="w-8 h-8 rounded-full object-cover" alt="">
          ${i === 0 ? '<span class="absolute -top-1 -right-1 text-[8px] bg-creo-mint text-black w-4 h-4 rounded-full flex items-center justify-center font-bold">1</span>' : ''}
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-xs font-semibold truncate group-hover:text-creo-mint transition">${safe(a.name)}</p>
          <p class="text-[10px] text-gray-500">${a.creos} creos · ${a.books} libros</p>
        </div>
      </a>
    `).join('');
  }

  /* -- Views ------------------------------------------------------- */
  function setView(view) {
    currentView = view;
    document.querySelectorAll('.sidebar-link[data-view]').forEach(b => {
      b.classList.toggle('active', b.dataset.view === view);
      b.classList.toggle('text-gray-400', b.dataset.view !== view);
    });
    activeCategory = null;
    document.getElementById('hero-section').classList.remove('hidden');
    renderAll();
    if (window.innerWidth < 1024) toggleSidebar();
  }

  /* -- Category Filter --------------------------------------------- */
  function filterCategory(cat) {
    activeCategory = cat;
    currentView = 'home';
    document.querySelectorAll('.sidebar-link[data-view]').forEach(b => {
      b.classList.remove('active');
      b.classList.add('text-gray-400');
    });
    document.getElementById('hero-section').classList.remove('hidden');
    renderAll();
    if (window.innerWidth < 1024) toggleSidebar();
  }

  /* -- Render All -------------------------------------------------- */
  function renderAll() {
    let filtered = activeCategory ? allBooks.filter(b => b.category === activeCategory) : allBooks;

    if (currentView === 'trending') {
      filtered = [...allBooks].sort((a, b) => ((b.creos || 0) + (b.comments || 0) * 2 + (b.shares || 0) * 3) - ((a.creos || 0) + (a.comments || 0) * 2 + (a.shares || 0) * 3));
    } else if (currentView === 'recent') {
      filtered = [...allBooks].reverse();
    }

    const heroBook = filtered[0] || allBooks[0];
    renderHero(heroBook);
    renderContentRows(filtered);
  }

  /* -- Hero -------------------------------------------------------- */
  function renderHero(book) {
    if (!book) return;
    const card = document.getElementById('hero-card');
    const safe = typeof esc === 'function' ? esc : s => s;
    card.setAttribute('data-id', book.id);
    card.innerHTML = `
      <div class="relative aspect-[21/9] overflow-hidden">
        <img src="${safe(book.cover)}" alt="${safe(book.title)}" class="w-full h-full object-cover blur-sm scale-110 opacity-60">
        <div class="hero-gradient absolute inset-0"></div>
        <div class="absolute inset-0 flex items-center px-6 md:px-10">
          <div class="flex items-center gap-6 md:gap-10">
            <img src="${safe(book.cover)}" alt="${safe(book.title)}" class="w-24 md:w-36 rounded-lg shadow-2xl flex-shrink-0 hidden sm:block">
            <div class="flex-1">
              <div class="flex items-center gap-2 mb-2">
                <span class="text-xs font-semibold text-creo-mint uppercase tracking-wider">${safe(book.category)}</span>
                ${currentView === 'trending' ? '<span class="text-[10px] bg-creo-mint/20 text-creo-mint px-2 py-0.5 rounded-full font-semibold">Favorito del Pueblo</span>' : ''}
              </div>
              <h2 class="text-2xl md:text-4xl font-bold">${safe(book.title)}</h2>
              <p class="text-gray-300 text-sm mt-1">por ${safe(book.author)}</p>
              <p class="text-gray-500 text-xs mt-2 max-w-xl line-clamp-2">${safe(book.description)}</p>
              <div class="flex items-center gap-4 mt-3">
                <span class="text-[11px] text-gray-400 bg-white/10 px-2 py-0.5 rounded">${book.pages} pags</span>
                <span class="flex items-center gap-1 text-[11px] text-gray-400"><img src="assets/logo-icon.png" class="w-3.5 h-3.5 rounded-full opacity-70">${book.creos || 0}</span>
                <span class="flex items-center gap-1 text-[11px] text-gray-400"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>${book.reads || 0}</span>
              </div>
              <button class="mt-4 bg-creo-mint text-black font-bold text-sm px-6 py-2.5 rounded-full hover:bg-creo-mintDark transition read-btn flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                Leer Ahora
              </button>
            </div>
          </div>
        </div>
      </div>`;
  }

  function openFeaturedReader() {
    const id = document.getElementById('hero-card').getAttribute('data-id');
    const book = allBooks.find(b => b.id === id);
    if (book) openReader(book);
  }

  /* -- Content Rows ------------------------------------------------ */
  function renderContentRows(books) {
    const container = document.getElementById('content-rows');
    const safe = typeof esc === 'function' ? esc : s => s;

    if (currentView === 'trending') {
      container.innerHTML = `
        <section class="px-4">
          <div class="max-w-5xl mx-auto">
            <h3 class="text-lg font-bold mb-1 text-creo-mint">Favoritos del Pueblo</h3>
            <p class="text-xs text-gray-500 mb-4">Clasificados por la comunidad — creos, comentarios y compartidos deciden</p>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
              ${books.slice(1).map((b, i) => bookCard(b, safe, i + 2)).join('')}
            </div>
          </div>
        </section>`;
      return;
    }

    if (activeCategory) {
      container.innerHTML = `
        <section class="px-4">
          <div class="max-w-5xl mx-auto">
            <h3 class="text-lg font-bold mb-3 text-creo-mint">${safe(activeCategory)}</h3>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
              ${books.map(b => bookCard(b, safe)).join('')}
            </div>
          </div>
        </section>`;
      return;
    }

    // Netflix-style grouped rows
    const groups = {};
    books.forEach(b => {
      if (!groups[b.category]) groups[b.category] = [];
      groups[b.category].push(b);
    });

    container.innerHTML = Object.entries(groups).map(([cat, items]) => `
      <section class="px-4">
        <div class="max-w-5xl mx-auto">
          <h3 class="text-lg font-bold mb-3 text-creo-mint">${safe(cat)}</h3>
          <div class="flex gap-3 overflow-x-auto bib-scrollbar pb-3">
            ${items.map(b => `<div class="flex-shrink-0 w-40 sm:w-44 md:w-48">${bookCard(b, safe)}</div>`).join('')}
          </div>
        </div>
      </section>
    `).join('');
  }

  function bookCard(b, safe, rank) {
    const rankBadge = rank ? `<span class="absolute top-2 left-2 bg-creo-mint text-black text-[10px] font-bold w-6 h-6 rounded-full flex items-center justify-center z-10">${rank}</span>` : '';
    return `
      <div class="card-hover rounded-xl overflow-hidden bg-white/5 cursor-pointer group" onclick="openReader(allBooks.find(x=>x.id==='${b.id}'))">
        <div class="relative aspect-[2/3] overflow-hidden rounded-t-xl">
          <img src="${safe(b.cover)}" alt="${safe(b.title)}" class="w-full h-full object-cover" loading="lazy">
          ${rankBadge}
          <span class="absolute bottom-2 right-2 bg-black/80 text-white text-[10px] px-1.5 py-0.5 rounded z-10">${b.pages} pags</span>
        </div>
        <div class="p-2.5">
          <div class="flex items-start gap-2">
            <img src="${safe(b.authorAvatar)}" class="w-7 h-7 rounded-full object-cover flex-shrink-0 mt-0.5" alt="">
            <div class="flex-1 min-w-0">
              <h4 class="text-xs font-semibold leading-tight line-clamp-2">${safe(b.title)}</h4>
              <p class="text-[10px] text-gray-400 mt-0.5">${safe(b.author)}</p>
              <div class="flex items-center gap-2 mt-1">
                <span class="flex items-center gap-0.5 text-[9px] text-gray-500"><img src="assets/logo-icon.png" class="w-3 h-3 rounded-full opacity-60">${b.creos || 0}</span>
                <span class="flex items-center gap-0.5 text-[9px] text-gray-500"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>${b.shares || 0}</span>
                <span class="flex items-center gap-0.5 text-[9px] text-gray-500"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>${b.reads || 0}</span>
              </div>
            </div>
          </div>
        </div>
      </div>`;
  }

  /* -- Search ------------------------------------------------------ */
  function searchBooks(query) {
    const q = query.toLowerCase().trim();
    if (!q) { renderAll(); document.getElementById('hero-section').classList.remove('hidden'); return; }
    const filtered = allBooks.filter(b =>
      b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q) ||
      b.description.toLowerCase().includes(q) || b.category.toLowerCase().includes(q)
    );
    renderContentRows(filtered);
    document.getElementById('hero-section').classList.add('hidden');
  }

  /* -- Book Reader Modal ------------------------------------------- */
  function openReader(book) {
    if (!book) return;
    currentBook = book;
    currentChapter = 0;
    const safe = typeof esc === 'function' ? esc : s => s;

    document.getElementById('reader-cover').src = book.cover;
    document.getElementById('reader-cover').alt = book.title;
    document.getElementById('reader-title').textContent = book.title;
    document.getElementById('reader-author').textContent = 'por ' + book.author;
    document.getElementById('reader-desc').textContent = book.description;
    document.getElementById('reader-pages').textContent = book.pages + ' paginas';
    document.getElementById('reader-category').textContent = book.category;
    document.getElementById('reader-creos').textContent = book.creos || 0;
    document.getElementById('reader-shares').textContent = book.shares || 0;
    document.getElementById('reader-reads').textContent = book.reads || 0;
    document.getElementById('reader-tip-btn').href = 'profile.html?u=' + encodeURIComponent(book.authorUsername);

    renderChapterTabs();
    renderChapterContent();

    document.getElementById('reader-modal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }

  function closeReader() {
    document.getElementById('reader-modal').classList.add('hidden');
    document.body.style.overflow = '';
    currentBook = null;
  }

  function renderChapterTabs() {
    if (!currentBook) return;
    const container = document.getElementById('chapter-tabs');
    container.innerHTML = currentBook.chapters.map((ch, i) => `
      <button onclick="goToChapter(${i})"
        class="flex-shrink-0 px-4 py-2 rounded-full text-xs font-medium transition ${i === currentChapter ? 'pill-active' : 'pill-inactive'}">
        ${ch.title}
      </button>
    `).join('');
  }

  function renderChapterContent() {
    if (!currentBook) return;
    const ch = currentBook.chapters[currentChapter];
    const content = ch.content.split('\n').map(line => {
      if (line.trim() === '---') return '<hr class="border-white/10 my-6">';
      if (line.trim() === '') return '<br>';
      return `<p class="mb-4">${line}</p>`;
    }).join('');

    document.getElementById('chapter-content').innerHTML = `
      <h3 class="text-xl font-bold text-creo-mint mb-6">${ch.title}</h3>
      ${content}
    `;
    document.getElementById('chapter-indicator').textContent = `${currentChapter + 1} / ${currentBook.chapters.length}`;

    // Update progress
    const progress = ((currentChapter + 1) / currentBook.chapters.length) * 100;
    document.getElementById('reading-progress').style.width = progress + '%';

    // Update nav buttons
    document.getElementById('prev-chapter-btn').style.visibility = currentChapter > 0 ? 'visible' : 'hidden';
    document.getElementById('next-chapter-btn').style.visibility = currentChapter < currentBook.chapters.length - 1 ? 'visible' : 'hidden';

    // Scroll to top of reader
    document.querySelector('#reader-modal > .flex-1').scrollTop = 0;
  }

  function goToChapter(index) {
    currentChapter = index;
    renderChapterTabs();
    renderChapterContent();
  }

  function nextChapter() {
    if (currentBook && currentChapter < currentBook.chapters.length - 1) {
      currentChapter++;
      renderChapterTabs();
      renderChapterContent();
    }
  }

  function prevChapter() {
    if (currentBook && currentChapter > 0) {
      currentChapter--;
      renderChapterTabs();
      renderChapterContent();
    }
  }

  /* -- Share to Community ------------------------------------------ */
  function shareToComunnidad() {
    if (!currentBook) return;
    if (!bibCurrentUser) { showToast('Inicia sesion para compartir', 'error'); return; }
    document.getElementById('share-modal').classList.remove('hidden');
  }

  function closeShareModal() {
    document.getElementById('share-modal').classList.add('hidden');
    document.getElementById('share-comment').value = '';
  }

  async function submitSharePost() {
    const comment = document.getElementById('share-comment').value.trim();
    if (!currentBook) return;
    try {
      const { data: { user } } = await sb.auth.getUser();
      if (!user) throw new Error('No autenticado');
      await sb.from('community_posts').insert({
        user_id: user.id,
        content: (comment ? comment + '\n\n' : '') + '📖 Recomiendo: "' + currentBook.title + '" de ' + currentBook.author + ' en la Biblioteca CREO.',
        type: 'share'
      });
    } catch(e) {}
    if (currentBook) currentBook.shares = (currentBook.shares || 0) + 1;
    closeShareModal();
    showToast('Compartido en la Comunidad', 'success');
  }

  /* -- Share External ---------------------------------------------- */
  function shareExternal() {
    if (!currentBook) return;
    const text = `Lee "${currentBook.title}" de ${currentBook.author} en CREO Biblioteca`;
    const url = window.location.href;
    if (navigator.share) {
      navigator.share({ title: currentBook.title, text: text, url: url }).catch(() => {});
    } else {
      navigator.clipboard.writeText(text + ' — ' + url).then(() => {
        showToast('Enlace copiado al portapapeles', 'success');
      }).catch(() => {
        showToast('No se pudo copiar el enlace', 'error');
      });
    }
  }

  /* -- Tag Author -------------------------------------------------- */
  function openTagAuthor() {
    if (!currentBook) return;
    if (!bibCurrentUser) { showToast('Inicia sesion para etiquetar', 'error'); return; }
    document.getElementById('tag-avatar').src = currentBook.authorAvatar;
    document.getElementById('tag-author-name').textContent = currentBook.author;
    document.getElementById('tag-author-username').textContent = '@' + currentBook.authorUsername;
    document.getElementById('tag-message').value = '';
    document.getElementById('tag-modal').classList.remove('hidden');
  }

  function closeTagModal() {
    document.getElementById('tag-modal').classList.add('hidden');
  }

  function submitTag() {
    const msg = document.getElementById('tag-message').value.trim();
    closeTagModal();
    showToast('Autor etiquetado' + (msg ? ' con tu mensaje' : ''), 'success');
  }

  /* -- Upload Modal ------------------------------------------------ */
  function openUploadModal() {
    document.getElementById('upload-modal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }

  function closeUploadModal() {
    document.getElementById('upload-modal').classList.add('hidden');
    document.body.style.overflow = '';
  }

  async function submitBookUpload() {
    const title = document.getElementById('upload-title').value.trim();
    const author = document.getElementById('upload-author').value.trim();
    const cat = document.getElementById('upload-category').value;
    const desc = document.getElementById('upload-desc').value.trim();
    const coverFile = document.getElementById('upload-cover').files[0];
    const bookFile = document.getElementById('upload-file').files[0];

    if (!title) { showToast('Agrega un titulo', 'error'); return; }
    if (!author) { showToast('Agrega el autor', 'error'); return; }
    if (!cat) { showToast('Selecciona una categoria', 'error'); return; }
    if (!coverFile) { showToast('Selecciona una imagen de portada', 'error'); return; }

    const btn = document.getElementById('upload-submit-btn');
    btn.disabled = true; btn.textContent = 'Subiendo...';

    try {
      const { data: { user } } = await sb.auth.getUser();
      if (!user) throw new Error('No autenticado');
      const cover_url = await uploadToStorage(coverFile, 'biblioteca', 10);
      if (!cover_url) throw new Error('Error al subir portada');
      let file_url = null;
      if (bookFile) file_url = await uploadToStorage(bookFile, 'biblioteca', 50);
      const { error } = await sb.from('biblioteca').insert({
        creator_id: user.id, title, author_tag: author, category: cat, description: desc || null, cover_url, file_url
      });
      if (error) throw error;
      showToast('Publicado en Biblioteca', 'success');
      closeUploadModal();
      ['upload-title','upload-author','upload-category','upload-desc','upload-cover','upload-file'].forEach(id => document.getElementById(id).value = '');
    } catch (e) {
      showToast('Error: ' + (e.message || ''), 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Publicar';
    }
  }

  // Close modals on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (!document.getElementById('share-modal').classList.contains('hidden')) { closeShareModal(); return; }
      if (!document.getElementById('tag-modal').classList.contains('hidden')) { closeTagModal(); return; }
      closeReader();
      closeUploadModal();
    }
  });
  </script>
</body>
</html>
