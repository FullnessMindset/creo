<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CREO — Nueva Contraseña</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a0a3e">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { creo: { purple: '#1a0a3e', light: '#2d1b69', mint: '#33f0b0', mintDark: '#28c48e' } } } }
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 transition-colors">
  <script src="shared.js"></script>

  <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-200 max-w-sm w-full">
    <div class="text-center mb-6">
      <div class="w-16 h-16 rounded-full bg-white flex items-center justify-center mx-auto mb-3 shadow"><img src="assets/logo-icon.png" alt="CREO" class="w-12 h-12 rounded-full object-contain"></div>
      <h1 class="text-xl font-bold text-gray-900">Nueva Contraseña</h1>
      <p class="text-gray-500 text-sm mt-1">Ingresa tu nueva contraseña</p>
    </div>

    <div id="form-section" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nueva contraseña</label>
        <input id="new-password" type="password" minlength="6" placeholder="Mínimo 6 caracteres" class="w-full px-4 py-3 rounded-lg border border-gray-300 bg-white text-gray-900 focus:ring-2 focus:ring-creo-mint focus:border-transparent">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Confirmar contraseña</label>
        <input id="confirm-password" type="password" placeholder="Repite la contraseña" class="w-full px-4 py-3 rounded-lg border border-gray-300 bg-white text-gray-900 focus:ring-2 focus:ring-creo-mint focus:border-transparent">
      </div>
      <button onclick="updatePassword()" id="submit-btn" class="w-full py-3 bg-creo-purple text-white font-bold rounded-lg hover:opacity-90 transition">Actualizar Contraseña</button>
    </div>

    <div id="success-section" class="hidden text-center space-y-4">
      <div class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center mx-auto">
        <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
      </div>
      <p class="text-gray-900 font-semibold">Contraseña actualizada</p>
      <a href="index.html" class="inline-block px-6 py-2 bg-creo-mint text-creo-purple font-bold rounded-lg hover:opacity-90 transition">Ir al Panel</a>
    </div>

    <p id="error-msg" class="text-red-500 text-sm mt-3 hidden"></p>
  </div>

  <script>
    async function updatePassword() {
      const pw = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      const errEl = document.getElementById('error-msg');
      errEl.classList.add('hidden');

      if (pw.length < 6) { errEl.textContent = 'La contraseña debe tener al menos 6 caracteres'; errEl.classList.remove('hidden'); return; }
      if (pw !== confirm) { errEl.textContent = 'Las contraseñas no coinciden'; errEl.classList.remove('hidden'); return; }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.textContent = 'Actualizando...';

      const { error } = await sb.auth.updateUser({ password: pw });
      if (error) {
        errEl.textContent = error.message; errEl.classList.remove('hidden');
        btn.disabled = false; btn.textContent = 'Actualizar Contraseña';
        return;
      }

      document.getElementById('form-section').classList.add('hidden');
      document.getElementById('success-section').classList.remove('hidden');
    }
  </script>
</body>
</html>
