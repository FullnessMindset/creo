  <script>
    async function updatePassword() {
      const pw = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      const errEl = document.getElementById('error-msg');
      errEl.classList.add('hidden');

      if (pw.length < 6) { errEl.textContent = 'La contraseÃ±a debe tener al menos 6 caracteres'; errEl.classList.remove('hidden'); return; }
      if (pw !== confirm) { errEl.textContent = 'Las contraseÃ±as no coinciden'; errEl.classList.remove('hidden'); return; }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.textContent = 'Actualizando...';

      const { error } = await sb.auth.updateUser({ password: pw });
      if (error) {
        errEl.textContent = error.message; errEl.classList.remove('hidden');
